        cpp: `<span class="t">bool</span> <span class="fn">dfs</span>(<span class="t">int</span> node, <span class="t">int</span> par, vector&lt;<span class="t">bool</span>&gt;&amp; vis,\n         vector&lt;vector&lt;<span class="t">int</span>&gt;&gt;&amp; adj) {\n    vis[node] = <span class="k">true</span>;\n    <span class="k">for</span> (<span class="t">int</span> nb : adj[node]) {\n        <span class="k">if</span> (!vis[nb]) {\n            <span class="k">if</span> (<span class="fn">dfs</span>(nb, node, vis, adj)) <span class="k">return true</span>;\n        } <span class="k">else if</span> (nb != par) <span class="k">return true</span>;\n    }\n    <span class="k">return false</span>;\n}\n<span class="t">bool</span> <span class="fn">hasCycle</span>(<span class="t">int</span> V, vector&lt;vector&lt;<span class="t">int</span>&gt;&gt;&amp; adj) {\n    vector&lt;<span class="t">bool</span>&gt; vis(V, <span class="k">false</span>);\n    <span class="k">for</span> (<span class="t">int</span> i=<span class="n">0</span>;i&lt;V;i++)\n        <span class="k">if</span> (!vis[i] &amp;&amp; <span class="fn">dfs</span>(i,-<span class="n">1</span>,vis,adj)) <span class="k">return true</span>;\n    <span class="k">return false</span>;\n}`,

        python: `<span class="k">def</span> <span class="fn">has_cycle</span>(V, adj):\n    vis = [<span class="k">False</span>]*V\n    <span class="k">def</span> <span class="fn">dfs</span>(node, par):\n        vis[node] = <span class="k">True</span>\n        <span class="k">for</span> nb <span class="k">in</span> adj[node]:\n            <span class="k">if not</span> vis[nb]:\n                <span class="k">if</span> <span class="fn">dfs</span>(nb, node): <span class="k">return True</span>\n            <span class="k">elif</span> nb != par: <span class="k">return True</span>\n        <span class="k">return False</span>\n    <span class="k">for</span> i <span class="k">in</span> <span class="fn">range</span>(V):\n        <span class="k">if not</span> vis[i] <span class="k">and</span> <span class="fn">dfs</span>(i, -<span class="n">1</span>): <span class="k">return True</span>\n    <span class="k">return False</span>`,
        javascript: `<span class="k">function</span> <span class="fn">hasCycle</span>(V, adj) {\n    <span class="k">const</span> vis = <span class="k">new</span> Array(V).<span class="fn">fill</span>(<span class="k">false</span>);\n    <span class="k">function</span> <span class="fn">dfs</span>(node, par) {\n        vis[node] = <span class="k">true</span>;\n        <span class="k">for</span> (<span class="k">const</span> nb <span class="k">of</span> adj[node]) {\n            <span class="k">if</span> (!vis[nb]) { <span class="k">if</span> (<span class="fn">dfs</span>(nb,node)) <span class="k">return true</span>; }\n            <span class="k">else if</span> (nb !== par) <span class="k">return true</span>;\n        }\n        <span class="k">return false</span>;\n    }\n    <span class="k">for</span> (<span class="k">let</span> i=<span class="n">0</span>;i&lt;V;i++)\n        <span class="k">if</span>(!vis[i]&amp;&amp;<span class="fn">dfs</span>(i,-<span class="n">1</span>)) <span class="k">return true</span>;\n    <span class="k">return false</span>;\n}`
      }

    ,{
      id: 'graph4',
      name: 'Detect Cycle in Directed Graph',
      badge: 'Graph',
      desc: 'Detect a cycle in a directed graph using DFS with a recursion stack to track the current DFS path.',
      problem: 'Given a directed graph, return true if it has a cycle.',

      examples: [
        {
          input:  'V=4, edges: 0→1, 1→2, 2→3, 3→1',
          output: 'true',
          explanation: '1→2→3→1 is a cycle. In directed graphs we need a recursion stack — not just a visited array — because a visited node is only a cycle if it is on the CURRENT DFS path.'
        }
      ],

      diagramHtml: `
        <div style="display:flex;flex-direction:column;gap:12px;font-family:'JetBrains Mono',monospace;align-items:center;">
          <div style="display:flex;gap:8px;align-items:center;">
            ${['0','1','2','3'].map((v,i)=>`
            <div style="padding:5px 12px;border:2px solid ${i===0?'#ddd':i===3?'#ef4444':'#f97316'};border-radius:6px;font-weight:700;color:${i===0?'#888':i===3?'#b91c1c':'#c24d00'};">${v}</div>
            ${i<3?'<div style="color:#888;font-size:18px;">→</div>':''}`).join('')}
            <div style="color:#ef4444;font-weight:700;font-size:14px;">↩ back to 1</div>
          </div>
          <div style="width:100%;padding:10px 14px;border:2px solid #ef4444;border-radius:8px;background:#fef2f2;font-size:11px;color:#b91c1c;line-height:1.8;">
            <div><strong>visited[]</strong>: tracks all visited nodes ever</div>
            <div><strong>recStack[]</strong>: tracks nodes on the CURRENT DFS path</div>
            <div>When we visit a node that is already in recStack → CYCLE!</div>
          </div>
        </div>`,

      algorithm: 'Use two arrays: visited[] (ever seen) and recStack[] (on current DFS path). When entering a node set both to true. When backtracking, set recStack to false. If a neighbor is in recStack → cycle.',

      algoSteps: [
        {
          text: 'Step 1 — Why visited[] alone is not enough for directed graphs: In a directed graph, node B might be reachable via two paths. Seeing B again doesn\'t mean there is a cycle — only if B is on the current active path.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:12px 16px;border:2px solid #f97316;border-radius:8px;background:#fff8f0;color:#c24d00;line-height:2;">
              <div>0 → 1 → 3</div>
              <div>0 → 2 → 3  (3 visited again but no cycle!)</div>
              <div>Need recStack to distinguish: "on current path" vs "seen before"</div>
            </div>`
        },
        {
          text: 'Step 2 — On entry: mark vis[node]=true AND recStack[node]=true. Then recurse into all neighbors.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div>vis[node] = <span style="color:#a6e3a1;">true</span>;</div>
              <div>recStack[node] = <span style="color:#a6e3a1;">true</span>;</div>
              <div><span style="color:#cba6f7;">for</span> (nb : adj[node]) {</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span> (recStack[nb]) <span style="color:#cba6f7;">return true</span>; <span style="color:#585b70;">// CYCLE</span></div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span> (!vis[nb] &amp;&amp; <span style="color:#89b4fa;">dfs</span>(nb)) <span style="color:#cba6f7;">return true</span>;</div>
              <div>}</div>
            </div>`
        },
        {
          text: 'Step 3 — On exit (backtrack): mark recStack[node]=false. This is critical — when DFS finishes exploring a node\'s subtree, it is no longer on the active path.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div>recStack[node] = <span style="color:#ef4444;">false</span>; <span style="color:#585b70;">// remove from current path</span></div>
              <div><span style="color:#cba6f7;">return false</span>;</div>
            </div>`
        },
        {
          text: 'Step 4 — Full trace on 0→1→2→3→1: Enter 0,1,2,3 (all in recStack). From 3, neighbor is 1. recStack[1]=true → CYCLE DETECTED.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:12px 16px;border:2px solid #22c55e;border-radius:8px;background:#f0fdf4;color:#15803d;line-height:2;">
              <div>Enter 0: vis[0]=T, rec[0]=T</div>
              <div>&nbsp;Enter 1: vis[1]=T, rec[1]=T</div>
              <div>&nbsp;&nbsp;Enter 2: vis[2]=T, rec[2]=T</div>
              <div>&nbsp;&nbsp;&nbsp;Enter 3: vis[3]=T, rec[3]=T</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;neighbor 1: rec[1]=T → <span style="font-weight:700;">CYCLE! ✓</span></div>
            </div>`
        }
      ],

      complexity: { time: 'O(V+E)', space: 'O(V)', timeNote: 'Each vertex and edge visited once.', spaceNote: 'Two arrays of size V plus recursion stack.' },

      codes: {
        cpp: `<span class="t">bool</span> <span class="fn">dfs</span>(<span class="t">int</span> node, vector&lt;<span class="t">bool</span>&gt;&amp; vis,\n         vector&lt;<span class="t">bool</span>&gt;&amp; rec,\n         vector&lt;vector&lt;<span class="t">int</span>&gt;&gt;&amp; adj) {\n    vis[node]=rec[node]=<span class="k">true</span>;\n    <span class="k">for</span>(<span class="t">int</span> nb:adj[node]) {\n        <span class="k">if</span>(rec[nb]) <span class="k">return true</span>;\n        <span class="k">if</span>(!vis[nb]&amp;&amp;<span class="fn">dfs</span>(nb,vis,rec,adj)) <span class="k">return true</span>;\n    }\n    rec[node]=<span class="k">false</span>;\n    <span class="k">return false</span>;\n}\n<span class="t">bool</span> <span class="fn">hasCycle</span>(<span class="t">int</span> V, vector&lt;vector&lt;<span class="t">int</span>&gt;&gt;&amp; adj){\n    vector&lt;<span class="t">bool</span>&gt; vis(V,<span class="k">false</span>),rec(V,<span class="k">false</span>);\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;V;i++)\n        <span class="k">if</span>(!vis[i]&amp;&amp;<span class="fn">dfs</span>(i,vis,rec,adj)) <span class="k">return true</span>;\n    <span class="k">return false</span>;\n}`,
        java: `<span class="t">boolean</span> <span class="fn">dfs</span>(<span class="t">int</span> node, <span class="t">boolean</span>[] vis, <span class="t">boolean</span>[] rec,\n             List&lt;List&lt;<span class="t">Integer</span>&gt;&gt; adj) {\n    vis[node]=rec[node]=<span class="k">true</span>;\n    <span class="k">for</span>(<span class="t">int</span> nb:adj.<span class="fn">get</span>(node)){\n        <span class="k">if</span>(rec[nb]) <span class="k">return true</span>;\n        <span class="k">if</span>(!vis[nb]&amp;&amp;<span class="fn">dfs</span>(nb,vis,rec,adj)) <span class="k">return true</span>;\n    }\n    rec[node]=<span class="k">false</span>;\n    <span class="k">return false</span>;\n}`,
        python: `<span class="k">def</span> <span class="fn">has_cycle</span>(V, adj):\n    vis=[<span class="k">False</span>]*V; rec=[<span class="k">False</span>]*V\n    <span class="k">def</span> <span class="fn">dfs</span>(node):\n        vis[node]=rec[node]=<span class="k">True</span>\n        <span class="k">for</span> nb <span class="k">in</span> adj[node]:\n            <span class="k">if</span> rec[nb]: <span class="k">return True</span>\n            <span class="k">if not</span> vis[nb] <span class="k">and</span> <span class="fn">dfs</span>(nb): <span class="k">return True</span>\n        rec[node]=<span class="k">False</span>; <span class="k">return False</span>\n    <span class="k">for</span> i <span class="k">in</span> <span class="fn">range</span>(V):\n        <span class="k">if not</span> vis[i] <span class="k">and</span> <span class="fn">dfs</span>(i): <span class="k">return True</span>\n    <span class="k">return False</span>`,
        javascript: `<span class="k">function</span> <span class="fn">hasCycle</span>(V, adj){\n    <span class="k">const</span> vis=<span class="k">new</span> Array(V).<span class="fn">fill</span>(<span class="k">false</span>);\n    <span class="k">const</span> rec=<span class="k">new</span> Array(V).<span class="fn">fill</span>(<span class="k">false</span>);\n    <span class="k">function</span> <span class="fn">dfs</span>(node){\n        vis[node]=rec[node]=<span class="k">true</span>;\n        <span class="k">for</span>(<span class="k">const</span> nb <span class="k">of</span> adj[node]){\n            <span class="k">if</span>(rec[nb]) <span class="k">return true</span>;\n            <span class="k">if</span>(!vis[nb]&amp;&amp;<span class="fn">dfs</span>(nb)) <span class="k">return true</span>;\n        }\n        rec[node]=<span class="k">false</span>; <span class="k">return false</span>;\n    }\n    <span class="k">for</span>(<span class="k">let</span> i=<span class="n">0</span>;i&lt;V;i++)\n        <span class="k">if</span>(!vis[i]&amp;&amp;<span class="fn">dfs</span>(i)) <span class="k">return true</span>;\n    <span class="k">return false</span>;\n}`
      }
    }

    ,{
      id: 'graph5',
      name: 'Topological Sort (Kahn\'s BFS Algorithm)',
      badge: 'Graph',
      desc: 'Produce a linear ordering of vertices such that for every directed edge u→v, u appears before v.',
      problem: 'Given a Directed Acyclic Graph (DAG), return a topological ordering of vertices using Kahn\'s algorithm.',

      examples: [
        {
          input:  'V=6, edges: 5→2, 5→0, 4→0, 4→1, 2→3, 3→1',
          output: '[4, 5, 0, 2, 3, 1] (one valid ordering)',
          explanation: 'Vertices with no incoming edges (indegree=0) go first: 4 and 5. Each removal may reduce indegree of neighbors to 0, making them next candidates.'
        }
      ],

      diagramHtml: `
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px;color:#555;line-height:2.1;">
          <div style="color:#f97316;font-weight:700;">Initial indegrees: 0→2, 1→2, 2→1, 3→1, 4→0, 5→0</div>
          <div style="width:100%;border-radius:8px;overflow:hidden;border:1px solid #333;margin-top:6px;">
            <div style="display:flex;background:#252525;padding:6px 10px;font-size:10px;color:#888;font-weight:700;">
              <div style="width:60px;">Step</div><div style="flex:1;">Queue</div><div style="flex:1;">Process</div><div style="flex:1;">Result</div>
            </div>
            ${[['Start','[4,5]','—','[]'],
               ['1','[5]','Pop 4 → dec indeg of 0,1','[4]'],
               ['2','[0]','Pop 5 → dec indeg of 2,0','[4,5]'],
               ['3','[2]','Pop 0','[4,5,0]'],
               ['4','[3]','Pop 2 → dec indeg of 3','[4,5,0,2]'],
               ['5','[1]','Pop 3 → dec indeg of 1','[4,5,0,2,3]'],
               ['6','[]','Pop 1','[4,5,0,2,3,1] ✓']
              ].map(([s,q,p,r],i)=>`
            <div style="display:flex;padding:6px 10px;background:${i%2===0?'#1a1a2e':'#161616'};font-size:11px;">
              <div style="width:60px;color:#888;">${s}</div>
              <div style="flex:1;color:#3b82f6;">${q}</div>
              <div style="flex:1;color:#cdd6f4;">${p}</div>
              <div style="flex:1;color:#22c55e;font-weight:${i===6?'700':'400'};">${r}</div>
            </div>`).join('')}
          </div>
        </div>`,

      algorithm: 'Compute indegree of every vertex. Enqueue all vertices with indegree=0. While queue not empty: dequeue a vertex, add to result, decrement indegree of all its neighbors. If any neighbor indegree becomes 0, enqueue it.',

      algoSteps: [
        {
          text: 'Step 1 — Compute indegrees: For every edge u→v, increment indegree[v]. Vertices with indegree=0 have no prerequisites — they can go first.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div>vector indeg(V, 0);</div>
              <div><span style="color:#cba6f7;">for</span> (u=0..V) <span style="color:#cba6f7;">for</span> (v:adj[u]) indeg[v]++;</div>
            </div>`
        },
        {
          text: 'Step 2 — Seed the queue: Push all vertices with indegree=0 into the queue. These are the starting points (have no dependencies).',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#cba6f7;">for</span> (i=0..V)</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span> (indeg[i] == <span style="color:#a6e3a1;">0</span>) q.<span style="color:#89b4fa;">push</span>(i);</div>
            </div>`
        },
        {
          text: 'Step 3 — Process: Dequeue node u, add to result. For each neighbor v of u, decrement indeg[v]. If indeg[v] becomes 0, enqueue v — it\'s now ready.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#cba6f7;">while</span> (!q.<span style="color:#89b4fa;">empty</span>()) {</div>
              <div>&nbsp;&nbsp;<span style="color:#89dceb;">int</span> u = q.<span style="color:#89b4fa;">front</span>(); q.<span style="color:#89b4fa;">pop</span>();</div>
              <div>&nbsp;&nbsp;result.<span style="color:#89b4fa;">push_back</span>(u);</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">for</span> (v:adj[u])</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(--indeg[v]==<span style="color:#a6e3a1;">0</span>) q.<span style="color:#89b4fa;">push</span>(v);</div>
              <div>}</div>
            </div>`
        },
        {
          text: 'Step 4 — Cycle detection bonus: If result.size() < V, the graph has a cycle (some nodes never reached indegree=0).',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 14px;border:2px solid #f97316;border-radius:8px;background:#fff8f0;color:#c24d00;line-height:2;">
              if (result.size() &lt; V) → CYCLE EXISTS (not a DAG)
            </div>`
        }
      ],

      complexity: { time: 'O(V+E)', space: 'O(V)', timeNote: 'Every vertex and edge processed once.', spaceNote: 'Indegree array and queue — both O(V).' },

      codes: {
        cpp: `vector&lt;<span class="t">int</span>&gt; <span class="fn">topoSort</span>(<span class="t">int</span> V, vector&lt;vector&lt;<span class="t">int</span>&gt;&gt;&amp; adj) {\n    vector&lt;<span class="t">int</span>&gt; indeg(V,<span class="n">0</span>), res;\n    <span class="k">for</span>(<span class="t">int</span> u=<span class="n">0</span>;u&lt;V;u++)\n        <span class="k">for</span>(<span class="t">int</span> v:adj[u]) indeg[v]++;\n    queue&lt;<span class="t">int</span>&gt; q;\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;V;i++) <span class="k">if</span>(!indeg[i]) q.<span class="fn">push</span>(i);\n    <span class="k">while</span>(!q.<span class="fn">empty</span>()) {\n        <span class="t">int</span> u=q.<span class="fn">front</span>();q.<span class="fn">pop</span>();res.<span class="fn">push_back</span>(u);\n        <span class="k">for</span>(<span class="t">int</span> v:adj[u]) <span class="k">if</span>(--indeg[v]==<span class="n">0</span>) q.<span class="fn">push</span>(v);\n    }\n    <span class="k">return</span> res;\n}`,
        java: `<span class="k">public</span> List&lt;<span class="t">Integer</span>&gt; <span class="fn">topoSort</span>(<span class="t">int</span> V, List&lt;List&lt;<span class="t">Integer</span>&gt;&gt; adj){\n    <span class="t">int</span>[] indeg=<span class="k">new int</span>[V];\n    <span class="k">for</span>(<span class="t">int</span> u=<span class="n">0</span>;u&lt;V;u++) <span class="k">for</span>(<span class="t">int</span> v:adj.<span class="fn">get</span>(u)) indeg[v]++;\n    Queue&lt;<span class="t">Integer</span>&gt; q=<span class="k">new</span> LinkedList&lt;&gt;();\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;V;i++) <span class="k">if</span>(indeg[i]==<span class="n">0</span>) q.<span class="fn">add</span>(i);\n    List&lt;<span class="t">Integer</span>&gt; res=<span class="k">new</span> ArrayList&lt;&gt;();\n    <span class="k">while</span>(!q.<span class="fn">isEmpty</span>()){\n        <span class="t">int</span> u=q.<span class="fn">poll</span>(); res.<span class="fn">add</span>(u);\n        <span class="k">for</span>(<span class="t">int</span> v:adj.<span class="fn">get</span>(u)) <span class="k">if</span>(--indeg[v]==<span class="n">0</span>) q.<span class="fn">add</span>(v);\n    }\n    <span class="k">return</span> res;\n}`,
        python: `<span class="k">from</span> collections <span class="k">import</span> deque\n<span class="k">def</span> <span class="fn">topo_sort</span>(V, adj):\n    indeg=[<span class="n">0</span>]*V\n    <span class="k">for</span> u <span class="k">in</span> <span class="fn">range</span>(V):\n        <span class="k">for</span> v <span class="k">in</span> adj[u]: indeg[v]+=<span class="n">1</span>\n    q=deque(i <span class="k">for</span> i <span class="k">in</span> <span class="fn">range</span>(V) <span class="k">if</span> indeg[i]==<span class="n">0</span>)\n    res=[]\n    <span class="k">while</span> q:\n        u=q.<span class="fn">popleft</span>(); res.<span class="fn">append</span>(u)\n        <span class="k">for</span> v <span class="k">in</span> adj[u]:\n            indeg[v]-=<span class="n">1</span>\n            <span class="k">if</span> indeg[v]==<span class="n">0</span>: q.<span class="fn">append</span>(v)\n    <span class="k">return</span> res`,
        javascript: `<span class="k">function</span> <span class="fn">topoSort</span>(V, adj) {\n    <span class="k">const</span> indeg=<span class="k">new</span> Array(V).<span class="fn">fill</span>(<span class="n">0</span>);\n    <span class="k">for</span>(<span class="k">let</span> u=<span class="n">0</span>;u&lt;V;u++) <span class="k">for</span>(<span class="k">const</span> v <span class="k">of</span> adj[u]) indeg[v]++;\n    <span class="k">const</span> q=[],res=[];\n    <span class="k">for</span>(<span class="k">let</span> i=<span class="n">0</span>;i&lt;V;i++) <span class="k">if</span>(!indeg[i]) q.<span class="fn">push</span>(i);\n    <span class="k">while</span>(q.length){\n        <span class="k">const</span> u=q.<span class="fn">shift</span>(); res.<span class="fn">push</span>(u);\n        <span class="k">for</span>(<span class="k">const</span> v <span class="k">of</span> adj[u]) <span class="k">if</span>(--indeg[v]===<span class="n">0</span>) q.<span class="fn">push</span>(v);\n    }\n    <span class="k">return</span> res;\n}`

      algorithm: 'Use a min-priority queue (min-heap). Start with dist[src]=0, all others=∞. At each step, pop the node with minimum distance. For each neighbor, if dist[u]+weight < dist[v], update dist[v] and push to heap.',

      algoSteps: [
        {
          text: 'Step 1 — Initialize: dist[src]=0, all others=∞. Push (0, src) into the min-heap (heap stores pairs of (distance, node)).',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div>vector dist(V, INT_MAX); dist[src]=<span style="color:#a6e3a1;">0</span>;</div>
              <div>priority_queue (min-heap) pq;</div>
              <div>pq.<span style="color:#89b4fa;">push</span>({<span style="color:#a6e3a1;">0</span>, src}); <span style="color:#585b70;">// {distance, node}</span></div>
            </div>`
        },
        {
          text: 'Step 2 — Greedy extraction: Pop the (dist, node) pair with minimum distance. If dist > dist[node], skip (this is an outdated entry). Otherwise process all neighbors.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div>auto [d, u] = pq.<span style="color:#89b4fa;">top</span>(); pq.<span style="color:#89b4fa;">pop</span>();</div>
              <div><span style="color:#cba6f7;">if</span> (d &gt; dist[u]) <span style="color:#cba6f7;">continue</span>; <span style="color:#585b70;">// stale entry</span></div>
            </div>`
        },
        {
          text: 'Step 3 — Relaxation: For each edge u→v with weight w: if dist[u]+w < dist[v], update dist[v] and push (dist[v], v) into the heap.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#cba6f7;">for</span> ([v,w] : adj[u]) {</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span> (dist[u]+w &lt; dist[v]) {</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;dist[v] = dist[u]+w;</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;pq.<span style="color:#89b4fa;">push</span>({dist[v], v});</div>
              <div>&nbsp;&nbsp;}</div>
              <div>}</div>
            </div>`
        },
        {
          text: 'Step 4 — Key insight: Because we always process the minimum distance node first (greedy), once a node is popped, its distance is finalized and will never change.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 14px;border:2px solid #22c55e;border-radius:8px;background:#f0fdf4;color:#15803d;line-height:2;">
              Min-heap guarantees: when we pop node u, dist[u] is the SHORTEST possible distance.
              This is the core greedy property of Dijkstra's.
            </div>`
        }
      ],

      complexity: { time: 'O((V+E) log V)', space: 'O(V+E)', timeNote: 'Each node/edge processed once; heap operations are O(log V).', spaceNote: 'Heap + dist array + adjacency list.' },

      codes: {
        cpp: `vector&lt;<span class="t">int</span>&gt; <span class="fn">dijkstra</span>(<span class="t">int</span> V, vector&lt;vector&lt;pair&lt;<span class="t">int</span>,<span class="t">int</span>&gt;&gt;&gt;&amp; adj, <span class="t">int</span> src){\n    vector&lt;<span class="t">int</span>&gt; dist(V, INT_MAX);\n    priority_queue&lt;pair&lt;<span class="t">int</span>,<span class="t">int</span>&gt;,vector&lt;pair&lt;<span class="t">int</span>,<span class="t">int</span>&gt;&gt;,greater&lt;&gt;&gt; pq;\n    dist[src]=<span class="n">0</span>; pq.<span class="fn">push</span>({<span class="n">0</span>,src});\n    <span class="k">while</span>(!pq.<span class="fn">empty</span>()){\n        auto[d,u]=pq.<span class="fn">top</span>();pq.<span class="fn">pop</span>();\n        <span class="k">if</span>(d>dist[u]) <span class="k">continue</span>;\n        <span class="k">for</span>(auto[v,w]:adj[u])\n            <span class="k">if</span>(dist[u]+w<dist[v]){\n                dist[v]=dist[u]+w;\n                pq.<span class="fn">push</span>({dist[v],v});\n            }\n    }\n    <span class="k">return</span> dist;\n}`,
        java: `<span class="k">public int</span>[] <span class="fn">dijkstra</span>(<span class="t">int</span> V, List&lt;List&lt;<span class="t">int</span>[]&gt;&gt; adj, <span class="t">int</span> src){\n    <span class="t">int</span>[] dist=<span class="k">new int</span>[V]; Arrays.<span class="fn">fill</span>(dist,Integer.MAX_VALUE);\n    dist[src]=<span class="n">0</span>;\n    PriorityQueue&lt;<span class="t">int</span>[]&gt; pq=<span class="k">new</span> PriorityQueue&lt;&gt;((a,b)->a[<span class="n">0</span>]-b[<span class="n">0</span>]);\n    pq.<span class="fn">add</span>(<span class="k">new int</span>[]{<span class="n">0</span>,src});\n    <span class="k">while</span>(!pq.<span class="fn">isEmpty</span>()){\n        <span class="t">int</span>[] cur=pq.<span class="fn">poll</span>();\n        <span class="k">if</span>(cur[<span class="n">0</span>]>dist[cur[<span class="n">1</span>]]) <span class="k">continue</span>;\n        <span class="k">for</span>(<span class="t">int</span>[] nb:adj.<span class="fn">get</span>(cur[<span class="n">1</span>]))\n            <span class="k">if</span>(dist[cur[<span class="n">1</span>]]+nb[<span class="n">1</span>]<dist[nb[<span class="n">0</span>]]){\n                dist[nb[<span class="n">0</span>]]=dist[cur[<span class="n">1</span>]]+nb[<span class="n">1</span>];\n                pq.<span class="fn">add</span>(<span class="k">new int</span>[]{dist[nb[<span class="n">0</span>]],nb[<span class="n">0</span>]});\n            }\n    }\n    <span class="k">return</span> dist;\n}`,
        python: `<span class="k">import</span> heapq\n<span class="k">def</span> <span class="fn">dijkstra</span>(V, adj, src):\n    dist=[<span class="fn">float</span>(<span class="s">'inf'</span>)]*V\n    dist[src]=<span class="n">0</span>; pq=[(0,src)]\n    <span class="k">while</span> pq:\n        d,u=heapq.<span class="fn">heappop</span>(pq)\n        <span class="k">if</span> d>dist[u]: <span class="k">continue</span>\n        <span class="k">for</span> v,w <span class="k">in</span> adj[u]:\n            <span class="k">if</span> dist[u]+w<dist[v]:\n                dist[v]=dist[u]+w\n                heapq.<span class="fn">heappush</span>(pq,(dist[v],v))\n    <span class="k">return</span> dist`,
        javascript: `<span class="k">function</span> <span class="fn">dijkstra</span>(V, adj, src){\n    <span class="k">const</span> dist=<span class="k">new</span> Array(V).<span class="fn">fill</span>(Infinity);\n    dist[src]=<span class="n">0</span>;\n    <span class="k">const</span> pq=[[<span class="n">0</span>,src]]; <span class="c">// min-heap via sorted array (use proper heap in prod)</span>\n    <span class="k">while</span>(pq.length){\n        pq.<span class="fn">sort</span>((a,b)=>a[<span class="n">0</span>]-b[<span class="n">0</span>]);\n        <span class="k">const</span>[d,u]=pq.<span class="fn">shift</span>();\n        <span class="k">if</span>(d>dist[u]) <span class="k">continue</span>;\n        <span class="k">for</span>(<span class="k">const</span>[v,w] <span class="k">of</span> adj[u])\n            <span class="k">if</span>(dist[u]+w<dist[v]){\n                dist[v]=dist[u]+w;\n                pq.<span class="fn">push</span>([dist[v],v]);\n            }\n    }\n    <span class="k">return</span> dist;\n}`
      }
    }

    ,{
      id: 'graph7',
      name: 'Bellman-Ford Algorithm',
      badge: 'Graph',
      desc: 'Find shortest paths from a source even with negative edge weights, and detect negative weight cycles.',
      problem: 'Given a directed weighted graph (may have negative edges), find shortest distance from source to all vertices. Return [-1] if a negative cycle exists.',

      examples: [
        {
          input:  'V=5, src=0\nEdges: 0→1(6), 0→2(7), 1→3(5), 1→2(8), 1→4(-4), 2→4(9), 3→1(-2), 4→3(7)',
          output: 'dist=[0, 2, 7, 4, -2]',
          explanation: 'Bellman-Ford relaxes ALL edges V-1 times. Negative edges are handled unlike Dijkstra.'
        }
      ],

      diagramHtml: `
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px;color:#555;line-height:2.1;">
          <div style="color:#f97316;font-weight:700;">Bellman-Ford: Relax ALL edges V-1 times</div>
          <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;">
            <div style="padding:10px 14px;border:2px solid #3b82f6;border-radius:8px;background:#eff6ff;flex:1;min-width:140px;">
              <div style="font-size:10px;color:#3b82f6;font-weight:700;margin-bottom:4px;">After iteration 1</div>

              <div style="font-size:11px;">0:0  1:2  2:7  3:4  4:-2 ✓</div>
            </div>
          </div>
        </div>`,

      algorithm: 'Relax all edges V-1 times (V = number of vertices). Each iteration guarantees at least one more node\'s shortest path is finalized. After V-1 iterations, do one more pass — if any distance still decreases, a negative cycle exists.',

      algoSteps: [
        {
          text: 'Step 1 — Initialize: dist[src]=0, all others=∞.',
          diagramHtml: null
        },
        {
          text: 'Step 2 — Relax V-1 times: For every edge (u,v,w): if dist[u]+w < dist[v], update dist[v]. Repeat this entire process V-1 times.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#cba6f7;">for</span> (i=0; i&lt;V-<span style="color:#a6e3a1;">1</span>; i++)</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">for</span> ([u,v,w] : edges)</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(dist[u]!=INF &amp;&amp; dist[u]+w &lt; dist[v])</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;dist[v] = dist[u]+w;</div>
            </div>`
        },
        {
          text: 'Step 3 — Negative cycle check: Do one more relaxation pass. If any distance can still be reduced, there is a negative-weight cycle (a path that keeps getting shorter forever).',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#cba6f7;">for</span> ([u,v,w] : edges)</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(dist[u]+w &lt; dist[v])</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#cba6f7;">return</span> <span style="color:#fab387;">"Negative Cycle!"</span>;</div>
            </div>`
        },
        {
          text: 'Step 4 — Why V-1 relaxations? The longest possible shortest path in a graph without negative cycles has at most V-1 edges. After k relaxations, all shortest paths using at most k edges are finalized.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 14px;border:2px solid #f97316;border-radius:8px;background:#fff8f0;color:#c24d00;line-height:2;">
              Shortest path can have at most V-1 edges (no cycles).
              So V-1 relaxation rounds are always enough.
            </div>`
        }
      ],

      complexity: { time: 'O(V×E)', space: 'O(V)', timeNote: 'V-1 passes each processing all E edges.', spaceNote: 'Only the dist array of size V.' },

      codes: {
        cpp: `vector&lt;<span class="t">int</span>&gt; <span class="fn">bellmanFord</span>(<span class="t">int</span> V, vector&lt;tuple&lt;<span class="t">int</span>,<span class="t">int</span>,<span class="t">int</span>&gt;&gt;&amp; edges, <span class="t">int</span> src){\n    vector&lt;<span class="t">int</span>&gt; dist(V, INT_MAX);\n    dist[src]=<span class="n">0</span>;\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;V-<span class="n">1</span>;i++)\n        <span class="k">for</span>(auto[u,v,w]:edges)\n            <span class="k">if</span>(dist[u]!=INT_MAX&amp;&amp;dist[u]+w&lt;dist[v]) dist[v]=dist[u]+w;\n    <span class="k">for</span>(auto[u,v,w]:edges)\n        <span class="k">if</span>(dist[u]!=INT_MAX&amp;&amp;dist[u]+w&lt;dist[v])\n            <span class="k">return</span> {-<span class="n">1</span>}; <span class="c">// negative cycle</span>\n    <span class="k">return</span> dist;\n}`,
        java: `<span class="k">public int</span>[] <span class="fn">bellmanFord</span>(<span class="t">int</span> V, <span class="t">int</span>[][] edges, <span class="t">int</span> src){\n    <span class="t">int</span>[] dist=<span class="k">new int</span>[V]; Arrays.<span class="fn">fill</span>(dist,Integer.MAX_VALUE);\n    dist[src]=<span class="n">0</span>;\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;V-<span class="n">1</span>;i++)\n        <span class="k">for</span>(<span class="t">int</span>[] e:edges)\n            <span class="k">if</span>(dist[e[<span class="n">0</span>]]!=Integer.MAX_VALUE&amp;&amp;dist[e[<span class="n">0</span>]]+e[<span class="n">2</span>]&lt;dist[e[<span class="n">1</span>]])\n                dist[e[<span class="n">1</span>]]=dist[e[<span class="n">0</span>]]+e[<span class="n">2</span>];\n    <span class="k">for</span>(<span class="t">int</span>[] e:edges)\n        <span class="k">if</span>(dist[e[<span class="n">0</span>]]!=Integer.MAX_VALUE&amp;&amp;dist[e[<span class="n">0</span>]]+e[<span class="n">2</span>]&lt;dist[e[<span class="n">1</span>]])\n            <span class="k">return new int</span>[]{-<span class="n">1</span>};\n    <span class="k">return</span> dist;\n}`,
        python: `<span class="k">def</span> <span class="fn">bellman_ford</span>(V, edges, src):\n    dist=[<span class="fn">float</span>(<span class="s">'inf'</span>)]*V; dist[src]=<span class="n">0</span>\n    <span class="k">for</span> _ <span class="k">in</span> <span class="fn">range</span>(V-<span class="n">1</span>):\n        <span class="k">for</span> u,v,w <span class="k">in</span> edges:\n            <span class="k">if</span> dist[u]!=<span class="fn">float</span>(<span class="s">'inf'</span>) <span class="k">and</span> dist[u]+w<dist[v]:\n                dist[v]=dist[u]+w\n    <span class="k">for</span> u,v,w <span class="k">in</span> edges:\n        <span class="k">if</span> dist[u]!=<span class="fn">float</span>(<span class="s">'inf'</span>) <span class="k">and</span> dist[u]+w<dist[v]:\n            <span class="k">return</span> [-<span class="n">1</span>]\n    <span class="k">return</span> dist`,
        javascript: `<span class="k">function</span> <span class="fn">bellmanFord</span>(V, edges, src){\n    <span class="k">const</span> dist=<span class="k">new</span> Array(V).<span class="fn">fill</span>(Infinity); dist[src]=<span class="n">0</span>;\n    <span class="k">for</span>(<span class="k">let</span> i=<span class="n">0</span>;i&lt;V-<span class="n">1</span>;i++)\n        <span class="k">for</span>(<span class="k">const</span>[u,v,w] <span class="k">of</span> edges)\n            <span class="k">if</span>(dist[u]!==Infinity&amp;&amp;dist[u]+w&lt;dist[v]) dist[v]=dist[u]+w;\n    <span class="k">for</span>(<span class="k">const</span>[u,v,w] <span class="k">of</span> edges)\n        <span class="k">if</span>(dist[u]!==Infinity&amp;&amp;dist[u]+w&lt;dist[v]) <span class="k">return</span> [-<span class="n">1</span>];\n    <span class="k">return</span> dist;\n}`

        {

      codes: {

      diagramHtml: `
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px;color:#555;line-height:2.1;">

      algorithm: 'Each element starts as its own set. find(x) returns the root of x\'s set (with path compression). union(x,y) merges the sets of x and y (by rank to keep trees shallow).',

      algoSteps: [
        {
          text: 'Step 1 — Initialize: parent[i]=i (each node is its own parent/root). rank[i]=0 (all trees have depth 0).',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#cba6f7;">for</span>(i=0..V) { parent[i]=i; rank[i]=<span style="color:#a6e3a1;">0</span>; }</div>
            </div>`
        },
        {
          text: 'Step 2 — find(x) with path compression: Follow parent pointers until you reach a root (parent[x]==x). On the way back up, point all visited nodes directly to root (path compression). This flattens the tree.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#89dceb;">int</span> <span style="color:#89b4fa;">find</span>(x) {</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(parent[x] != x)</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;parent[x] = <span style="color:#89b4fa;">find</span>(parent[x]); <span style="color:#585b70;">// path compress</span></div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">return</span> parent[x];</div>
              <div>}</div>
            </div>`
        },
        {
          text: 'Step 3 — union(x,y) by rank: Find roots of x and y. If same root → already connected (cycle!). Otherwise merge the smaller-rank tree under the larger-rank root.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#89dceb;">bool</span> <span style="color:#89b4fa;">unite</span>(x, y) {</div>
              <div>&nbsp;&nbsp;rx=<span style="color:#89b4fa;">find</span>(x); ry=<span style="color:#89b4fa;">find</span>(y);</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(rx==ry) <span style="color:#cba6f7;">return false</span>; <span style="color:#585b70;">// cycle!</span></div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(rank[rx]&lt;rank[ry]) swap(rx,ry);</div>
              <div>&nbsp;&nbsp;parent[ry]=rx;</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(rank[rx]==rank[ry]) rank[rx]++;</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">return true</span>;</div>
              <div>}</div>
            </div>`
        },
        {
          text: 'Step 4 — Path compression + union by rank: Together these two optimizations give amortized O(α(N)) per operation where α is the inverse Ackermann function — practically constant.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 14px;border:2px solid #22c55e;border-radius:8px;background:#f0fdf4;color:#15803d;line-height:2;">
              Path compression: flat tree → find is O(1) after first call
              Union by rank: balanced tree → no deep chains ever form
            </div>`
        }
      ],

      complexity: { time: 'O(α(N)) per operation', space: 'O(V)', timeNote: 'α (inverse Ackermann) is practically constant (≤4 for all practical inputs).', spaceNote: 'Two arrays of size V: parent and rank.' },

      codes: {
        cpp: `<span class="k">struct</span> <span class="t">DSU</span> {\n    vector&lt;<span class="t">int</span>&gt; parent, rank;\n    <span class="fn">DSU</span>(<span class="t">int</span> n):parent(n),rank(n,<span class="n">0</span>){\n        iota(parent.<span class="fn">begin</span>(),parent.<span class="fn">end</span>(),<span class="n">0</span>);}\n    <span class="t">int</span> <span class="fn">find</span>(<span class="t">int</span> x){\n        <span class="k">return</span> parent[x]==x ? x : parent[x]=<span class="fn">find</span>(parent[x]);}\n    <span class="t">bool</span> <span class="fn">unite</span>(<span class="t">int</span> x, <span class="t">int</span> y){\n        <span class="t">int</span> rx=<span class="fn">find</span>(x),ry=<span class="fn">find</span>(y);\n        <span class="k">if</span>(rx==ry) <span class="k">return false</span>;\n        <span class="k">if</span>(rank[rx]&lt;rank[ry]) swap(rx,ry);\n        parent[ry]=rx;\n        <span class="k">if</span>(rank[rx]==rank[ry]) rank[rx]++;\n        <span class="k">return true</span>;}\n};`,
        java: `<span class="k">class</span> <span class="t">DSU</span> {\n    <span class="t">int</span>[] parent, rank;\n    <span class="fn">DSU</span>(<span class="t">int</span> n){\n        parent=<span class="k">new int</span>[n]; rank=<span class="k">new int</span>[n];\n        <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;n;i++) parent[i]=i;\n    }\n    <span class="t">int</span> <span class="fn">find</span>(<span class="t">int</span> x){\n        <span class="k">return</span> parent[x]==x ? x : (parent[x]=<span class="fn">find</span>(parent[x]));}\n    <span class="t">boolean</span> <span class="fn">unite</span>(<span class="t">int</span> x, <span class="t">int</span> y){\n        <span class="t">int</span> rx=<span class="fn">find</span>(x),ry=<span class="fn">find</span>(y);\n        <span class="k">if</span>(rx==ry) <span class="k">return false</span>;\n        <span class="k">if</span>(rank[rx]&lt;rank[ry]){<span class="t">int</span> t=rx;rx=ry;ry=t;}\n        parent[ry]=rx;\n        <span class="k">if</span>(rank[rx]==rank[ry]) rank[rx]++;\n        <span class="k">return true</span>;}\n}`,
        python: `<span class="k">class</span> <span class="t">DSU</span>:\n    <span class="k">def</span> <span class="fn">__init__</span>(self,n):\n        self.parent=<span class="fn">list</span>(<span class="fn">range</span>(n)); self.rank=[<span class="n">0</span>]*n\n    <span class="k">def</span> <span class="fn">find</span>(self,x):\n        <span class="k">if</span> self.parent[x]!=x:\n            self.parent[x]=self.<span class="fn">find</span>(self.parent[x])\n        <span class="k">return</span> self.parent[x]\n    <span class="k">def</span> <span class="fn">unite</span>(self,x,y):\n        rx,ry=self.<span class="fn">find</span>(x),self.<span class="fn">find</span>(y)\n        <span class="k">if</span> rx==ry: <span class="k">return False</span>\n        <span class="k">if</span> self.rank[rx]<self.rank[ry]: rx,ry=ry,rx\n        self.parent[ry]=rx\n        <span class="k">if</span> self.rank[rx]==self.rank[ry]: self.rank[rx]+=<span class="n">1</span>\n        <span class="k">return True</span>`,
        javascript: `<span class="k">class</span> <span class="t">DSU</span> {\n    <span class="fn">constructor</span>(n){\n        this.parent=[...Array(n).<span class="fn">keys</span>()];\n        this.rank=<span class="k">new</span> Array(n).<span class="fn">fill</span>(<span class="n">0</span>);\n    }\n    <span class="fn">find</span>(x){\n        <span class="k">if</span>(this.parent[x]!==x)\n            this.parent[x]=this.<span class="fn">find</span>(this.parent[x]);\n        <span class="k">return</span> this.parent[x];\n    }\n    <span class="fn">unite</span>(x,y){\n        <span class="k">let</span> rx=this.<span class="fn">find</span>(x),ry=this.<span class="fn">find</span>(y);\n        <span class="k">if</span>(rx===ry) <span class="k">return false</span>;\n        <span class="k">if</span>(this.rank[rx]<this.rank[ry])[rx,ry]=[ry,rx];\n        this.parent[ry]=rx;\n        <span class="k">if</span>(this.rank[rx]===this.rank[ry]) this.rank[rx]++;\n        <span class="k">return true</span>;\n    }\n}`
      }

      algorithm: 'Sort all edges by weight. Use DSU to track connected components. For each edge (in order): if it doesn\'t create a cycle (u and v have different roots), add it to MST. Stop when MST has V-1 edges.',

      algoSteps: [
        {
          text: 'Step 1 — Sort all edges by weight in ascending order. The cheapest edge always gets considered first (greedy).',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div>sort(edges, by weight ascending);</div>
            </div>`
        },
        {
          text: 'Step 2 — Initialize DSU with V components (each vertex is its own component).',
          diagramHtml: null
        },
        {
          text: 'Step 3 — For each edge (u,v,w): if find(u) ≠ find(v), unite them and add edge to MST. If find(u)==find(v), adding this edge would create a cycle — skip it.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#cba6f7;">for</span>([u,v,w]:edges) {</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(dsu.<span style="color:#89b4fa;">unite</span>(u,v)) {</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;mstWeight += w;</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;mstEdges.<span style="color:#89b4fa;">push</span>({u,v,w});</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(mstEdges.<span style="color:#89b4fa;">size</span>()==V-<span style="color:#a6e3a1;">1</span>) <span style="color:#cba6f7;">break</span>;</div>
              <div>&nbsp;&nbsp;}</div>
              <div>}</div>
            </div>`
        },
        {
          text: 'Step 4 — Stop when MST has exactly V-1 edges. A spanning tree of V vertices always has exactly V-1 edges.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 14px;border:2px solid #22c55e;border-radius:8px;background:#f0fdf4;color:#15803d;line-height:2;">
              MST always has exactly V-1 edges.
              We greedily choose the cheapest edge that doesn't create a cycle.
            </div>`
        }
      ],

      complexity: { time: 'O(E log E)', space: 'O(V+E)', timeNote: 'Sorting edges dominates — O(E log E). DSU operations are nearly O(1).', spaceNote: 'DSU arrays O(V) + edge list O(E).' },

      codes: {
        cpp: `<span class="t">int</span> <span class="fn">kruskal</span>(<span class="t">int</span> V, vector&lt;tuple&lt;<span class="t">int</span>,<span class="t">int</span>,<span class="t">int</span>&gt;&gt;&amp; edges){\n    sort(edges.<span class="fn">begin</span>(),edges.<span class="fn">end</span>());\n    <span class="t">DSU</span> dsu(V);\n    <span class="t">int</span> mst=<span class="n">0</span>;\n    <span class="k">for</span>(auto[w,u,v]:edges) <span class="c">// sorted by weight first</span>\n        <span class="k">if</span>(dsu.<span class="fn">unite</span>(u,v)) mst+=w;\n    <span class="k">return</span> mst;\n}`,
        java: `<span class="k">public int</span> <span class="fn">kruskal</span>(<span class="t">int</span> V, <span class="t">int</span>[][] edges){\n    Arrays.<span class="fn">sort</span>(edges,(a,b)->a[<span class="n">2</span>]-b[<span class="n">2</span>]);\n    DSU dsu=<span class="k">new</span> <span class="fn">DSU</span>(V);\n    <span class="t">int</span> mst=<span class="n">0</span>;\n    <span class="k">for</span>(<span class="t">int</span>[] e:edges)\n        <span class="k">if</span>(dsu.<span class="fn">unite</span>(e[<span class="n">0</span>],e[<span class="n">1</span>])) mst+=e[<span class="n">2</span>];\n    <span class="k">return</span> mst;\n}`,
        python: `<span class="k">def</span> <span class="fn">kruskal</span>(V, edges):\n    edges.<span class="fn">sort</span>(key=<span class="k">lambda</span> e: e[<span class="n">2</span>])\n    dsu=<span class="fn">DSU</span>(V); mst=<span class="n">0</span>\n    <span class="k">for</span> u,v,w <span class="k">in</span> edges:\n        <span class="k">if</span> dsu.<span class="fn">unite</span>(u,v): mst+=w\n    <span class="k">return</span> mst`,
        javascript: `<span class="k">function</span> <span class="fn">kruskal</span>(V, edges){\n    edges.<span class="fn">sort</span>((a,b)=>a[<span class="n">2</span>]-b[<span class="n">2</span>]);\n    <span class="k">const</span> dsu=<span class="k">new</span> <span class="fn">DSU</span>(V); <span class="k">let</span> mst=<span class="n">0</span>;\n    <span class="k">for</span>(<span class="k">const</span>[u,v,w] <span class="k">of</span> edges)\n        <span class="k">if</span>(dsu.<span class="fn">unite</span>(u,v)) mst+=w;\n    <span class="k">return</span> mst;\n}`
      }
    }

    ,{

      desc: 'Check if a graph can be colored with 2 colors such that no two adjacent vertices share the same color.',

      diagramHtml: `

      algorithm: 'BFS/DFS coloring: Start from any node, color it 0. Color all its neighbors 1. Color all their neighbors 0, and so on. If you ever try to color a node that already has the same color as its parent — NOT bipartite.',

      algoSteps: [
        {
          text: 'Step 1 — Intuition: A graph is bipartite if and only if it has NO odd-length cycles. The 2-coloring BFS detects this automatically.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 14px;border:2px solid #f97316;border-radius:8px;background:#fff8f0;color:#c24d00;line-height:2;">
              Even cycle (0-1-2-3): can be 2-colored ✓
              Odd cycle (0-1-2-0): CANNOT be 2-colored ✗
            </div>`
        },
        {
          text: 'Step 2 — BFS coloring: Assign color 0 to source. Push to queue. For each dequeued node: for each uncolored neighbor, assign opposite color and enqueue. If neighbor already has same color → NOT bipartite.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div>color[src] = <span style="color:#a6e3a1;">0</span>; q.<span style="color:#89b4fa;">push</span>(src);</div>
              <div><span style="color:#cba6f7;">while</span>(!q.<span style="color:#89b4fa;">empty</span>()) {</div>
              <div>&nbsp;&nbsp;u = q.<span style="color:#89b4fa;">front</span>(); q.<span style="color:#89b4fa;">pop</span>();</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">for</span>(nb:adj[u]) {</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(color[nb]==-<span style="color:#a6e3a1;">1</span>) { color[nb]=<span style="color:#a6e3a1;">1</span>-color[u]; q.<span style="color:#89b4fa;">push</span>(nb); }</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#cba6f7;">else if</span>(color[nb]==color[u]) <span style="color:#cba6f7;">return false</span>; <span style="color:#585b70;">// conflict!</span></div>
              <div>&nbsp;&nbsp;}</div>

            </div>`
        },
        {
          text: 'Step 3 — Handle disconnected graphs: Run BFS from every uncolored node. All components must be bipartite.',
          diagramHtml: null
        }
      ],

      complexity: { time: 'O(V+E)', space: 'O(V)', timeNote: 'BFS visits every vertex and edge once.', spaceNote: 'Color array and queue — both O(V).' },

      codes: {
        cpp: `<span class="t">bool</span> <span class="fn">isBipartite</span>(<span class="t">int</span> V, vector&lt;vector&lt;<span class="t">int</span>&gt;&gt;&amp; adj){\n    vector&lt;<span class="t">int</span>&gt; color(V,-<span class="n">1</span>);\n    <span class="k">for</span>(<span class="t">int</span> start=<span class="n">0</span>;start&lt;V;start++){\n        <span class="k">if</span>(color[start]!=-<span class="n">1</span>) <span class="k">continue</span>;\n        queue&lt;<span class="t">int</span>&gt; q; q.<span class="fn">push</span>(start); color[start]=<span class="n">0</span>;\n        <span class="k">while</span>(!q.<span class="fn">empty</span>()){\n            <span class="t">int</span> u=q.<span class="fn">front</span>();q.<span class="fn">pop</span>();\n            <span class="k">for</span>(<span class="t">int</span> nb:adj[u]){\n                <span class="k">if</span>(color[nb]==-<span class="n">1</span>){color[nb]=<span class="n">1</span>-color[u];q.<span class="fn">push</span>(nb);}\n                <span class="k">else if</span>(color[nb]==color[u]) <span class="k">return false</span>;\n            }\n        }\n    }\n    <span class="k">return true</span>;\n}`,
        java: `<span class="k">public boolean</span> <span class="fn">isBipartite</span>(<span class="t">int</span> V, List&lt;List&lt;<span class="t">Integer</span>&gt;&gt; adj){\n    <span class="t">int</span>[] color=<span class="k">new int</span>[V]; Arrays.<span class="fn">fill</span>(color,-<span class="n">1</span>);\n    <span class="k">for</span>(<span class="t">int</span> s=<span class="n">0</span>;s&lt;V;s++){\n        <span class="k">if</span>(color[s]!=-<span class="n">1</span>) <span class="k">continue</span>;\n        Queue&lt;<span class="t">Integer</span>&gt; q=<span class="k">new</span> LinkedList&lt;&gt;(); q.<span class="fn">add</span>(s); color[s]=<span class="n">0</span>;\n        <span class="k">while</span>(!q.<span class="fn">isEmpty</span>()){\n            <span class="t">int</span> u=q.<span class="fn">poll</span>();\n            <span class="k">for</span>(<span class="t">int</span> nb:adj.<span class="fn">get</span>(u)){\n                <span class="k">if</span>(color[nb]==-<span class="n">1</span>){color[nb]=<span class="n">1</span>-color[u];q.<span class="fn">add</span>(nb);}\n                <span class="k">else if</span>(color[nb]==color[u]) <span class="k">return false</span>;\n            }\n        }\n    }\n    <span class="k">return true</span>;\n}`,
        python: `<span class="k">from</span> collections <span class="k">import</span> deque\n<span class="k">def</span> <span class="fn">is_bipartite</span>(V, adj):\n    color=[-<span class="n">1</span>]*V\n    <span class="k">for</span> s <span class="k">in</span> <span class="fn">range</span>(V):\n        <span class="k">if</span> color[s]!=-<span class="n">1</span>: <span class="k">continue</span>\n        q=deque([s]); color[s]=<span class="n">0</span>\n        <span class="k">while</span> q:\n            u=q.<span class="fn">popleft</span>()\n            <span class="k">for</span> nb <span class="k">in</span> adj[u]:\n                <span class="k">if</span> color[nb]==-<span class="n">1</span>: color[nb]=<span class="n">1</span>-color[u]; q.<span class="fn">append</span>(nb)\n                <span class="k">elif</span> color[nb]==color[u]: <span class="k">return False</span>\n    <span class="k">return True</span>`,
        javascript: `<span class="k">function</span> <span class="fn">isBipartite</span>(V, adj){\n    <span class="k">const</span> color=<span class="k">new</span> Array(V).<span class="fn">fill</span>(-<span class="n">1</span>);\n    <span class="k">for</span>(<span class="k">let</span> s=<span class="n">0</span>;s&lt;V;s++){\n        <span class="k">if</span>(color[s]!==-<span class="n">1</span>) <span class="k">continue</span>;\n        <span class="k">const</span> q=[s]; color[s]=<span class="n">0</span>;\n        <span class="k">while</span>(q.length){\n            <span class="k">const</span> u=q.<span class="fn">shift</span>();\n            <span class="k">for</span>(<span class="k">const</span> nb <span class="k">of</span> adj[u]){\n                <span class="k">if</span>(color[nb]===-<span class="n">1</span>){color[nb]=<span class="n">1</span>-color[u];q.<span class="fn">push</span>(nb);}\n                <span class="k">else if</span>(color[nb]===color[u]) <span class="k">return false</span>;\n            }\n        }\n    }\n    <span class="k">return true</span>;\n}`
      }
    }

    ,{
      id: 'graph12',
      name: 'Clone a Graph',
      badge: 'Graph',
      desc: 'Create a complete deep copy of a graph where each node has a value and a list of neighbors.',
      problem: 'Given a reference to a node in a connected undirected graph, return a deep copy (clone) of the graph.',

      examples: [

          output: 'Deep copy with same structure but all new nodes',

      diagramHtml: `

        </div>`,

      algorithm: 'Use BFS/DFS with a hash map {original node → clone node}. When you first see a node, create its clone and store in map. For each neighbor: if not cloned yet, create it. Always use map to wire up neighbor connections.',

      algoSteps: [
        {
          text: 'Step 1 — Create clone of the start node. Add {original → clone} to the map. Push original to the BFS queue.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div>cloned[node] = <span style="color:#cba6f7;">new</span> <span style="color:#89b4fa;">Node</span>(node-&gt;val);</div>
              <div>q.<span style="color:#89b4fa;">push</span>(node);</div>
            </div>`
        },
        {
          text: 'Step 2 — BFS: Dequeue original node u. For each neighbor nb: if nb not in map, create clone and enqueue. Then add cloned[nb] to cloned[u]\'s neighbor list.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#cba6f7;">for</span>(nb : u-&gt;neighbors) {</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(!cloned.<span style="color:#89b4fa;">count</span>(nb)) {</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;cloned[nb] = <span style="color:#cba6f7;">new</span> <span style="color:#89b4fa;">Node</span>(nb-&gt;val);</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;q.<span style="color:#89b4fa;">push</span>(nb);</div>
              <div>&nbsp;&nbsp;}</div>
              <div>&nbsp;&nbsp;cloned[u]-&gt;neighbors.<span style="color:#89b4fa;">push</span>(cloned[nb]);</div>
              <div>}</div>
            </div>`
        },
        {
          text: 'Step 3 — Return cloned[start]. The map guarantees each node is created exactly once, and all neighbor connections are wired to clone nodes (not originals).',
          diagramHtml: null
        }
      ],

      complexity: { time: 'O(V+E)', space: 'O(V)', timeNote: 'Every node and edge visited once.', spaceNote: 'Hash map and queue both O(V).' },

      codes: {
        cpp: `<span class="t">Node</span>* <span class="fn">cloneGraph</span>(<span class="t">Node</span>* node){\n    <span class="k">if</span>(!node) <span class="k">return nullptr</span>;\n    unordered_map&lt;<span class="t">Node</span>*,<span class="t">Node</span>*&gt; mp;\n    queue&lt;<span class="t">Node</span>*&gt; q;\n    mp[node]=<span class="k">new</span> <span class="fn">Node</span>(node-&gt;val);\n    q.<span class="fn">push</span>(node);\n    <span class="k">while</span>(!q.<span class="fn">empty</span>()){\n        <span class="t">Node</span>* u=q.<span class="fn">front</span>();q.<span class="fn">pop</span>();\n        <span class="k">for</span>(<span class="t">Node</span>* nb:u-&gt;neighbors){\n            <span class="k">if</span>(!mp.<span class="fn">count</span>(nb)){mp[nb]=<span class="k">new</span> <span class="fn">Node</span>(nb-&gt;val);q.<span class="fn">push</span>(nb);}\n            mp[u]-&gt;neighbors.<span class="fn">push_back</span>(mp[nb]);\n        }\n    }\n    <span class="k">return</span> mp[node];\n}`,
        java: `<span class="k">public</span> <span class="t">Node</span> <span class="fn">cloneGraph</span>(<span class="t">Node</span> node){\n    <span class="k">if</span>(node==<span class="k">null</span>) <span class="k">return null</span>;\n    Map&lt;<span class="t">Node</span>,<span class="t">Node</span>&gt; mp=<span class="k">new</span> HashMap&lt;&gt;();\n    Queue&lt;<span class="t">Node</span>&gt; q=<span class="k">new</span> LinkedList&lt;&gt;();\n    mp.<span class="fn">put</span>(node,<span class="k">new</span> <span class="fn">Node</span>(node.val));\n    q.<span class="fn">add</span>(node);\n    <span class="k">while</span>(!q.<span class="fn">isEmpty</span>()){\n        <span class="t">Node</span> u=q.<span class="fn">poll</span>();\n        <span class="k">for</span>(<span class="t">Node</span> nb:u.neighbors){\n            <span class="k">if</span>(!mp.<span class="fn">containsKey</span>(nb)){mp.<span class="fn">put</span>(nb,<span class="k">new</span> <span class="fn">Node</span>(nb.val));q.<span class="fn">add</span>(nb);}\n            mp.<span class="fn">get</span>(u).neighbors.<span class="fn">add</span>(mp.<span class="fn">get</span>(nb));\n        }\n    }\n    <span class="k">return</span> mp.<span class="fn">get</span>(node);\n}`,
        python: `<span class="k">from</span> collections <span class="k">import</span> deque\n<span class="k">def</span> <span class="fn">clone_graph</span>(node):\n    <span class="k">if not</span> node: <span class="k">return None</span>\n    cloned={node: Node(node.val)}\n    q=deque([node])\n    <span class="k">while</span> q:\n        u=q.<span class="fn">popleft</span>()\n        <span class="k">for</span> nb <span class="k">in</span> u.neighbors:\n            <span class="k">if</span> nb <span class="k">not in</span> cloned:\n                cloned[nb]=Node(nb.val); q.<span class="fn">append</span>(nb)\n            cloned[u].neighbors.<span class="fn">append</span>(cloned[nb])\n    <span class="k">return</span> cloned[node]`,
        javascript: `<span class="k">function</span> <span class="fn">cloneGraph</span>(node){\n    <span class="k">if</span>(!node) <span class="k">return null</span>;\n    <span class="k">const</span> mp=<span class="k">new</span> Map();\n    mp.<span class="fn">set</span>(node,<span class="k">new</span> <span class="fn">Node</span>(node.val));\n    <span class="k">const</span> q=[node];\n    <span class="k">while</span>(q.length){\n        <span class="k">const</span> u=q.<span class="fn">shift</span>();\n        <span class="k">for</span>(<span class="k">const</span> nb <span class="k">of</span> u.neighbors){\n            <span class="k">if</span>(!mp.<span class="fn">has</span>(nb)){mp.<span class="fn">set</span>(nb,<span class="k">new</span> <span class="fn">Node</span>(nb.val));q.<span class="fn">push</span>(nb);}\n            mp.<span class="fn">get</span>(u).neighbors.<span class="fn">push</span>(mp.<span class="fn">get</span>(nb));\n        }\n    }\n    <span class="k">return</span> mp.<span class="fn">get</span>(node);\n}`

      desc: 'Count the number of connected components in a graph — each component is one "province".',

      algorithm: 'DFS/BFS from every unvisited node. Each new DFS call = one new connected component (province). Count the number of times we start a fresh DFS.',

      algoSteps: [
        {
          text: 'Step 1 — Build adjacency list from the matrix: for each row i, add all j where isConnected[i][j]==1 (and i≠j) as neighbors of i.',
          diagramHtml: `

              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(mat[i][j]==<span style="color:#a6e3a1;">1</span> &amp;&amp; i!=j) adj[i].<span style="color:#89b4fa;">push</span>(j);</div>
            </div>`
        },
        {
          text: 'Step 2 — DFS/BFS from each unvisited node: every time we start a fresh traversal, we increment the province counter. The traversal marks all reachable nodes as visited.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#89dceb;">int</span> provinces = <span style="color:#a6e3a1;">0</span>;</div>
              <div><span style="color:#cba6f7;">for</span>(i=0..n) {</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(!vis[i]) {</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;provinces++; <span style="color:#89b4fa;">dfs</span>(i, vis, adj);</div>
              <div>&nbsp;&nbsp;}</div>
              <div>}</div>
            </div>`
        },
        {
          text: 'Step 3 — Alternative: Use Union-Find. For each edge in the matrix, union the two nodes. Count distinct roots at the end.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 14px;border:2px solid #a78bfa;border-radius:8px;background:#f5f3ff;color:#6d28d9;line-height:2;">
              DSU approach:
              for all edges → dsu.unite(i,j)

        }
      ],

      complexity: { time: 'O(N²)', space: 'O(N)', timeNote: 'We process the N×N matrix, visiting each cell once.', spaceNote: 'O(N) for visited array and DFS stack.' },

      codes: {
        cpp: `<span class="k">void</span> <span class="fn">dfs</span>(<span class="t">int</span> node, vector&lt;<span class="t">bool</span>&gt;&amp; vis, vector&lt;vector&lt;<span class="t">int</span>&gt;&gt;&amp; adj){\n    vis[node]=<span class="k">true</span>;\n    <span class="k">for</span>(<span class="t">int</span> nb:adj[node]) <span class="k">if</span>(!vis[nb]) <span class="fn">dfs</span>(nb,vis,adj);\n}\n<span class="t">int</span> <span class="fn">findCircleNum</span>(vector&lt;vector&lt;<span class="t">int</span>&gt;&gt;&amp; M){\n    <span class="t">int</span> n=M.<span class="fn">size</span>(), cnt=<span class="n">0</span>;\n    vector&lt;vector&lt;<span class="t">int</span>&gt;&gt; adj(n);\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;n;i++) <span class="k">for</span>(<span class="t">int</span> j=<span class="n">0</span>;j&lt;n;j++)\n        <span class="k">if</span>(M[i][j]&amp;&amp;i!=j) adj[i].<span class="fn">push_back</span>(j);\n    vector&lt;<span class="t">bool</span>&gt; vis(n,<span class="k">false</span>);\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;n;i++) <span class="k">if</span>(!vis[i]){cnt++;<span class="fn">dfs</span>(i,vis,adj);}\n    <span class="k">return</span> cnt;\n}`,
        java: `<span class="k">public int</span> <span class="fn">findCircleNum</span>(<span class="t">int</span>[][] M){\n    <span class="t">int</span> n=M.length, cnt=<span class="n">0</span>;\n    <span class="t">boolean</span>[] vis=<span class="k">new boolean</span>[n];\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;n;i++)\n        <span class="k">if</span>(!vis[i]){cnt++;<span class="fn">dfs</span>(i,vis,M,n);}\n    <span class="k">return</span> cnt;\n}\n<span class="k">void</span> <span class="fn">dfs</span>(<span class="t">int</span> i, <span class="t">boolean</span>[] vis, <span class="t">int</span>[][] M, <span class="t">int</span> n){\n    vis[i]=<span class="k">true</span>;\n    <span class="k">for</span>(<span class="t">int</span> j=<span class="n">0</span>;j&lt;n;j++)\n        <span class="k">if</span>(M[i][j]==<span class="n">1</span>&amp;&amp;!vis[j]) <span class="fn">dfs</span>(j,vis,M,n);\n}`,
        python: `<span class="k">def</span> <span class="fn">find_circle_num</span>(M):\n    n=<span class="fn">len</span>(M); vis=[<span class="k">False</span>]*n; cnt=<span class="n">0</span>\n    <span class="k">def</span> <span class="fn">dfs</span>(i):\n        vis[i]=<span class="k">True</span>\n        <span class="k">for</span> j <span class="k">in</span> <span class="fn">range</span>(n):\n            <span class="k">if</span> M[i][j] <span class="k">and not</span> vis[j]: <span class="fn">dfs</span>(j)\n    <span class="k">for</span> i <span class="k">in</span> <span class="fn">range</span>(n):\n        <span class="k">if not</span> vis[i]: cnt+=<span class="n">1</span>; <span class="fn">dfs</span>(i)\n    <span class="k">return</span> cnt`,
        javascript: `<span class="k">function</span> <span class="fn">findCircleNum</span>(M){\n    <span class="k">const</span> n=M.length, vis=<span class="k">new</span> Array(n).<span class="fn">fill</span>(<span class="k">false</span>); <span class="k">let</span> cnt=<span class="n">0</span>;\n    <span class="k">function</span> <span class="fn">dfs</span>(i){\n        vis[i]=<span class="k">true</span>;\n        <span class="k">for</span>(<span class="k">let</span> j=<span class="n">0</span>;j&lt;n;j++) <span class="k">if</span>(M[i][j]&amp;&amp;!vis[j]) <span class="fn">dfs</span>(j);\n    }\n    <span class="k">for</span>(<span class="k">let</span> i=<span class="n">0</span>;i&lt;n;i++) <span class="k">if</span>(!vis[i]){cnt++;<span class="fn">dfs</span>(i);}\n    <span class="k">return</span> cnt;\n}`
      }

      algorithm: 'Model as directed graph: edge b→a for each prerequisite [a,b]. If the graph has a cycle → impossible to finish. Use Kahn\'s topological sort (BFS). If sorted count == N, all courses can be done.',

      algoSteps: [

      complexity: { time: 'O(V+E)', space: 'O(V+E)', timeNote: 'Topological sort processes each vertex and edge once.', spaceNote: 'Adjacency list + indegree array.' },

      codes: {
        cpp: `<span class="t">bool</span> <span class="fn">canFinish</span>(<span class="t">int</span> N, vector&lt;vector&lt;<span class="t">int</span>&gt;&gt;&amp; pre){\n    vector&lt;vector&lt;<span class="t">int</span>&gt;&gt; adj(N);\n    vector&lt;<span class="t">int</span>&gt; indeg(N,<span class="n">0</span>);\n    <span class="k">for</span>(auto&amp;p:pre){adj[p[<span class="n">1</span>]].<span class="fn">push_back</span>(p[<span class="n">0</span>]);indeg[p[<span class="n">0</span>]]++;}\n    queue&lt;<span class="t">int</span>&gt; q;\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;N;i++) <span class="k">if</span>(!indeg[i]) q.<span class="fn">push</span>(i);\n    <span class="t">int</span> cnt=<span class="n">0</span>;\n    <span class="k">while</span>(!q.<span class="fn">empty</span>()){\n        <span class="t">int</span> u=q.<span class="fn">front</span>();q.<span class="fn">pop</span>();cnt++;\n        <span class="k">for</span>(<span class="t">int</span> v:adj[u]) <span class="k">if</span>(--indeg[v]==<span class="n">0</span>) q.<span class="fn">push</span>(v);\n    }\n    <span class="k">return</span> cnt==N;\n}`,
        java: `<span class="k">public boolean</span> <span class="fn">canFinish</span>(<span class="t">int</span> N, <span class="t">int</span>[][] pre){\n    List&lt;List&lt;<span class="t">Integer</span>&gt;&gt; adj=<span class="k">new</span> ArrayList&lt;&gt;();\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;N;i++) adj.<span class="fn">add</span>(<span class="k">new</span> ArrayList&lt;&gt;());\n    <span class="t">int</span>[] indeg=<span class="k">new int</span>[N];\n    <span class="k">for</span>(<span class="t">int</span>[] p:pre){adj.<span class="fn">get</span>(p[<span class="n">1</span>]).<span class="fn">add</span>(p[<span class="n">0</span>]);indeg[p[<span class="n">0</span>]]++;}\n    Queue&lt;<span class="t">Integer</span>&gt; q=<span class="k">new</span> LinkedList&lt;&gt;();\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;N;i++) <span class="k">if</span>(indeg[i]==<span class="n">0</span>) q.<span class="fn">add</span>(i);\n    <span class="t">int</span> cnt=<span class="n">0</span>;\n    <span class="k">while</span>(!q.<span class="fn">isEmpty</span>()){\n        <span class="t">int</span> u=q.<span class="fn">poll</span>(); cnt++;\n        <span class="k">for</span>(<span class="t">int</span> v:adj.<span class="fn">get</span>(u)) <span class="k">if</span>(--indeg[v]==<span class="n">0</span>) q.<span class="fn">add</span>(v);\n    }\n    <span class="k">return</span> cnt==N;\n}`,
        python: `<span class="k">from</span> collections <span class="k">import</span> deque\n<span class="k">def</span> <span class="fn">can_finish</span>(N, pre):\n    adj=[[] <span class="k">for</span> _ <span class="k">in</span> <span class="fn">range</span>(N)]\n    indeg=[<span class="n">0</span>]*N\n    <span class="k">for</span> a,b <span class="k">in</span> pre: adj[b].<span class="fn">append</span>(a); indeg[a]+=<span class="n">1</span>\n    q=deque(i <span class="k">for</span> i <span class="k">in</span> <span class="fn">range</span>(N) <span class="k">if</span> indeg[i]==<span class="n">0</span>)\n    cnt=<span class="n">0</span>\n    <span class="k">while</span> q:\n        u=q.<span class="fn">popleft</span>(); cnt+=<span class="n">1</span>\n        <span class="k">for</span> v <span class="k">in</span> adj[u]:\n            indeg[v]-=<span class="n">1</span>\n            <span class="k">if</span> indeg[v]==<span class="n">0</span>: q.<span class="fn">append</span>(v)\n    <span class="k">return</span> cnt==N`,
        javascript: `<span class="k">function</span> <span class="fn">canFinish</span>(N, pre){\n    <span class="k">const</span> adj=Array.<span class="fn">from</span>({length:N},()=>[]);\n    <span class="k">const</span> indeg=<span class="k">new</span> Array(N).<span class="fn">fill</span>(<span class="n">0</span>);\n    <span class="k">for</span>(<span class="k">const</span>[a,b] <span class="k">of</span> pre){adj[b].<span class="fn">push</span>(a);indeg[a]++;}\n    <span class="k">const</span> q=[]; <span class="k">let</span> cnt=<span class="n">0</span>;\n    <span class="k">for</span>(<span class="k">let</span> i=<span class="n">0</span>;i&lt;N;i++) <span class="k">if</span>(!indeg[i]) q.<span class="fn">push</span>(i);\n    <span class="k">while</span>(q.length){\n        <span class="k">const</span> u=q.<span class="fn">shift</span>(); cnt++;\n        <span class="k">for</span>(<span class="k">const</span> v <span class="k">of</span> adj[u]) <span class="k">if</span>(--indeg[v]===<span class="n">0</span>) q.<span class="fn">push</span>(v);\n    }\n    <span class="k">return</span> cnt===N;\n}`
