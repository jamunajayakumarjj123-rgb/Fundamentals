<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fundamentals – DSA Tutorials</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --bg4: #252525;
    --border: #2a2a2a;
    --border2: #333;
    --accent: #f97316;
    --accent2: #fb923c;
    --text: #e8e8e8;
    --text2: #a0a0a0;
    --text3: #666;
    --green: #22c55e;
    --blue: #3b82f6;
    --sidebar-w: 72px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 0;
    z-index: 100;
    gap: 4px;
  }
  .sidebar-logo {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 17px;
    color: #fff;
    margin-bottom: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .sidebar-logo span { transform: skewX(-6deg); display:block; }
  .sidebar-nav {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 100%;
  }
  .sidebar-btn {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    gap: 3px;
    transition: background .15s;
    color: var(--text2);
    border: none; background: transparent;
  }
  .sidebar-btn:hover { background: var(--bg3); }
  .sidebar-btn.active { background: rgba(249,115,22,.13); color: var(--accent); }
  .sidebar-btn svg { width:20px; height:20px; }
  .sidebar-btn .label { font-size: 9px; font-weight: 600; letter-spacing:.3px; }
  .sidebar-plus {
    margin-top: auto;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--bg4);
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    position: relative;
  }
  .sidebar-plus::after {
    content: '';
    position: absolute;
    bottom: 3px; right: 3px;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    border: 2px solid var(--bg2);
  }
  .sidebar-plus svg { width:22px; height:22px; color:#888; }

  /* ── MAIN LAYOUT ── */
  .main { margin-left: var(--sidebar-w); min-height: 100vh; }

  /* ── PAGE VIEWS ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── HOME PAGE ── */
  .home-header {
    padding: 28px 36px 0;
    border-left: 3px solid var(--accent);
    margin-left: 0;
  }
  .home-title { font-size: 26px; font-weight: 700; color: #fff; }
  .home-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

  /* TOPIC TABS */
  .tabs-wrap {
    padding: 16px 0 0 36px;
    overflow-x: auto;
    display: flex;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  .tabs-wrap::-webkit-scrollbar { height: 3px; }
  .tabs-wrap::-webkit-scrollbar-track { background: transparent; }
  .tabs-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .tab-btn {
    padding: 8px 16px;
    border-radius: 8px 8px 0 0;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: 'Sora', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: color .15s, background .15s;
    border-bottom: 2px solid transparent;
  }
  .tab-btn:hover { color: var(--text); background: var(--bg3); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom: 2px solid var(--accent);
    background: rgba(249,115,22,.07);
  }

  /* TOPIC TABLE */
  .table-wrap { padding: 0 36px 40px; }
  .topic-table { width: 100%; border-collapse: collapse; }
  .topic-table thead tr {
    border-bottom: 1px solid var(--border2);
  }
  .topic-table th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--text3);
  }
  .topic-table th:last-child { text-align: right; }
  .topic-row {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s;
  }
  .topic-row:hover { background: var(--bg3); }
  .topic-row td { padding: 16px; vertical-align: top; }
  .topic-row td:first-child {
    color: var(--text3);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    width: 60px;
  }
  .topic-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .home-title{
    color: var(--text);
  }
  .topic-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.55;
    max-width: 820px;
  }
  .topic-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    align-items: flex-start;
    padding-top: 2px;
  }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text3);
    transition: color .15s, border-color .15s;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .icon-btn.saved-icon { color: var(--accent); border-color: var(--accent); background: rgba(249,115,22,.1); }
  .icon-btn svg { width:14px; height:14px; }

  /* CATEGORY BADGE */
  .cat-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
    background: rgba(249,115,22,.12);
    color: var(--accent);
    margin-bottom: 6px;
  }

  /* ── DETAIL PAGE ── */
  .detail-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .back-btn {
    display: flex; align-items: center; gap: 8px;
    color: var(--text2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    transition: color .15s, border-color .15s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--border2); }
  .back-btn svg { width: 14px; height: 14px; }
  .topbar-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .action-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    font-family: 'Sora', sans-serif;
    font-size: 12.5px; font-weight: 600;
    cursor: pointer;
    transition: color .15s, border-color .15s, background .15s;
  }
  .action-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(249,115,22,.07); }
  .action-btn.saved { color: var(--accent); border-color: var(--accent); background: rgba(249,115,22,.1); }
  .action-btn svg { width:15px; height:15px; }

  .detail-content { padding: 32px 44px 60px; max-width: 960px; }
  .detail-title {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 14px;
  }
  .problem-desc {
    font-size: 13.5px;
    color: var(--text2);
    line-height: 1.7;
    margin-bottom: 28px;
  }
  .problem-desc strong { color: var(--text); }

  /* ACCORDION */
  .accordion {
    border: 1px solid var(--border2);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .accordion-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--bg3);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    user-select: none;
    transition: background .15s;
  }
  .accordion-header:hover { background: var(--bg4); }
  .accordion-arrow {
    transition: transform .25s;
    color: var(--text3);
  }
  .accordion-arrow svg { width:18px; height:18px; display:block; }
  .accordion.open .accordion-arrow { transform: rotate(180deg); }
  .accordion-body {
    display: none;
    background: var(--bg2);
    border-top: 1px solid var(--border);
  }
  .accordion.open .accordion-body { display: block; }

  /* EXAMPLE BOX */
  .example-box {
    margin: 0;
    padding: 24px;
  }
  .code-example {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.8;
    color: var(--text2);
    margin-bottom: 16px;
  }
  .code-example .kw { color: #a78bfa; }
  .code-example .val { color: #34d399; }
  .code-example .comment { color: var(--text3); font-style: italic; }
  .example-img {
    background: #fff;
    border-radius: 10px;
    border: 2px solid var(--accent);
    padding: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 160px;
    margin-top: 16px;
  }

  /* LINKED LIST DIAGRAM */
  .ll-diagram {
    display: flex;
    align-items: center;
    gap: 0;
    font-family: 'Sora', sans-serif;
  }
  .ll-node-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .ll-node-label { font-size: 11px; color: #888; font-weight: 500; }
  .ll-node {
    display: flex;
    border: 2px solid var(--accent);
    border-radius: 6px;
    overflow: hidden;
  }
  .ll-data {
    width: 54px; height: 46px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    color: #111;
    background: #fff;
  }
  .ll-ptr {
    width: 34px; height: 46px;
    display: flex; align-items: center; justify-content: center;
    background: #f5f5f5;
    border-left: 2px solid var(--accent);
    color: #bbb;
    font-size: 11px;
  }
  .ll-arrow {
    display: flex;
    align-items: center;
    margin: 0 4px;
    color: #555;
  }
  .ll-arrow svg { width:28px; height:16px; }
  .ll-null {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: #555;
    margin-left: 4px;
  }
  .ll-bottom-label {
    font-size: 11px; font-weight: 600;
    color: #555;
    margin-top: 4px;
  }
  .ll-next-label {
    font-size: 10px;
    color: #888;
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
  }
  .ll-node-wrap { position: relative; }

  /* ALGORITHM SECTION */
  .algo-body { padding: 24px; }
  .algo-text {
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text2);
    margin-bottom: 20px;
  }
  .algo-text strong { color: var(--text); }
  .algo-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .algo-list li {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 13px; color: var(--text2); line-height: 1.6;
  }
  .algo-list li::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 7px;
  }

  /* CODE BLOCK */
  .code-section { padding: 0; }
  .lang-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    background: var(--bg3);
  }
  .lang-tab {
    padding: 10px 18px;
    border: none; background: transparent;
    font-family: 'Sora', sans-serif;
    font-size: 12.5px; font-weight: 600;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .15s;
  }
  .lang-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .lang-tab:hover:not(.active) { color: var(--text); }
  .copy-btn {
    margin-left: auto;
    padding: 8px 12px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-family: 'Sora', sans-serif;
    border-radius: 6px;
    transition: color .15s;
  }
  .copy-btn:hover { color: var(--accent); }
  .copy-btn svg { width:14px; height:14px; }
  .code-block {
    padding: 24px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.9;
    color: #cdd6f4;
    background: #12121a;
  }
  .code-block .k  { color: #cba6f7; }
  .code-block .t  { color: #89dceb; }
  .code-block .fn { color: #89b4fa; }
  .code-block .s  { color: #a6e3a1; }
  .code-block .n  { color: #fab387; }
  .code-block .c  { color: #585b70; font-style: italic; }
  .code-block .op { color: #89dceb; }
  .code-panel { display: none; }
  .code-panel.active { display: block; }

  /* COMPLEXITY */
  .complexity-body {
    padding: 20px 24px;
  }
  .complexity-row {
    font-size: 13.5px;
    color: var(--text2);
    margin-bottom: 8px;
    line-height: 1.6;
  }
  .complexity-row strong { color: var(--text); }
  .complexity-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    background: rgba(34,197,94,.12);
    color: var(--green);
    margin-left: 4px;
  }

  /* STEP DIAGRAMS */
  .step-diagrams {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 14px;
    margin-bottom: 6px;
  }
  .step-diagram-card {
    background: #fff;
    border: 2px solid var(--accent);
    border-radius: 10px;
    padding: 28px 24px 20px;
    position: relative;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .step-diagram-card .brand {
    position: absolute;
    top: 8px; right: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700;
    color: var(--accent); opacity: .65;
  }
  .step-diagram-card .step-label {
    position: absolute;
    top: 8px; left: 12px;
    font-size: 10px; font-weight: 700;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .4px;
  }
  .algo-step {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 14px;
    border-bottom: 1px dashed var(--border2);
  }
  .algo-step:last-child { border-bottom: none; padding-bottom: 0; }
  .algo-step-header {
    display: flex; align-items: flex-start; gap: 10px;
  }
  .algo-step-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 6px;
  }
  .algo-step-text { font-size: 13px; color: var(--text2); line-height: 1.65; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius:4px; }

  /* COPY TOAST */
  .toast {
    position: fixed;
    bottom: 28px; right: 28px;
    background: var(--bg4);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: all .25s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ANIMATIONS */
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .page.active { animation: fadeIn .2s ease; }

  /* DIAGRAM CANVAS */
  .diagram-canvas {
    background: #fff;
    border-radius: 10px;
    border: 2px solid var(--accent);
    padding: 36px 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: 18px;
    position: relative;
  }
  .diagram-canvas .brand {
    position: absolute;
    top: 10px; right: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    opacity: .7;
  }
          .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--orange);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            fill: white
        }
</style>
<style>
    /* Mobile Responsive Layout */
    /* ══════════════════════════════════════════
   MOBILE TOPBAR (hidden on desktop)
══════════════════════════════════════════ */
.mobile-topbar {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 200;
}
.mobile-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
.mobile-logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.mobile-logo-icon svg { width: 18px; height: 18px; fill: white; }
.mobile-logo-text {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 14px;
  color: #fff;
}
.mobile-topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.mobile-icon-btn {
  width: 36px; height: 36px;
  border: none;
  background: var(--bg3);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  transition: color .15s, background .15s;
}
.mobile-icon-btn:hover { color: var(--text); background: var(--bg4); }
.mobile-icon-btn svg { width: 20px; height: 20px; }

/* ── MOBILE DRAWER ── */
.mobile-drawer {
  display: none;
  position: fixed;
  top: 52px; left: 0; right: 0; bottom: 0;
  background: var(--bg2);
  z-index: 190;
  flex-direction: column;
  padding: 16px;
  gap: 6px;
  overflow-y: auto;
  transform: translateY(-8px);
  opacity: 0;
  transition: opacity .2s, transform .2s;
}
.mobile-drawer.open {
  display: flex;
  opacity: 1;
  transform: translateY(0);
}
.drawer-overlay {
  display: none;
  position: fixed;
  inset: 52px 0 0 0;
  background: rgba(0,0,0,.5);
  z-index: 180;
}
.drawer-overlay.open { display: block; }
.drawer-nav-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 13px 16px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: 'Sora', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  transition: background .15s, color .15s;
}
.drawer-nav-btn:hover { background: var(--bg3); color: var(--text); }
.drawer-nav-btn.active { background: rgba(249,115,22,.13); color: var(--accent); }
.drawer-nav-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
.drawer-divider {
  height: 1px;
  background: var(--border);
  margin: 6px 0;
}
.drawer-user-btn {
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1.5px solid var(--border2);

/* ══════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
══════════════════════════════════════════ */
@media (max-width: 768px) {
  /* Hide desktop sidebar, show mobile topbar */
  .sidebar { display: none; }
  .mobile-topbar { display: flex; }
  .main {
    margin-left: 0;
    padding-top: 52px;
  }

  .home-title{
    color: var(--text);
  }

  .topic-row td:nth-child(1){
    display: none;
  }

  .topic-table{
    padding-top: 15px;
  }

  .mobile-logo-text{
    color: var(--text);
  }

  /* Home header */
  .home-header {
    padding: 20px 16px 0;
  }
  .home-title { font-size: 20px; }

  /* Tabs */
  .tabs-wrap { padding: 12px 0 0 16px; }

  /* Table → card layout */
  .table-wrap,
  .main > div[style*="padding: 0 36px"],
  #page-home > div[style] {
    padding: 0 12px 40px !important;
  }
  .topic-table thead { display: none; }
  .topic-table, .topic-table tbody,
  .topic-row, .topic-row td { display: block; width: 100%; }
  .topic-row {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    padding: 14px;
  }
  .topic-row td { padding: 0; border: none; }
  .topic-row td:first-child {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 4px;
    width: auto;
  }
  .topic-actions {
    justify-content: flex-start;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  /* Detail topbar */
  .detail-topbar {
    padding: 10px 14px;
    top: 52px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .topbar-actions { gap: 6px; }
  .action-btn { padding: 6px 10px; font-size: 11.5px; }
  .action-btn span { display: none; } /* icon-only on mobile */

  /* Detail content */
  .detail-content {
    padding: 20px 16px 48px;
    max-width: 100%;
  }
  .detail-title { font-size: 19px; }

  /* Code block */
  .code-block { font-size: 11.5px; padding: 16px; }
  .lang-tabs { padding: 0 10px; overflow-x: auto; }
  .lang-tab { padding: 10px 12px; font-size: 11.5px; }

  /* Accordion */
  .accordion-header { padding: 12px 14px; font-size: 13px; }
  .algo-body { padding: 16px; }
  .example-box { padding: 16px; }

  /* Diagram canvas scroll on small screens */
  .diagram-canvas { overflow-x: auto; }
  .step-diagram-card { overflow-x: auto; }
}

/* learn.html: lang-nav top offset on mobile */
@media (max-width: 768px) {
  .lang-nav {
    top: 52px;

  }

// ── HELPER: build a linked-list node row (used in diagram HTML) ──
function llNode(val, color = '#f97316', bg = '#fff', textColor = '#111', ptrColor = '#aaa', label = '', labelColor = '#555') {
  return `
    <div class="ll-node-wrap" style="position:relative;">
      <div class="ll-node" style="border-color:${color};">
        <div class="ll-data" style="color:${textColor};background:${bg};">${val}</div>
        <div class="ll-ptr" style="border-color:${color};color:${ptrColor};">→</div>
      </div>
      ${label ? `<div class="ll-bottom-label" style="color:${labelColor};">${label}</div>` : ''}
    </div>`;
}

function llArrow(color = '#555') {
  return `<div class="ll-arrow"><svg viewBox="0 0 28 16" fill="none"><path d="M2 8h20M18 3l6 5-6 5" stroke="${color}" stroke-width="1.8" stroke-linecap="round"/></svg></div>`;

}

// ── TOPICS ───────────────────────────────────────────────────────
// Each topic entry is a self-contained data object.

//
// Fields:
//   id           – unique string identifier

//   examples[]   – array of { input, output, explanation }

//   algorithm    – paragraph text for the approach overview
//   algoSteps[]  – array of { text, diagramHtml? } for step-by-step breakdown
//   complexity   – { time, space, timeNote, spaceNote }

const topics = {

  // ════════════════════════════════════════════════════════════════
  // DATA TYPES
  // ════════════════════════════════════════════════════════════════
  datatypes: [

      desc: 'Understand the fundamental data types in C++: int, float, double, char, bool, and their sizes in memory.',

      examples: [
        {
          input: 'sizeof(int)',
          output: '4',

          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:80px;padding:6px 10px;background:var(--accent);border-radius:6px;color:#fff;font-weight:700;font-size:13px;font-family:'JetBrains Mono',monospace;">${t}</div>
            <div style="width:50px;padding:6px 8px;background:#f0f0f0;border-radius:6px;color:#333;font-size:12px;text-align:center;font-family:'JetBrains Mono',monospace;">${s}</div>
            <div style="color:#666;font-size:12px;">${r}</div>
          </div>`).join('')}
        </div>`,

      algorithm: 'Primitive types are predefined by the language. They directly store values in memory. The size depends on the system architecture (typically 32 or 64-bit). Always choose the smallest type that fits your data to save memory.',

      algoSteps: [
        {
          text: 'int stores whole numbers; use long long for very large integers.',
          diagramHtml: `
            <div style="display:flex;flex-direction:column;gap:10px;font-family:'JetBrains Mono',monospace;width:100%;align-items:flex-start;">
              <div style="font-size:11px;color:#888;margin-bottom:2px;">Memory layout (1 cell = 1 byte)</div>
              <div style="display:flex;align-items:center;gap:10px;">
                <div style="width:52px;font-size:12px;font-weight:700;color:#f97316;">int</div>
                <div style="display:flex;gap:2px;">
                  ${Array(4).fill(0).map((_,i)=>`<div style="width:28px;height:28px;border:2px solid #f97316;border-radius:4px;background:#fff8f0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#f97316;font-weight:700;">B${i}</div>`).join('')}
                </div>
                <div style="font-size:11px;color:#888;">4 bytes = 32 bits</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px;">
                <div style="width:52px;font-size:12px;font-weight:700;color:#3b82f6;">long long</div>
                <div style="display:flex;gap:2px;">
                  ${Array(8).fill(0).map((_,i)=>`<div style="width:28px;height:28px;border:2px solid #3b82f6;border-radius:4px;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:9px;color:#3b82f6;font-weight:700;">B${i}</div>`).join('')}
                </div>
                <div style="font-size:11px;color:#888;">8 bytes = 64 bits</div>
              </div>
            </div>`
        },
        {
          text: 'float gives ~7 significant digits; double gives ~15 — prefer double for precision.',
          diagramHtml: `
            <div style="display:flex;gap:14px;font-family:'JetBrains Mono',monospace;align-items:flex-start;flex-wrap:wrap;">
              <div style="padding:14px 18px;border:2px solid #f97316;border-radius:8px;background:#fff8f0;text-align:center;">
                <div style="font-size:12px;font-weight:700;color:#f97316;margin-bottom:6px;">float (4B)</div>
                <div style="font-size:14px;font-weight:700;color:#333;">3.141592<span style="color:#f97316;font-size:11px;">6</span></div>
                <div style="font-size:10px;color:#888;margin-top:4px;">~7 sig digits</div>
              </div>
              <div style="display:flex;align-items:center;font-size:18px;color:#aaa;align-self:center;">vs</div>
              <div style="padding:14px 18px;border:2px solid #22c55e;border-radius:8px;background:#f0fdf4;text-align:center;">
                <div style="font-size:12px;font-weight:700;color:#22c55e;margin-bottom:6px;">double (8B)</div>
                <div style="font-size:14px;font-weight:700;color:#333;">3.14159265358979<span style="color:#22c55e;font-size:11px;">3</span></div>
                <div style="font-size:10px;color:#888;margin-top:4px;">~15 sig digits ✓</div>
              </div>
            </div>`
        },
        {
          text: 'char stores a single character using its ASCII code (0–127).',
          diagramHtml: `
            <div style="display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;flex-wrap:wrap;">
              <div style="padding:12px 18px;border:2px solid #f97316;border-radius:8px;background:#fff8f0;">
                <div style="font-size:28px;font-weight:700;color:#f97316;text-align:center;">'A'</div>
                <div style="font-size:10px;color:#888;margin-top:4px;text-align:center;">char literal</div>

      complexity: { time: 'O(N)', space: 'O(1)', timeNote: 'Three linear passes: find middle, reverse, compare.', spaceNote: 'In-place reversal — no extra list created.' },

      codes: {
        cpp: `<span class="t">bool</span> <span class="fn">isPalindrome</span>(<span class="t">Node</span>* head) {\n    <span class="t">Node</span> *slow=head, *fast=head, *prev=<span class="k">nullptr</span>;\n    <span class="k">while</span> (fast &amp;&amp; fast-&gt;next) { slow=slow-&gt;next; fast=fast-&gt;next-&gt;next; }\n    <span class="t">Node</span>* cur = slow-&gt;next; <span class="c">// reverse second half</span>\n    <span class="k">while</span> (cur) { <span class="t">Node</span>* n=cur-&gt;next; cur-&gt;next=prev; prev=cur; cur=n; }\n    <span class="t">Node</span> *l=head, *r=prev; <span class="c">// compare</span>\n    <span class="k">while</span> (r) { <span class="k">if</span>(l-&gt;val!=r-&gt;val)<span class="k">return false</span>; l=l-&gt;next; r=r-&gt;next; }\n    <span class="k">return true</span>;\n}`,
        java: `<span class="k">public boolean</span> <span class="fn">isPalindrome</span>(<span class="t">Node</span> head) {\n    <span class="t">Node</span> slow=head, fast=head;\n    <span class="k">while</span>(fast!=<span class="k">null</span>&amp;&amp;fast.next!=<span class="k">null</span>){slow=slow.next;fast=fast.next.next;}\n    <span class="t">Node</span> prev=<span class="k">null</span>, cur=slow.next;\n    <span class="k">while</span>(cur!=<span class="k">null</span>){<span class="t">Node</span> n=cur.next;cur.next=prev;prev=cur;cur=n;}\n    <span class="t">Node</span> l=head, r=prev;\n    <span class="k">while</span>(r!=<span class="k">null</span>){<span class="k">if</span>(l.val!=r.val)<span class="k">return false</span>;l=l.next;r=r.next;}\n    <span class="k">return true</span>;\n}`,
        python: `<span class="k">def</span> <span class="fn">is_palindrome</span>(head):\n    slow = fast = head\n    <span class="k">while</span> fast <span class="k">and</span> fast.next:\n        slow = slow.next; fast = fast.next.next\n    prev, cur = <span class="k">None</span>, slow.next\n    <span class="k">while</span> cur:\n        nxt = cur.next; cur.next = prev; prev = cur; cur = nxt\n    l, r = head, prev\n    <span class="k">while</span> r:\n        <span class="k">if</span> l.val != r.val: <span class="k">return False</span>\n        l = l.next; r = r.next\n    <span class="k">return True</span>`,

      }

      codes: {
        cpp: `<span class="t">Node</span>* <span class="fn">addTwoNumbers</span>(<span class="t">Node</span>* l1, <span class="t">Node</span>* l2) {\n    <span class="t">Node</span> dummy(<span class="n">0</span>);\n    <span class="t">Node</span>* curr = &amp;dummy;\n    <span class="t">int</span> carry = <span class="n">0</span>;\n    <span class="k">while</span> (l1 || l2 || carry) {\n        <span class="t">int</span> sum = carry\n                 + (l1 ? l1-&gt;val : <span class="n">0</span>)\n                 + (l2 ? l2-&gt;val : <span class="n">0</span>);\n        curr-&gt;next = <span class="k">new</span> <span class="fn">Node</span>(sum % <span class="n">10</span>);\n        curr = curr-&gt;next;\n        carry = sum / <span class="n">10</span>;\n        <span class="k">if</span> (l1) l1 = l1-&gt;next;\n        <span class="k">if</span> (l2) l2 = l2-&gt;next;\n    }\n    <span class="k">return</span> dummy.next;\n}`,
        java: `<span class="k">public</span> <span class="t">Node</span> <span class="fn">addTwoNumbers</span>(<span class="t">Node</span> l1, <span class="t">Node</span> l2) {\n    <span class="t">Node</span> dummy = <span class="k">new</span> <span class="fn">Node</span>(<span class="n">0</span>), curr = dummy;\n    <span class="t">int</span> carry = <span class="n">0</span>;\n    <span class="k">while</span> (l1 != <span class="k">null</span> || l2 != <span class="k">null</span> || carry != <span class="n">0</span>) {\n        <span class="t">int</span> sum = carry\n                + (l1 != <span class="k">null</span> ? l1.val : <span class="n">0</span>)\n                + (l2 != <span class="k">null</span> ? l2.val : <span class="n">0</span>);\n        curr.next = <span class="k">new</span> <span class="fn">Node</span>(sum % <span class="n">10</span>);\n        curr = curr.next;\n        carry = sum / <span class="n">10</span>;\n        <span class="k">if</span>(l1!=<span class="k">null</span>)l1=l1.next; <span class="k">if</span>(l2!=<span class="k">null</span>)l2=l2.next;\n    }\n    <span class="k">return</span> dummy.next;\n}`,
        python: `<span class="k">def</span> <span class="fn">add_two_numbers</span>(l1, l2):\n    dummy = Node(<span class="n">0</span>)\n    curr = dummy\n    carry = <span class="n">0</span>\n    <span class="k">while</span> l1 <span class="k">or</span> l2 <span class="k">or</span> carry:\n        s = carry\n        s += l1.val <span class="k">if</span> l1 <span class="k">else</span> <span class="n">0</span>\n        s += l2.val <span class="k">if</span> l2 <span class="k">else</span> <span class="n">0</span>\n        curr.next = Node(s % <span class="n">10</span>)\n        curr = curr.next\n        carry = s // <span class="n">10</span>\n        <span class="k">if</span> l1: l1 = l1.next\n        <span class="k">if</span> l2: l2 = l2.next\n    <span class="k">return</span> dummy.next`,

      algorithm: 'Compute lengths of both lists. Move the pointer of the longer list ahead by the length difference. Then move both pointers one step at a time — they will meet at the intersection point.',

        {

          diagramHtml: `

      codes: {

        java: `<span class="k">public</span> <span class="t">Node</span> <span class="fn">getIntersection</span>(<span class="t">Node</span> a, <span class="t">Node</span> b) {\n    <span class="t">int</span> la=<span class="n">0</span>,lb=<span class="n">0</span>;\n    <span class="k">for</span>(<span class="t">Node</span> t=a;t!=<span class="k">null</span>;t=t.next)la++;\n    <span class="k">for</span>(<span class="t">Node</span> t=b;t!=<span class="k">null</span>;t=t.next)lb++;\n    <span class="k">while</span>(la>lb){a=a.next;la--;}\n    <span class="k">while</span>(lb>la){b=b.next;lb--;}\n    <span class="k">while</span>(a!=b){a=a.next;b=b.next;}\n    <span class="k">return</span> a;\n}`,
        python: `<span class="k">def</span> <span class="fn">get_intersection</span>(a, b):\n    la = lb = <span class="n">0</span>\n    t = a\n    <span class="k">while</span> t: la += <span class="n">1</span>; t = t.next\n    t = b\n    <span class="k">while</span> t: lb += <span class="n">1</span>; t = t.next\n    <span class="k">while</span> la > lb: a = a.next; la -= <span class="n">1</span>\n    <span class="k">while</span> lb > la: b = b.next; lb -= <span class="n">1</span>\n    <span class="k">while</span> a != b: a = a.next; b = b.next\n    <span class="k">return</span> a`,

      codes: {

      algorithm: 'Find length and make list circular. New tail is at position (len - k%len - 1). Set new head = new tail.next, then break the circle by setting new tail.next = NULL.',

      codes: {

        python: `<span class="k">def</span> <span class="fn">rotate_right</span>(head, k):\n    <span class="k">if not</span> head <span class="k">or</span> k==<span class="n">0</span>: <span class="k">return</span> head\n    tail, length = head, <span class="n">1</span>\n    <span class="k">while</span> tail.next: tail=tail.next; length+=<span class="n">1</span>\n    tail.next = head\n    steps = length - k%length - <span class="n">1</span>\n    new_tail = head\n    <span class="k">for</span> _ <span class="k">in</span> <span class="fn">range</span>(steps): new_tail = new_tail.next\n    new_head = new_tail.next\n    new_tail.next = <span class="k">None</span>\n    <span class="k">return</span> new_head`,

        python: `<span class="k">def</span> <span class="fn">sort_list</span>(head):\n    <span class="k">if not</span> head <span class="k">or not</span> head.next: <span class="k">return</span> head\n    slow, fast = head, head.next\n    <span class="k">while</span> fast <span class="k">and</span> fast.next:\n        slow=slow.next; fast=fast.next.next\n    mid=slow.next; slow.next=<span class="k">None</span>\n    <span class="k">return</span> <span class="fn">merge</span>(<span class="fn">sort_list</span>(head), <span class="fn">sort_list</span>(mid))`,

      codes: {
        cpp: `<span class="k">class</span> <span class="t">LRUCache</span> {\n    <span class="k">struct</span> <span class="t">Node</span>{<span class="t">int</span> k,v;<span class="t">Node</span>*p,*n;};\n    <span class="t">int</span> cap; <span class="t">Node</span>*head,*tail;\n    unordered_map&lt;<span class="t">int</span>,<span class="t">Node</span>*&gt;mp;\n    <span class="k">void</span> <span class="fn">remove</span>(<span class="t">Node</span>*x){x-&gt;p-&gt;n=x-&gt;n;x-&gt;n-&gt;p=x-&gt;p;}\n    <span class="k">void</span> <span class="fn">addFront</span>(<span class="t">Node</span>*x){x-&gt;n=head-&gt;n;x-&gt;p=head;head-&gt;n-&gt;p=x;head-&gt;n=x;}\n<span class="k">public</span>:\n    <span class="fn">LRUCache</span>(<span class="t">int</span> c):cap(c){\n        head=<span class="k">new</span> <span class="t">Node</span>();tail=<span class="k">new</span> <span class="t">Node</span>();head-&gt;n=tail;tail-&gt;p=head;}\n    <span class="t">int</span> <span class="fn">get</span>(<span class="t">int</span> k){<span class="k">if</span>(!mp[k])<span class="k">return</span>-1;<span class="fn">remove</span>(mp[k]);<span class="fn">addFront</span>(mp[k]);<span class="k">return</span>mp[k]-&gt;v;}\n    <span class="k">void</span> <span class="fn">put</span>(<span class="t">int</span> k,<span class="t">int</span> v){\n        <span class="k">if</span>(mp.count(k)){mp[k]-&gt;v=v;<span class="fn">remove</span>(mp[k]);<span class="fn">addFront</span>(mp[k]);}<span class="k">else</span>{\n            <span class="t">Node</span>*n=<span class="k">new</span> <span class="t">Node</span>{k,v};<span class="fn">addFront</span>(n);mp[k]=n;\n            <span class="k">if</span>(mp.size()>cap){auto l=tail-&gt;p;<span class="fn">remove</span>(l);mp.erase(l-&gt;k);delete l;}\n        }}\n};`,
        java: `<span class="k">class</span> <span class="t">LRUCache</span> {\n    <span class="k">private</span> Map&lt;<span class="t">Integer</span>,<span class="t">Node</span>&gt; mp=<span class="k">new</span> LinkedHashMap&lt;&gt;();\n    <span class="k">private final int</span> cap;\n    <span class="k">public</span> <span class="fn">LRUCache</span>(<span class="t">int</span> c){cap=c;}\n    <span class="k">public int</span> <span class="fn">get</span>(<span class="t">int</span> k){\n        <span class="k">if</span>(!mp.containsKey(k))<span class="k">return</span>-1;\n        <span class="t">int</span> v=mp.<span class="fn">remove</span>(k).val; mp.<span class="fn">put</span>(k,<span class="k">new</span> <span class="fn">Node</span>(v)); <span class="k">return</span> v;}\n    <span class="k">public void</span> <span class="fn">put</span>(<span class="t">int</span> k,<span class="t">int</span> v){\n        mp.<span class="fn">remove</span>(k); mp.<span class="fn">put</span>(k,<span class="k">new</span> <span class="fn">Node</span>(v));\n        <span class="k">if</span>(mp.size()>cap)mp.<span class="fn">remove</span>(mp.<span class="fn">keySet</span>().<span class="fn">iterator</span>().<span class="fn">next</span>());}\n}`,
        python: `<span class="k">from</span> collections <span class="k">import</span> OrderedDict\n<span class="k">class</span> <span class="t">LRUCache</span>:\n    <span class="k">def</span> <span class="fn">__init__</span>(self, cap):\n        self.cap = cap; self.cache = OrderedDict()\n    <span class="k">def</span> <span class="fn">get</span>(self, key):\n        <span class="k">if</span> key <span class="k">not in</span> self.cache: <span class="k">return</span> -<span class="n">1</span>\n        self.cache.<span class="fn">move_to_end</span>(key)\n        <span class="k">return</span> self.cache[key]\n    <span class="k">def</span> <span class="fn">put</span>(self, key, val):\n        <span class="k">if</span> key <span class="k">in</span> self.cache: self.cache.<span class="fn">move_to_end</span>(key)\n        self.cache[key] = val\n        <span class="k">if</span> <span class="fn">len</span>(self.cache) > self.cap:\n            self.cache.<span class="fn">popitem</span>(last=<span class="k">False</span>)`,
        javascript: `<span class="k">class</span> <span class="t">LRUCache</span> {\n    <span class="fn">constructor</span>(cap){ this.cap=cap; this.mp=<span class="k">new</span> Map(); }\n    <span class="fn">get</span>(k){\n        <span class="k">if</span>(!this.mp.<span class="fn">has</span>(k)) <span class="k">return</span> -<span class="n">1</span>;\n        <span class="k">const</span> v=this.mp.<span class="fn">get</span>(k);\n        this.mp.<span class="fn">delete</span>(k); this.mp.<span class="fn">set</span>(k,v); <span class="k">return</span> v; }\n    <span class="fn">put</span>(k,v){\n        this.mp.<span class="fn">delete</span>(k); this.mp.<span class="fn">set</span>(k,v);\n        <span class="k">if</span>(this.mp.size>this.cap)\n            this.mp.<span class="fn">delete</span>(this.mp.<span class="fn">keys</span>().<span class="fn">next</span>().value); }\n}`
      }

ime : -<span class="n">1</span>;\n}`,
        java: `<span class="k">public int</span> <span class="fn">orangesRotting</span>(<span class="t">int</span>[][] g) {\n    <span class="t">int</span> r=g.length,c=g[<span class="n">0</span>].length,fresh=<span class="n">0</span>,time=<span class="n">0</span>;\n    Queue&lt;<span class="t">int</span>[]&gt; q=<span class="k">new</span> LinkedList&lt;&gt;();\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;r;i++) <span class="k">for</span>(<span class="t">int</span> j=<span class="n">0</span>;j&lt;c;j++) {\n        <span class="k">if</span>(g[i][j]==<span class="n">2</span>) q.<span class="fn">add</span>(<span class="k">new int</span>[]{i,j});\n        <span class="k">if</span>(g[i][j]==<span class="n">1</span>) fresh++;\n    }\n    <span class="t">int</span>[] dx={<span class="n">0</span>,<span class="n">0</span>,<span class="n">1</span>,-<span class="n">1</span>},dy={<span class="n">1</span>,-<span class="n">1</span>,<span class="n">0</span>,<span class="n">0</span>};\n    <span class="k">while</span>(!q.<span class="fn">isEmpty</span>()&amp;&amp;fresh&gt;<span class="n">0</span>) {\n        time++; <span class="t">int</span> sz=q.<span class="fn">size</span>();\n        <span class="k">while</span>(sz--&gt;<span class="n">0</span>) {\n            <span class="t">int</span>[] p=q.<span class="fn">poll</span>();\n            <span class="k">for</span>(<span class="t">int</span> d=<span class="n">0</span>;d&lt;<span class="n">4</span>;d++) {\n                <span class="t">int</span> nx=p[<span class="n">0</span>]+dx[d],ny=p[<span class="n">1</span>]+dy[d];\n                <span class="k">if</span>(nx&gt;=<span class="n">0</span>&amp;&amp;nx&lt;r&amp;&amp;ny&gt;=<span class="n">0</span>&amp;&amp;ny&lt;c&amp;&amp;g[nx][ny]==<span class="n">1</span>)\n                    { g[nx][ny]=<span class="n">2</span>; fresh--; q.<span class="fn">add</span>(<span class="k">new int</span>[]{nx,ny}); }\n            }\n        }\n    }\n    <span class="k">return</span> fresh==<span class="n">0</span> ? time : -<span class="n">1</span>;\n}`,
        python: `<span class="k">from</span> collections <span class="k">import</span> deque\n<span class="k">def</span> <span class="fn">oranges_rotting</span>(g):\n    r,c=<span class="fn">len</span>(g),<span class="fn">len</span>(g[<span class="n">0</span>]); fresh=time=<span class="n">0</span>; q=deque()\n    <span class="k">for</span> i <span class="k">in</span> <span class="fn">range</span>(r):\n        <span class="k">for</span> j <span class="k">in</span> <span class="fn">range</span>(c):\n            <span class="k">if</span> g[i][j]==<span class="n">2</span>: q.<span class="fn">append</span>((i,j))\n            <span class="k">elif</span> g[i][j]==<span class="n">1</span>: fresh+=<span class="n">1</span>\n    <span class="k">while</span> q <span class="k">and</span> fresh:\n        time+=<span class="n">1</span>\n        <span class="k">for</span> _ <span class="k">in</span> <span class="fn">range</span>(<span class="fn">len</span>(q)):\n            x,y=q.<span class="fn">popleft</span>()\n            <span class="k">for</span> dx,dy <span class="k">in</span>[(<span class="n">0</span>,<span class="n">1</span>),(<span class="n">0</span>,-<span class="n">1</span>),(<span class="n">1</span>,<span class="n">0</span>),(-<span class="n">1</span>,<span class="n">0</span>)]:\n                nx,ny=x+dx,y+dy\n                <span class="k">if</span> <span class="n">0</span>&lt;=nx&lt;r <span class="k">and</span> <span class="n">0</span>&lt;=ny&lt;c <span class="k">and</span> g[nx][ny]==<span class="n">1</span>:\n                    g[nx][ny]=<span class="n">2</span>; fresh-=<span class="n">1</span>; q.<span class="fn">append</span>((nx,ny))\n    <span class="k">return</span> time <span class="k">if not</span> fresh <span class="k">else</span> -<span class="n">1</span>`,
        javascript: `<span class="k">function</span> <span class="fn">orangesRotting</span>(g) {\n    <span class="k">const</span> r=g.length,c=g[<span class="n">0</span>].length,q=[]; <span class="k">let</span> fresh=<span class="n">0</span>,time=<span class="n">0</span>;\n    <span class="k">for</span>(<span class="k">let</span> i=<span class="n">0</span>;i&lt;r;i++) <span class="k">for</span>(<span class="k">let</span> j=<span class="n">0</span>;j&lt;c;j++) {\n        <span class="k">if</span>(g[i][j]===<span class="n">2</span>) q.<span class="fn">push</span>([i,j]); <span class="k">else if</span>(g[i][j]===<span class="n">1</span>) fresh++;\n    }\n    <span class="k">const</span> dirs=[[<span class="n">0</span>,<span class="n">1</span>],[<span class="n">0</span>,-<span class="n">1</span>],[<span class="n">1</span>,<span class="n">0</span>],[-<span class="n">1</span>,<span class="n">0</span>]];\n    <span class="k">while</span>(q.length&amp;&amp;fresh) {\n        time++; <span class="k">const</span> sz=q.length;\n        <span class="k">for</span>(<span class="k">let</span> k=<span class="n">0</span>;k&lt;sz;k++) {\n            <span class="k">const</span>[x,y]=q.<span class="fn">shift</span>();\n            <span class="k">for</span>(<span class="k">const</span>[dx,dy] <span class="k">of</span> dirs) {\n                <span class="k">const</span>[nx,ny]=[x+dx,y+dy];\n                <span class="k">if</span>(nx&gt;=<span class="n">0</span>&amp;&amp;nx&lt;r&amp;&amp;ny&gt;=<span class="n">0</span>&amp;&amp;ny&lt;c&amp;&amp;g[nx][ny]===<span class="n">1</span>)\n                    { g[nx][ny]=<span class="n">2</span>; fresh--; q.<span class="fn">push</span>([nx,ny]); }\n            }\n        }\n    }\n    <span class="k">return</span> fresh===<span class="n">0</span> ? time : -<span class="n">1</span>;\n}`

      algorithm: 'Use a deque of indices maintaining a decreasing order of values. Remove expired indices from front, remove smaller indices from back, push current. Front is always the window max.',

      algoSteps: [
        {
          text: 'Step 1 — For each index i: remove front if it is out of window (index <= i-k).',
          diagramHtml: `

        {
          text: 'Step 3 — Once we have processed k elements (i >= k-1), nums[dq.front()] is the current window maximum. Record it.',

      complexity: { time: 'O(N)', space: 'O(K)', timeNote: 'Each index pushed and popped at most once.', spaceNote: 'Deque holds at most K indices.' },

      codes: {
        cpp: `vector&lt;<span class="t">int</span>&gt; <span class="fn">maxSlidingWindow</span>(vector&lt;<span class="t">int</span>&gt;&amp; nums, <span class="t">int</span> k) {\n    deque&lt;<span class="t">int</span>&gt; dq; vector&lt;<span class="t">int</span>&gt; res;\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;nums.<span class="fn">size</span>();i++) {\n        <span class="k">if</span>(!dq.<span class="fn">empty</span>()&amp;&amp;dq.<span class="fn">front</span>()&lt;=i-k) dq.<span class="fn">pop_front</span>();\n        <span class="k">while</span>(!dq.<span class="fn">empty</span>()&amp;&amp;nums[dq.<span class="fn">back</span>()]&lt;=nums[i]) dq.<span class="fn">pop_back</span>();\n        dq.<span class="fn">push_back</span>(i);\n        <span class="k">if</span>(i&gt;=k-<span class="n">1</span>) res.<span class="fn">push_back</span>(nums[dq.<span class="fn">front</span>()]);\n    }\n    <span class="k">return</span> res;\n}`,
        java: `<span class="k">public int</span>[] <span class="fn">maxSlidingWindow</span>(<span class="t">int</span>[] nums, <span class="t">int</span> k) {\n    <span class="t">int</span>[] res=<span class="k">new int</span>[nums.length-k+<span class="n">1</span>];\n    Deque&lt;<span class="t">Integer</span>&gt; dq=<span class="k">new</span> ArrayDeque&lt;&gt;();\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;nums.length;i++) {\n        <span class="k">if</span>(!dq.<span class="fn">isEmpty</span>()&amp;&amp;dq.<span class="fn">peekFirst</span>()&lt;=i-k) dq.<span class="fn">pollFirst</span>();\n        <span class="k">while</span>(!dq.<span class="fn">isEmpty</span>()&amp;&amp;nums[dq.<span class="fn">peekLast</span>()]&lt;=nums[i]) dq.<span class="fn">pollLast</span>();\n        dq.<span class="fn">offerLast</span>(i);\n        <span class="k">if</span>(i&gt;=k-<span class="n">1</span>) res[i-k+<span class="n">1</span>]=nums[dq.<span class="fn">peekFirst</span>()];\n    }\n    <span class="k">return</span> res;\n}`,
        python: `<span class="k">from</span> collections <span class="k">import</span> deque\n<span class="k">def</span> <span class="fn">max_sliding_window</span>(nums, k):\n    dq=deque(); res=[]\n    <span class="k">for</span> i,v <span class="k">in</span> <span class="fn">enumerate</span>(nums):\n        <span class="k">if</span> dq <span class="k">and</span> dq[<span class="n">0</span>]&lt;=i-k: dq.<span class="fn">popleft</span>()\n        <span class="k">while</span> dq <span class="k">and</span> nums[dq[-<span class="n">1</span>]]&lt;=v: dq.<span class="fn">pop</span>()\n        dq.<span class="fn">append</span>(i)\n        <span class="k">if</span> i&gt;=k-<span class="n">1</span>: res.<span class="fn">append</span>(nums[dq[<span class="n">0</span>]])\n    <span class="k">return</span> res`,
        javascript: `<span class="k">function</span> <span class="fn">maxSlidingWindow</span>(nums, k) {\n    <span class="k">const</span> dq=[],res=[];\n    <span class="k">for</span>(<span class="k">let</span> i=<span class="n">0</span>;i&lt;nums.length;i++) {\n        <span class="k">if</span>(dq.length&amp;&amp;dq[<span class="n">0</span>]&lt;=i-k) dq.<span class="fn">shift</span>();\n        <span class="k">while</span>(dq.length&amp;&amp;nums[dq.<span class="fn">at</span>(-<span class="n">1</span>)]&lt;=nums[i]) dq.<span class="fn">pop</span>();\n        dq.<span class="fn">push</span>(i);\n        <span class="k">if</span>(i&gt;=k-<span class="n">1</span>) res.<span class="fn">push</span>(nums[dq[<span class="n">0</span>]]);\n    }\n    <span class="k">return</span> res;\n}`
      }
    }

      algorithm: 'Keep a freq map and a queue of all seen characters (in order). For each new character, increment freq and push to queue. Then clean the queue front: while front has freq > 1, pop it. Front is the answer.',

          text: 'Step 2 — Clean queue front: while queue is not empty AND the front character has freq > 1, pop it from the queue. It has been repeated and is no longer the first non-repeating.',

      codes: {
        cpp: `string <span class="fn">firstNonRepeating</span>(string s) {\n    unordered_map&lt;<span class="t">char</span>,<span class="t">int</span>&gt; freq;\n    queue&lt;<span class="t">char</span>&gt; q;\n    string res;\n    <span class="k">for</span>(<span class="t">char</span> c:s) {\n        freq[c]++; q.<span class="fn">push</span>(c);\n        <span class="k">while</span>(!q.<span class="fn">empty</span>()&amp;&amp;freq[q.<span class="fn">front</span>()]&gt;<span class="n">1</span>) q.<span class="fn">pop</span>();\n        res += q.<span class="fn">empty</span>() ? <span class="s">'#'</span> : q.<span class="fn">front</span>();\n    }\n    <span class="k">return</span> res;\n}`,

      codes: {
        cpp: `<span class="t">int</span> <span class="fn">numIslands</span>(vector&lt;vector&lt;<span class="t">char</span>&gt;&gt;&amp; g) {\n    <span class="t">int</span> r=g.<span class="fn">size</span>(),c=g[<span class="n">0</span>].<span class="fn">size</span>(),cnt=<span class="n">0</span>;\n    <span class="t">int</span> dx[]={<span class="n">0</span>,<span class="n">0</span>,<span class="n">1</span>,-<span class="n">1</span>}, dy[]={<span class="n">1</span>,-<span class="n">1</span>,<span class="n">0</span>,<span class="n">0</span>};\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;r;i++) <span class="k">for</span>(<span class="t">int</span> j=<span class="n">0</span>;j&lt;c;j++) {\n        <span class="k">if</span>(g[i][j]==<span class="s">'1'</span>) {\n            cnt++;\n            queue&lt;pair&lt;<span class="t">int</span>,<span class="t">int</span>&gt;&gt; q;\n            q.<span class="fn">push</span>({i,j}); g[i][j]=<span class="s">'0'</span>;\n            <span class="k">while</span>(!q.<span class="fn">empty</span>()) {\n                auto[x,y]=q.<span class="fn">front</span>();q.<span class="fn">pop</span>();\n                <span class="k">for</span>(<span class="t">int</span> d=<span class="n">0</span>;d&lt;<span class="n">4</span>;d++) {\n                    <span class="t">int</span> nx=x+dx[d],ny=y+dy[d];\n                    <span class="k">if</span>(nx&gt;=<span class="n">0</span>&amp;&amp;nx&lt;r&amp;&amp;ny&gt;=<span class="n">0</span>&amp;&amp;ny&lt;c&amp;&amp;g[nx][ny]==<span class="s">'1'</span>)\n                        {g[nx][ny]=<span class="s">'0'</span>;q.<span class="fn">push</span>({nx,ny});}\n                }\n            }\n        }\n    }\n    <span class="k">return</span> cnt;\n}`,

        python: `<span class="k">from</span> collections <span class="k">import</span> deque\n<span class="k">def</span> <span class="fn">num_islands</span>(g):\n    r,c=<span class="fn">len</span>(g),<span class="fn">len</span>(g[<span class="n">0</span>]); cnt=<span class="n">0</span>\n    <span class="k">for</span> i <span class="k">in</span> <span class="fn">range</span>(r):\n        <span class="k">for</span> j <span class="k">in</span> <span class="fn">range</span>(c):\n            <span class="k">if</span> g[i][j]==<span class="s">'1'</span>:\n                cnt+=<span class="n">1</span>; q=deque([(i,j)]); g[i][j]=<span class="s">'0'</span>\n                <span class="k">while</span> q:\n                    x,y=q.<span class="fn">popleft</span>()\n                    <span class="k">for</span> dx,dy <span class="k">in</span>[(<span class="n">0</span>,<span class="n">1</span>),(<span class="n">0</span>,-<span class="n">1</span>),(<span class="n">1</span>,<span class="n">0</span>),(-<span class="n">1</span>,<span class="n">0</span>)]:\n                        nx,ny=x+dx,y+dy\n                        <span class="k">if</span> <span class="n">0</span>&lt;=nx&lt;r <span class="k">and</span> <span class="n">0</span>&lt;=ny&lt;c <span class="k">and</span> g[nx][ny]==<span class="s">'1'</span>:\n                            g[nx][ny]=<span class="s">'0'</span>; q.<span class="fn">append</span>((nx,ny))\n    <span class="k">return</span> cnt`,

  }\n    <span class="k">return</span> -<span class="n">1</span>;\n}`,

">0</span>)\n                {g[nx][ny]=<span class="n">1</span>;q.<span class="fn">add</span>(<span class="k">new int</span>[]{nx,ny,cur[<span class="n">2</span>]+<span class="n">1</span>});}\n        }\n    }\n    <span class="k">return</span> -<span class="n">1</span>;\n}`,

      complexity: { time: 'O(N)', space: 'O(K)', timeNote: '3 passes — O(k) + O(k) + O(n-k) = O(n).', spaceNote: 'Stack holds K elements.' },

      codes: {
        cpp: `<span class="k">void</span> <span class="fn">reverseKElements</span>(queue&lt;<span class="t">int</span>&gt;&amp; q, <span class="t">int</span> k) {\n    stack&lt;<span class="t">int</span>&gt; st;\n    <span class="t">int</span> n=q.<span class="fn">size</span>();\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;k;i++) { st.<span class="fn">push</span>(q.<span class="fn">front</span>()); q.<span class="fn">pop</span>(); }\n    <span class="k">while</span>(!st.<span class="fn">empty</span>()) { q.<span class="fn">push</span>(st.<span class="fn">top</span>()); st.<span class="fn">pop</span>(); }\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;n-k;i++) { q.<span class="fn">push</span>(q.<span class="fn">front</span>()); q.<span class="fn">pop</span>(); }\n}`,

        python: `<span class="k">def</span> <span class="fn">reverse_k</span>(q, k):\n    st=[]\n    <span class="k">for</span> _ <span class="k">in</span> <span class="fn">range</span>(k): st.<span class="fn">append</span>(q.<span class="fn">popleft</span>())\n    <span class="k">while</span> st: q.<span class="fn">appendleft</span>(st.<span class="fn">pop</span>())\n    n=<span class="fn">len</span>(q)\n    <span class="k">for</span> _ <span class="k">in</span> <span class="fn">range</span>(n-k): q.<span class="fn">append</span>(q.<span class="fn">popleft</span>())`,

      }
    }

        cpp: `vector&lt;vector&lt;<span class="t">int</span>&gt;&gt; <span class="fn">zigzagOrder</span>(<span class="t">TreeNode</span>* root) {\n    <span class="k">if</span>(!root) <span class="k">return</span> {};\n    vector&lt;vector&lt;<span class="t">int</span>&gt;&gt; res;\n    queue&lt;<span class="t">TreeNode</span>*&gt; q; q.<span class="fn">push</span>(root);\n    <span class="t">bool</span> ltr=<span class="k">true</span>;\n    <span class="k">while</span>(!q.<span class="fn">empty</span>()) {\n        <span class="t">int</span> sz=q.<span class="fn">size</span>(); vector&lt;<span class="t">int</span>&gt; level(sz);\n        <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;sz;i++) {\n            auto n=q.<span class="fn">front</span>();q.<span class="fn">pop</span>();\n            level[ltr?i:sz-<span class="n">1</span>-i]=n-&gt;val;\n            <span class="k">if</span>(n-&gt;left)  q.<span class="fn">push</span>(n-&gt;left);\n            <span class="k">if</span>(n-&gt;right) q.<span class="fn">push</span>(n-&gt;right);\n        }\n        res.<span class="fn">push_back</span>(level); ltr=!ltr;\n    }\n    <span class="k">return</span> res;\n}`,

        python: `<span class="k">from</span> collections <span class="k">import</span> deque\n<span class="k">def</span> <span class="fn">zigzag_order</span>(root):\n    <span class="k">if not</span> root: <span class="k">return</span> []\n    res=[]; q=deque([root]); ltr=<span class="k">True</span>\n    <span class="k">while</span> q:\n        level=[]\n        <span class="k">for</span> _ <span class="k">in</span> <span class="fn">range</span>(<span class="fn">len</span>(q)):\n            n=q.<span class="fn">popleft</span>(); level.<span class="fn">append</span>(n.val)\n            <span class="k">if</span> n.left:  q.<span class="fn">append</span>(n.left)\n            <span class="k">if</span> n.right: q.<span class="fn">append</span>(n.right)\n        res.<span class="fn">append</span>(level <span class="k">if</span> ltr <span class="k">else</span> level[::-<span class="n">1</span>]); ltr=<span class="k">not</span> ltr\n    <span class="k">return</span> res`,
        javascript: `<span class="k">function</span> <span class="fn">zigzagOrder</span>(root) {\n    <span class="k">if</span>(!root) <span class="k">return</span> [];\n    <span class="k">const</span> res=[],q=[root]; <span class="k">let</span> ltr=<span class="k">true</span>;\n    <span class="k">while</span>(q.length) {\n        <span class="k">const</span> sz=q.length, level=<span class="k">new</span> Array(sz);\n        <span class="k">for</span>(<span class="k">let</span> i=<span class="n">0</span>;i&lt;sz;i++) {\n            <span class="k">const</span> n=q.<span class="fn">shift</span>();\n            level[ltr?i:sz-<span class="n">1</span>-i]=n.val;\n            <span class="k">if</span>(n.left)  q.<span class="fn">push</span>(n.left);\n            <span class="k">if</span>(n.right) q.<span class="fn">push</span>(n.right);\n        }\n        res.<span class="fn">push</span>(level); ltr=!ltr;\n    }\n    <span class="k">return</span> res;\n}`

        java: `<span class="k">public int</span> <span class="fn">leastInterval</span>(<span class="t">char</span>[] t, <span class="t">int</span> n) {\n    <span class="t">int</span>[] freq=<span class="k">new int</span>[<span class="n">26</span>]; <span class="t">int</span> maxF=<span class="n">0</span>,cnt=<span class="n">0</span>;\n    <span class="k">for</span>(<span class="t">char</span> c:t) freq[c-<span class="s">'A'</span>]++;\n    <span class="k">for</span>(<span class="t">int</span> f:freq) { <span class="k">if</span>(f&gt;maxF){maxF=f;cnt=<span class="n">1</span>;} <span class="k">else if</span>(f==maxF) cnt++; }\n    <span class="k">return</span> Math.<span class="fn">max</span>(t.length,(maxF-<span class="n">1</span>)*(n+<span class="n">1</span>)+cnt);\n}`,
        python: `<span class="k">from</span> collections <span class="k">import</span> Counter\n<span class="k">def</span> <span class="fn">least_interval</span>(tasks, n):\n    freq=Counter(tasks)\n    maxF=<span class="fn">max</span>(freq.values())\n    cnt=<span class="fn">sum</span>(<span class="n">1</span> <span class="k">for</span> v <span class="k">in</span> freq.values() <span class="k">if</span> v==maxF)\n    <span class="k">return</span> <span class="fn">max</span>(<span class="fn">len</span>(tasks),(maxF-<span class="n">1</span>)*(n+<span class="n">1</span>)+cnt)`,
        javascript: `<span class="k">function</span> <span class="fn">leastInterval</span>(t, n) {\n    <span class="k">const</span> freq={};\n    <span class="k">for</span>(<span class="k">const</span> c <span class="k">of</span> t) freq[c]=(freq[c]||<span class="n">0</span>)+<span class="n">1</span>;\n    <span class="k">const</span> vals=Object.<span class="fn">values</span>(freq);\n    <span class="k">const</span> maxF=Math.<span class="fn">max</span>(...vals);\n    <span class="k">const</span> cnt=vals.<span class="fn">filter</span>(v=>v===maxF).length;\n    <span class="k">return</span> Math.<span class="fn">max</span>(t.length,(maxF-<span class="n">1</span>)*(n+<span class="n">1</span>)+cnt);\n}`

      codes: {
        cpp: `<span class="t">int</span> <span class="fn">ladderLength</span>(string bw, string ew, vector&lt;string&gt;&amp; wl) {\n    unordered_set&lt;string&gt; ws(wl.<span class="fn">begin</span>(),wl.<span class="fn">end</span>());\n    <span class="k">if</span>(!ws.<span class="fn">count</span>(ew)) <span class="k">return</span> <span class="n">0</span>;\n    queue&lt;pair&lt;string,<span class="t">int</span>&gt;&gt; q; q.<span class="fn">push</span>({bw,<span class="n">1</span>});\n    <span class="k">while</span>(!q.<span class="fn">empty</span>()){\n        auto[w,d]=q.<span class="fn">front</span>();q.<span class="fn">pop</span>();\n        <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;w.<span class="fn">size</span>();i++){\n            <span class="t">char</span> orig=w[i];\n            <span class="k">for</span>(<span class="t">char</span> c=<span class="s">'a'</span>;c&lt;=<span class="s">'z'</span>;c++){\n                w[i]=c;\n                <span class="k">if</span>(w==ew) <span class="k">return</span> d+<span class="n">1</span>;\n                <span class="k">if</span>(ws.<span class="fn">count</span>(w)){ws.<span class="fn">erase</span>(w);q.<span class="fn">push</span>({w,d+<span class="n">1</span>});}\n            }\n            w[i]=orig;\n        }\n    }\n    <span class="k">return</span> <span class="n">0</span>;\n}`,

        python: `<span class="k">from</span> collections <span class="k">import</span> deque\n<span class="k">def</span> <span class="fn">ladder_length</span>(bw, ew, wl):\n    ws=<span class="fn">set</span>(wl)\n    <span class="k">if</span> ew <span class="k">not in</span> ws: <span class="k">return</span> <span class="n">0</span>\n    q=deque([(bw,<span class="n">1</span>)])\n    <span class="k">while</span> q:\n        w,d=q.<span class="fn">popleft</span>()\n        <span class="k">for</span> i <span class="k">in</span> <span class="fn">range</span>(<span class="fn">len</span>(w)):\n            <span class="k">for</span> c <span class="k">in</span> <span class="s">'abcdefghijklmnopqrstuvwxyz'</span>:\n                nw=w[:i]+c+w[i+<span class="n">1</span>:]\n                <span class="k">if</span> nw==ew: <span class="k">return</span> d+<span class="n">1</span>\n                <span class="k">if</span> nw <span class="k">in</span> ws: ws.<span class="fn">discard</span>(nw); q.<span class="fn">append</span>((nw,d+<span class="n">1</span>))\n    <span class="k">return</span> <span class="n">0</span>`,
        javascript: `<span class="k">function</span> <span class="fn">ladderLength</span>(bw, ew, wl) {\n    <span class="k">const</span> ws=<span class="k">new</span> Set(wl);\n    <span class="k">if</span>(!ws.<span class="fn">has</span>(ew)) <span class="k">return</span> <span class="n">0</span>;\n    <span class="k">const</span> q=[[bw,<span class="n">1</span>]];\n    <span class="k">while</span>(q.length) {\n        <span class="k">const</span>[w,d]=q.<span class="fn">shift</span>();\n        <span class="k">for</span>(<span class="k">let</span> i=<span class="n">0</span>;i&lt;w.length;i++) {\n            <span class="k">for</span>(<span class="k">let</span> c=<span class="n">97</span>;c&lt;=<span class="n">122</span>;c++) {\n                <span class="k">const</span> nw=w.<span class="fn">slice</span>(<span class="n">0</span>,i)+String.<span class="fn">fromCharCode</span>(c)+w.<span class="fn">slice</span>(i+<span class="n">1</span>);\n                <span class="k">if</span>(nw===ew) <span class="k">return</span> d+<span class="n">1</span>;\n                <span class="k">if</span>(ws.<span class="fn">has</span>(nw)) { ws.<span class="fn">delete</span>(nw); q.<span class="fn">push</span>([nw,d+<span class="n">1</span>]); }\n            }\n        }\n    }\n    <span class="k">return</span> <span class="n">0</span>;\n}`

      codes: {

      algorithm: 'Use a DFS that returns height. At each node: get left and right heights. If either returns -1 (already unbalanced), propagate -1 up. If the difference is > 1, return -1. Otherwise return 1 + max(left, right).',

              <div><span style="color:#cba6f7;">return</span> <span style="color:#a6e3a1;">1</span> + <span style="color:#89b4fa;">max</span>(l, r);</div>

      complexity: { time: 'O(N)', space: 'O(H)', timeNote: 'Each node visited once — O(N).', spaceNote: 'O(H) recursion stack.' },

      codes: {
        cpp: `<span class="t">int</span> <span class="fn">check</span>(<span class="t">TreeNode</span>* root) {\n    <span class="k">if</span> (!root) <span class="k">return</span> <span class="n">0</span>;\n    <span class="t">int</span> l=<span class="fn">check</span>(root-&gt;left), r=<span class="fn">check</span>(root-&gt;right);\n    <span class="k">if</span>(l==-<span class="n">1</span>||r==-<span class="n">1</span>||abs(l-r)&gt;<span class="n">1</span>) <span class="k">return</span> -<span class="n">1</span>;\n    <span class="k">return</span> <span class="n">1</span>+max(l,r);\n}\n<span class="t">bool</span> <span class="fn">isBalanced</span>(<span class="t">TreeNode</span>* root) { <span class="k">return</span> <span class="fn">check</span>(root)!=-<span class="n">1</span>; }`,

        python: `<span class="k">def</span> <span class="fn">is_balanced</span>(root):\n    <span class="k">def</span> <span class="fn">check</span>(node):\n        <span class="k">if not</span> node: <span class="k">return</span> <span class="n">0</span>\n        l, r = <span class="fn">check</span>(node.left), <span class="fn">check</span>(node.right)\n        <span class="k">if</span> l==-<span class="n">1</span> <span class="k">or</span> r==-<span class="n">1</span> <span class="k">or</span> <span class="fn">abs</span>(l-r)&gt;<span class="n">1</span>: <span class="k">return</span> -<span class="n">1</span>\n        <span class="k">return</span> <span class="n">1</span> + <span class="fn">max</span>(l, r)\n    <span class="k">return</span> <span class="fn">check</span>(root) != -<span class="n">1</span>`,

      codes: {

        javascript: `<span class="k">function</span> <span class="fn">isSymmetric</span>(root) {\n    <span class="k">function</span> <span class="fn">mirror</span>(l, r) {\n        <span class="k">if</span>(!l&amp;&amp;!r) <span class="k">return true</span>;\n        <span class="k">if</span>(!l||!r||l.val!==r.val) <span class="k">return false</span>;\n        <span class="k">return</span> <span class="fn">mirror</span>(l.left,r.right)&amp;&amp;<span class="fn">mirror</span>(l.right,r.left);\n    }\n    <span class="k">return</span> <span class="fn">mirror</span>(root.left,root.right);\n}`

        cpp: `vector&lt;<span class="t">int</span>&gt; <span class="fn">rightSideView</span>(<span class="t">TreeNode</span>* root) {\n    <span class="k">if</span>(!root) <span class="k">return</span> {};\n    vector&lt;<span class="t">int</span>&gt; res; queue&lt;<span class="t">TreeNode</span>*&gt; q; q.<span class="fn">push</span>(root);\n    <span class="k">while</span>(!q.<span class="fn">empty</span>()) {\n        <span class="t">int</span> sz=q.<span class="fn">size</span>();\n        <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;sz;i++) {\n            <span class="t">TreeNode</span>* n=q.<span class="fn">front</span>();q.<span class="fn">pop</span>();\n            <span class="k">if</span>(i==sz-<span class="n">1</span>) res.<span class="fn">push_back</span>(n-&gt;val);\n            <span class="k">if</span>(n-&gt;left)  q.<span class="fn">push</span>(n-&gt;left);\n            <span class="k">if</span>(n-&gt;right) q.<span class="fn">push</span>(n-&gt;right);\n        }\n    }\n    <span class="k">return</span> res;\n}`,

        python: `<span class="k">from</span> collections <span class="k">import</span> deque\n<span class="k">def</span> <span class="fn">right_side_view</span>(root):\n    <span class="k">if not</span> root: <span class="k">return</span> []\n    res=[]; q=deque([root])\n    <span class="k">while</span> q:\n        sz=<span class="fn">len</span>(q)\n        <span class="k">for</span> i <span class="k">in</span> <span class="fn">range</span>(sz):\n            n=q.<span class="fn">popleft</span>()\n            <span class="k">if</span> i==sz-<span class="n">1</span>: res.<span class="fn">append</span>(n.val)\n            <span class="k">if</span> n.left:  q.<span class="fn">append</span>(n.left)\n            <span class="k">if</span> n.right: q.<span class="fn">append</span>(n.right)\n    <span class="k">return</span> res`,
        javascript: `<span class="k">function</span> <span class="fn">rightSideView</span>(root){\n    <span class="k">if</span>(!root) <span class="k">return</span> [];\n    <span class="k">const</span> res=[],q=[root];\n    <span class="k">while</span>(q.length){\n        <span class="k">const</span> sz=q.length;\n        <span class="k">for</span>(<span class="k">let</span> i=<span class="n">0</span>;i&lt;sz;i++){\n            <span class="k">const</span> n=q.<span class="fn">shift</span>();\n            <span class="k">if</span>(i===sz-<span class="n">1</span>) res.<span class="fn">push</span>(n.val);\n            <span class="k">if</span>(n.left)  q.<span class="fn">push</span>(n.left);\n            <span class="k">if</span>(n.right) q.<span class="fn">push</span>(n.right);\n        }\n    }\n    <span class="k">return</span> res;\n}`

      codes: {

        java: `<span class="t">boolean</span> <span class="fn">validate</span>(<span class="t">TreeNode</span> root, <span class="t">long</span> lo, <span class="t">long</span> hi){\n    <span class="k">if</span>(root==<span class="k">null</span>) <span class="k">return true</span>;\n    <span class="k">if</span>(root.val<=lo||root.val>=hi) <span class="k">return false</span>;\n    <span class="k">return</span> <span class="fn">validate</span>(root.left,lo,root.val) &amp;&amp;\n           <span class="fn">validate</span>(root.right,root.val,hi);\n}\n<span class="k">public boolean</span> <span class="fn">isValidBST</span>(<span class="t">TreeNode</span> r){\n    <span class="k">return</span> <span class="fn">validate</span>(r,Long.MIN_VALUE,Long.MAX_VALUE);\n}`,
        python: `<span class="k">def</span> <span class="fn">is_valid_bst</span>(root):\n    <span class="k">def</span> <span class="fn">validate</span>(node, lo, hi):\n        <span class="k">if not</span> node: <span class="k">return True</span>\n        <span class="k">if not</span> (lo &lt; node.val &lt; hi): <span class="k">return False</span>\n        <span class="k">return</span> (<span class="fn">validate</span>(node.left,  lo, node.val) <span class="k">and</span>\n                <span class="fn">validate</span>(node.right, node.val, hi))\n    <span class="k">return</span> <span class="fn">validate</span>(root, <span class="fn">float</span>(<span class="s">'-inf'</span>), <span class="fn">float</span>(<span class="s">'inf'</span>))`,

      codes: {
        cpp: `<span class="t">TreeNode</span>* <span class="fn">build</span>(vector&lt;<span class="t">int</span>&gt;&amp; pre, <span class="t">int</span> ps, <span class="t">int</span> pe,\n               vector&lt;<span class="t">int</span>&gt;&amp; in,  <span class="t">int</span> is, <span class="t">int</span> ie,\n               unordered_map&lt;<span class="t">int</span>,<span class="t">int</span>&gt;&amp; mp) {\n    <span class="k">if</span>(ps>pe||is>ie) <span class="k">return nullptr</span>;\n    <span class="t">int</span> rv=pre[ps], mid=mp[rv], lsz=mid-is;\n    <span class="t">TreeNode</span>* root=<span class="k">new</span> <span class="t">TreeNode</span>(rv);\n    root-&gt;left =<span class="fn">build</span>(pre,ps+<span class="n">1</span>,ps+lsz,in,is,mid-<span class="n">1</span>,mp);\n    root-&gt;right=<span class="fn">build</span>(pre,ps+lsz+<span class="n">1</span>,pe,in,mid+<span class="n">1</span>,ie,mp);\n    <span class="k">return</span> root;\n}`,
        java: `<span class="k">public</span> <span class="t">TreeNode</span> <span class="fn">buildTree</span>(<span class="t">int</span>[] pre, <span class="t">int</span>[] in){\n    Map&lt;<span class="t">Integer</span>,<span class="t">Integer</span>&gt; mp=<span class="k">new</span> HashMap&lt;&gt;();\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;in.length;i++) mp.<span class="fn">put</span>(in[i],i);\n    <span class="k">return</span> <span class="fn">build</span>(pre,<span class="n">0</span>,pre.length-<span class="n">1</span>,in,<span class="n">0</span>,in.length-<span class="n">1</span>,mp);\n}\n<span class="t">TreeNode</span> <span class="fn">build</span>(<span class="t">int</span>[]p,<span class="t">int</span> ps,<span class="t">int</span> pe,<span class="t">int</span>[]n,<span class="t">int</span> is,<span class="t">int</span> ie,Map&lt;<span class="t">Integer</span>,<span class="t">Integer</span>&gt; mp){\n    <span class="k">if</span>(ps>pe) <span class="k">return null</span>;\n    <span class="t">int</span> rv=p[ps],mid=mp.get(rv),lsz=mid-is;\n    <span class="t">TreeNode</span> root=<span class="k">new</span> <span class="t">TreeNode</span>(rv);\n    root.left=<span class="fn">build</span>(p,ps+<span class="n">1</span>,ps+lsz,n,is,mid-<span class="n">1</span>,mp);\n    root.right=<span class="fn">build</span>(p,ps+lsz+<span class="n">1</span>,pe,n,mid+<span class="n">1</span>,ie,mp);\n    <span class="k">return</span> root;\n}`,
        python: `<span class="k">def</span> <span class="fn">build_tree</span>(preorder, inorder):\n    mp = {v:i <span class="k">for</span> i,v <span class="k">in</span> <span class="fn">enumerate</span>(inorder)}\n    <span class="k">def</span> <span class="fn">build</span>(ps, pe, is_, ie):\n        <span class="k">if</span> ps>pe: <span class="k">return None</span>\n        rv=preorder[ps]; mid=mp[rv]; lsz=mid-is_\n        root=TreeNode(rv)\n        root.left =<span class="fn">build</span>(ps+<span class="n">1</span>,ps+lsz,is_,mid-<span class="n">1</span>)\n        root.right=<span class="fn">build</span>(ps+lsz+<span class="n">1</span>,pe,mid+<span class="n">1</span>,ie)\n        <span class="k">return</span> root\n    <span class="k">return</span> <span class="fn">build</span>(<span class="n">0</span>,<span class="fn">len</span>(preorder)-<span class="n">1</span>,<span class="n">0</span>,<span class="fn">len</span>(inorder)-<span class="n">1</span>)`,

      desc: 'Find the Kth smallest element in a BST using inorder traversal — which visits nodes in sorted order.',

      algorithm: 'Key insight: inorder traversal of a BST gives elements in ascending sorted order. Do an inorder DFS, decrement k at each node visited. When k reaches 0, the current node is the answer.',

          text: 'Step 1 — Inorder visits nodes in sorted order for a BST (Left → Root → Right). So the kth node visited in inorder is the kth smallest.',

              k-th inorder visit = k-th smallest element

              <div><span style="color:#89b4fa;">inorder</span>(root-&gt;right);</div>

      codes: {
