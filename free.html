      algorithm: 'Step 1: Get topological order using DFS/Kahn\'s. Step 2: Initialize dist[src]=0, all others=∞. Step 3: Process vertices in topological order — for each vertex, relax all its outgoing edges. This works because in a DAG, when we process vertex u, all vertices that can update u have already been processed.',

      algoSteps: [
        {
          text: 'Step 1 — Get topological order: Use DFS with a stack (post-order). When DFS finishes a node, push it to the stack. Stack top = first in topological order.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#cba6f7;">void</span> <span style="color:#89b4fa;">dfs</span>(u, vis, stk, adj) {</div>
              <div>&nbsp;&nbsp;vis[u]=<span style="color:#a6e3a1;">true</span>;</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">for</span>(v:adj[u]) <span style="color:#cba6f7;">if</span>(!vis[v]) <span style="color:#89b4fa;">dfs</span>(v,vis,stk,adj);</div>
              <div>&nbsp;&nbsp;stk.<span style="color:#89b4fa;">push</span>(u); <span style="color:#585b70;">// push AFTER recursing</span></div>
              <div>}</div>
            </div>`
        },
        {
          text: 'Step 2 — Initialize: dist[src]=0, all others=∞.',
          diagramHtml: null
        },
        {
          text: 'Step 3 — Process in topological order: Pop vertices from stack one by one. For each vertex u (if dist[u]≠∞), relax all edges u→v: if dist[u]+w < dist[v], update dist[v].',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;padding:14px 18px;border-radius:8px;font-size:12px;color:#cdd6f4;line-height:2;">
              <div><span style="color:#cba6f7;">while</span>(!stk.<span style="color:#89b4fa;">empty</span>()) {</div>
              <div>&nbsp;&nbsp;u = stk.<span style="color:#89b4fa;">top</span>(); stk.<span style="color:#89b4fa;">pop</span>();</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(dist[u]==INF) <span style="color:#cba6f7;">continue</span>;</div>
              <div>&nbsp;&nbsp;<span style="color:#cba6f7;">for</span>([v,w]:adj[u])</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#cba6f7;">if</span>(dist[u]+w &lt; dist[v]) dist[v]=dist[u]+w;</div>
              <div>}</div>
            </div>`
        },
        {
          text: 'Step 4 — Why this works: In topological order, when we process u, ALL vertices that could provide a shorter path to u have already been processed. So dist[u] is finalized when we process it.',
          diagramHtml: `
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 14px;border:2px solid #22c55e;border-radius:8px;background:#f0fdf4;color:#15803d;line-height:2;">
              DAG property: no back edges → topo order guarantees
              all predecessors of u are processed before u.
              This allows O(V+E) vs Dijkstra's O((V+E)logV).

        }
      ],

      complexity: { time: 'O(V+E)', space: 'O(V+E)', timeNote: 'Topological sort O(V+E) + one relaxation pass O(V+E).', spaceNote: 'Stack for topo order + dist array.' },

      codes: {
        cpp: `<span class="k">void</span> <span class="fn">dfsUtil</span>(<span class="t">int</span> u, vector&lt;<span class="t">bool</span>&gt;&amp; vis,\n             stack&lt;<span class="t">int</span>&gt;&amp; stk,\n             vector&lt;vector&lt;pair&lt;<span class="t">int</span>,<span class="t">int</span>&gt;&gt;&gt;&amp; adj){\n    vis[u]=<span class="k">true</span>;\n    <span class="k">for</span>(auto[v,w]:adj[u]) <span class="k">if</span>(!vis[v]) <span class="fn">dfsUtil</span>(v,vis,stk,adj);\n    stk.<span class="fn">push</span>(u);\n}\nvector&lt;<span class="t">int</span>&gt; <span class="fn">shortestPath</span>(<span class="t">int</span> V, <span class="t">int</span> src,\n    vector&lt;vector&lt;pair&lt;<span class="t">int</span>,<span class="t">int</span>&gt;&gt;&gt;&amp; adj){\n    vector&lt;<span class="t">bool</span>&gt; vis(V,<span class="k">false</span>);\n    stack&lt;<span class="t">int</span>&gt; stk;\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;V;i++) <span class="k">if</span>(!vis[i]) <span class="fn">dfsUtil</span>(i,vis,stk,adj);\n    vector&lt;<span class="t">int</span>&gt; dist(V,INT_MAX); dist[src]=<span class="n">0</span>;\n    <span class="k">while</span>(!stk.<span class="fn">empty</span>()){\n        <span class="t">int</span> u=stk.<span class="fn">top</span>();stk.<span class="fn">pop</span>();\n        <span class="k">if</span>(dist[u]==INT_MAX) <span class="k">continue</span>;\n        <span class="k">for</span>(auto[v,w]:adj[u])\n            <span class="k">if</span>(dist[u]+w&lt;dist[v]) dist[v]=dist[u]+w;\n    }\n    <span class="k">return</span> dist;\n}`,
        java: `<span class="k">public int</span>[] <span class="fn">shortestPath</span>(<span class="t">int</span> V, <span class="t">int</span> src,\n    List&lt;List&lt;<span class="t">int</span>[]&gt;&gt; adj){\n    <span class="t">boolean</span>[] vis=<span class="k">new boolean</span>[V];\n    Stack&lt;<span class="t">Integer</span>&gt; stk=<span class="k">new</span> Stack&lt;&gt;();\n    <span class="k">for</span>(<span class="t">int</span> i=<span class="n">0</span>;i&lt;V;i++) <span class="k">if</span>(!vis[i]) <span class="fn">dfs</span>(i,vis,stk,adj);\n    <span class="t">int</span>[] dist=<span class="k">new int</span>[V]; Arrays.<span class="fn">fill</span>(dist,Integer.MAX_VALUE);\n    dist[src]=<span class="n">0</span>;\n    <span class="k">while</span>(!stk.<span class="fn">isEmpty</span>()){\n        <span class="t">int</span> u=stk.<span class="fn">pop</span>();\n        <span class="k">if</span>(dist[u]==Integer.MAX_VALUE) <span class="k">continue</span>;\n        <span class="k">for</span>(<span class="t">int</span>[] e:adj.<span class="fn">get</span>(u))\n            <span class="k">if</span>(dist[u]+e[<span class="n">1</span>]<dist[e[<span class="n">0</span>]]) dist[e[<span class="n">0</span>]]=dist[u]+e[<span class="n">1</span>];\n    }\n    <span class="k">return</span> dist;\n}`,
        python: `<span class="k">def</span> <span class="fn">shortest_path_dag</span>(V, src, adj):\n    vis=[<span class="k">False</span>]*V; stk=[]\n    <span class="k">def</span> <span class="fn">dfs</span>(u):\n        vis[u]=<span class="k">True</span>\n        <span class="k">for</span> v,_ <span class="k">in</span> adj[u]:\n            <span class="k">if not</span> vis[v]: <span class="fn">dfs</span>(v)\n        stk.<span class="fn">append</span>(u)\n    <span class="k">for</span> i <span class="k">in</span> <span class="fn">range</span>(V):\n        <span class="k">if not</span> vis[i]: <span class="fn">dfs</span>(i)\n    dist=[<span class="fn">float</span>(<span class="s">'inf'</span>)]*V; dist[src]=<span class="n">0</span>\n    <span class="k">while</span> stk:\n        u=stk.<span class="fn">pop</span>()\n        <span class="k">if</span> dist[u]==<span class="fn">float</span>(<span class="s">'inf'</span>): <span class="k">continue</span>\n        <span class="k">for</span> v,w <span class="k">in</span> adj[u]:\n            <span class="k">if</span> dist[u]+w<dist[v]: dist[v]=dist[u]+w\n    <span class="k">return</span> dist`,
        javascript: `<span class="k">function</span> <span class="fn">shortestPathDAG</span>(V, src, adj){\n    <span class="k">const</span> vis=<span class="k">new</span> Array(V).<span class="fn">fill</span>(<span class="k">false</span>), stk=[];\n    <span class="k">function</span> <span class="fn">dfs</span>(u){\n        vis[u]=<span class="k">true</span>;\n        <span class="k">for</span>(<span class="k">const</span>[v] <span class="k">of</span> adj[u]) <span class="k">if</span>(!vis[v]) <span class="fn">dfs</span>(v);\n        stk.<span class="fn">push</span>(u);\n    }\n    <span class="k">for</span>(<span class="k">let</span> i=<span class="n">0</span>;i&lt;V;i++) <span class="k">if</span>(!vis[i]) <span class="fn">dfs</span>(i);\n    <span class="k">const</span> dist=<span class="k">new</span> Array(V).<span class="fn">fill</span>(Infinity); dist[src]=<span class="n">0</span>;\n    <span class="k">while</span>(stk.length){\n        <span class="k">const</span> u=stk.<span class="fn">pop</span>();\n        <span class="k">if</span>(dist[u]===Infinity) <span class="k">continue</span>;\n        <span class="k">for</span>(<span class="k">const</span>[v,w] <span class="k">of</span> adj[u])\n            <span class="k">if</span>(dist[u]+w<dist[v]) dist[v]=dist[u]+w;\n    }\n    <span class="k">return</span> dist;\n}`
      }

// ══════════════════════════════════════════════════════════════════
// APPLICATION STATE
// ══════════════════════════════════════════════════════════════════
let currentCategory = 'arrays';
let currentTopic    = null;
let currentLang     = 'cpp';
let savedTopics     = [];

try { savedTopics = JSON.parse(localStorage.getItem('cf_saved') || '[]'); } catch(e) {}

// ══════════════════════════════════════════════════════════════════
// HOME PAGE RENDERER
// ══════════════════════════════════════════════════════════════════
function renderHome() {
  // Category tabs
  document.getElementById('category-tabs').innerHTML = categories.map(c => `
    <button class="tab-btn ${c.id === currentCategory ? 'active' : ''}" onclick="switchCategory('${c.id}')">
      ${c.label}
    </button>
  `).join('');

  // Header title + subtitle
  const cat = categories.find(c => c.id === currentCategory);
  document.getElementById('home-category-title').textContent = cat.label;
  document.getElementById('home-category-sub').textContent   = cat.description;

  // Topic rows
  const list = topics[currentCategory] || [];
  document.getElementById('topic-tbody').innerHTML = list.map((t, i) => `
    <tr class="topic-row" onclick="openTopic('${t.id}')">
      <td>${i + 1}</td>
      <td>
        <div class="topic-name">${t.name}</div>
        <div class="topic-desc">${t.desc}</div>
      </td>
      <td>
        <div class="topic-actions">
          <div class="icon-btn ${savedTopics.includes(t.id) ? 'saved-icon' : ''}"
               id="home-save-${t.id}"
               onclick="event.stopPropagation(); toggleSaveFromHome('${t.id}')"
               title="Save">
            <svg fill="${savedTopics.includes(t.id) ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
            </svg>
          </div>
          <div class="icon-btn"
               onclick="event.stopPropagation(); shareTopicById('${t.id}')"
               title="Share">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
            </svg>
          </div>
        </div>
      </td>
    </tr>
  `).join('');
}

function switchCategory(id) {
  currentCategory = id;
  renderHome();
}

// ══════════════════════════════════════════════════════════════════
// DETAIL PAGE — fully generic renderer driven by topic data
// ══════════════════════════════════════════════════════════════════
function openTopic(id) {
  // Find topic across all categories
  for (const list of Object.values(topics)) {
    const found = list.find(x => x.id === id);
    if (found) { currentTopic = found; break; }
  }
  if (!currentTopic) return;

  currentLang = 'cpp';
  renderDetailPage();

  document.getElementById('page-home').classList.remove('active');
  document.getElementById('page-detail').classList.add('active');
  window.scrollTo(0, 0);
  setTimeout(updateSaveBtn, 10);
}

function renderDetailPage() {
  const t  = currentTopic;
  const ex = t.examples[0];

  // Build algo steps HTML generically from algoSteps array
  const stepsHtml = (t.algoSteps || []).map((step, i) => `
    <div class="algo-step">
      <div class="algo-step-header">
        <div class="algo-step-dot"></div>
        <div class="algo-step-text">${step.text}</div>
      </div>
      ${step.diagramHtml ? `
        <div class="step-diagram-card">
          <span class="brand">Fundamentals</span>
          <span class="step-label">Step ${i + 1}</span>
          ${step.diagramHtml}
        </div>` : ''}
    </div>
  `).join('');

  // Build language code panels generically
  const langKeys = Object.keys(t.codes);
  const langLabels = { cpp: 'C++', java: 'Java', python: 'Python', javascript: 'JavaScript' };

  const langTabsHtml = langKeys.map(lang => `
    <button class="lang-tab ${lang === 'cpp' ? 'active' : ''}" id="ltab-${lang}" onclick="switchLang('${lang}')">
      ${langLabels[lang] || lang}
    </button>
  `).join('');

  const codePanelsHtml = langKeys.map(lang => `
    <div class="code-panel ${lang === 'cpp' ? 'active' : ''}" id="cpanel-${lang}">
      <pre class="code-block"><code>${t.codes[lang]}</code></pre>
    </div>
  `).join('');

  // Build examples HTML generically
  const examplesHtml = t.examples.map(ex => `
    <div class="code-example">
      <span class="kw">Input:</span>  ${ex.input}<br>
      <span class="val">Output:</span> ${ex.output}<br>
      <span class="comment">Explanation: ${ex.explanation}</span>
    </div>
  `).join('');

  document.getElementById('detail-content').innerHTML = `
    <div class="cat-badge">${t.badge}</div>
    <h1 class="detail-title">${t.name}</h1>
    <p class="problem-desc"><strong>Problem Description:</strong> ${t.problem}</p>

    <!-- EXAMPLES ACCORDION -->
    <div class="accordion open" id="acc-examples">
      <div class="accordion-header" onclick="toggleAccordion('acc-examples')">
        Examples
        <span class="accordion-arrow">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </span>
      </div>
      <div class="accordion-body">
        <div class="example-box">
          ${examplesHtml}
          <div class="diagram-canvas">
            <span class="brand">Fundamentals</span>
            ${t.diagramHtml}
          </div>
        </div>
      </div>
    </div>

    <!-- APPROACH ACCORDION -->
    <div class="accordion open" id="acc-approach">
      <div class="accordion-header" onclick="toggleAccordion('acc-approach')">
        Approach
        <span class="accordion-arrow">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </span>
      </div>
      <div class="accordion-body">

        <!-- ALGORITHM SUB-ACCORDION -->
        <div class="accordion open" id="acc-algo" style="margin:16px;border-radius:8px;">
          <div class="accordion-header" onclick="toggleAccordion('acc-algo')" style="border-radius:8px 8px 0 0;">
            Algorithm
            <span class="accordion-arrow">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </span>
          </div>
          <div class="accordion-body">
            <div class="algo-body">
              <p class="algo-text">${t.algorithm}</p>
              <div class="step-diagrams">${stepsHtml}</div>
            </div>
          </div>
        </div>

        <!-- CODE SUB-ACCORDION -->
        <div class="accordion open" id="acc-code" style="margin:0 16px 16px;border-radius:8px;">
          <div class="accordion-header" onclick="toggleAccordion('acc-code')" style="border-radius:8px 8px 0 0;">
            Code
            <span class="accordion-arrow">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </span>
          </div>
          <div class="accordion-body code-section">
            <div class="lang-tabs">
              ${langTabsHtml}
              <button class="copy-btn" onclick="copyCode()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
                Copy
              </button>
            </div>
            ${codePanelsHtml}
          </div>
        </div>

      </div>
    </div>

    <!-- COMPLEXITY ACCORDION -->
    <div class="accordion open" id="acc-complexity">
      <div class="accordion-header" onclick="toggleAccordion('acc-complexity')">
        Complexity Analysis
        <span class="accordion-arrow">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </span>
      </div>
      <div class="accordion-body">
        <div class="complexity-body">
          <div class="complexity-row">
            <strong>Time Complexity:
              <span class="complexity-badge">${t.complexity.time}</span>
            </strong>, ${t.complexity.timeNote}
          </div>
          <div class="complexity-row">
            <strong>Space Complexity:
              <span class="complexity-badge">${t.complexity.space}</span>
            </strong>, ${t.complexity.spaceNote}
          </div>
        </div>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════════════════════════
// UTILITY FUNCTIONS (unchanged behaviour)
// ══════════════════════════════════════════════════════════════════

function goHome() {
  document.getElementById('page-detail').classList.remove('active');
  document.getElementById('page-home').classList.add('active');
  renderHome();
}

function toggleAccordion(id) {
  document.getElementById(id).classList.toggle('open');
}

function switchLang(lang) {
  currentLang = lang;
  const langKeys = currentTopic ? Object.keys(currentTopic.codes) : ['cpp','java','python','javascript'];
  langKeys.forEach(l => {
    document.getElementById('ltab-' + l)?.classList.toggle('active', l === lang);
    document.getElementById('cpanel-' + l)?.classList.toggle('active', l === lang);
  });
}

function copyCode() {
  const panel = document.getElementById('cpanel-' + currentLang);
  if (!panel) return;
  const text = panel.querySelector('pre').innerText;
  navigator.clipboard.writeText(text)
    .then(() => showToast('✓ Code copied to clipboard!'))
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('✓ Code copied!');
    });
}

function toggleSave() {
  if (!currentTopic) return;
  const id  = currentTopic.id;
  const idx = savedTopics.indexOf(id);
  if (idx === -1) { savedTopics.push(id); showToast('✓ Topic saved!'); }
  else            { savedTopics.splice(idx, 1); showToast('Removed from saved.'); }
  try { localStorage.setItem('cf_saved', JSON.stringify(savedTopics)); } catch(e) {}
  updateSaveBtn();
}

function updateSaveBtn() {
  const btn   = document.getElementById('save-btn');
  const label = document.getElementById('save-label');
  if (!btn || !currentTopic) return;
  const saved = savedTopics.includes(currentTopic.id);
  btn.classList.toggle('saved', saved);
  label.textContent = saved ? 'Saved' : 'Save';
  btn.querySelector('svg').setAttribute('fill', saved ? 'currentColor' : 'none');
}

function shareTopic() {
  if (!currentTopic) return;
  const text = `Check out this DSA tutorial: "${currentTopic.name}" on Fundamentals`;
  if (navigator.share) {
    navigator.share({ title: currentTopic.name, text, url: window.location.href }).catch(() => fallbackShare(text));
  } else {
    fallbackShare(text);
  }
}

function fallbackShare(text) {
  navigator.clipboard.writeText(window.location.href + ' — ' + text)
    .then(() => showToast('✓ Link copied to clipboard!'))
    .catch(() => showToast('Share: ' + window.location.href));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function toggleSaveFromHome(id) {
  const idx = savedTopics.indexOf(id);
  if (idx === -1) { savedTopics.push(id); showToast('✓ Topic saved!'); }
  else            { savedTopics.splice(idx, 1); showToast('Removed from saved.'); }
  try { localStorage.setItem('cf_saved', JSON.stringify(savedTopics)); } catch(e) {}
  const btn = document.getElementById('home-save-' + id);
  if (btn) {
    const isSaved = savedTopics.includes(id);
    btn.classList.toggle('saved-icon', isSaved);
    btn.querySelector('svg').setAttribute('fill', isSaved ? 'currentColor' : 'none');
  }
}

function shareTopicById(id) {
  let topicName = id;
  for (const list of Object.values(topics)) {
    const found = list.find(x => x.id === id);
    if (found) { topicName = found.name; break; }
  }
  const text = `Check out this DSA tutorial: "${topicName}" on Fundamentals`;
  if (navigator.share) {
    navigator.share({ title: topicName, text, url: window.location.href }).catch(() => fallbackShare(text));
  } else {
    fallbackShare(text);
  }
}

// ── MOBILE DRAWER ──
function toggleDrawer() {
  const drawer = document.getElementById('mobile-drawer');
  const overlay = document.getElementById('drawer-overlay');
  const isOpen = drawer.classList.contains('open');
  if (isOpen) {
    closeDrawer();
  } else {
    drawer.classList.add('open');
    overlay.classList.add('open');
  }
}
function closeDrawer() {
  document.getElementById('mobile-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ── THEME TOGGLE ──
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-icon-moon').style.display = isLight ? 'none' : '';
  document.getElementById('theme-icon-sun').style.display  = isLight ? '' : 'none';
  try { localStorage.setItem('cf_theme', isLight ? 'light' : 'dark'); } catch(e) {}
}

// ── INIT THEME ──
(function() {
  try {
    if (localStorage.getItem('cf_theme') === 'light') {
      document.body.classList.add('light');
      document.getElementById('theme-icon-moon').style.display = 'none';
      document.getElementById('theme-icon-sun').style.display  = '';
    }
  } catch(e) {}
})();

// ── INIT ──
renderHome();
</script>
<script>
// ===============================
// Disable Right Click
// ===============================
document.addEventListener('contextmenu', e => e.preventDefault());

// ===============================
// Disable Text Selection
// ===============================
document.addEventListener('selectstart', e => e.preventDefault());

// ===============================
// Disable Copy / Cut / Paste
// ===============================
['copy', 'cut', 'paste'].forEach(evt => {
    document.addEventListener(evt, e => {
        e.preventDefault();
        alert('Action blocked');
    });
});

// ===============================
// Disable Dragging Images
// ===============================
document.addEventListener('dragstart', e => e.preventDefault());

// ===============================
// Disable Common DevTools Keys
// ===============================
document.addEventListener('keydown', function(e) {

    // F12
    if (e.key === 'F12') {
        e.preventDefault();
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key === 'I') {
        e.preventDefault();
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key === 'J') {
        e.preventDefault();
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key === 'C') {
        e.preventDefault();
    }

    // Ctrl+U (View Source)
    if (e.ctrlKey && e.key === 'u') {
        e.preventDefault();
    }

    // Ctrl+S (Save Page)
    if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
    }

    // Ctrl+P (Print)
    if (e.ctrlKey && e.key === 'p') {
        e.preventDefault();
    }
});


// ===============================
// Disable Image Saving
// ===============================
document.querySelectorAll('img').forEach(img => {
    img.setAttribute('draggable', 'false');
});

// ===============================
// Blur Page When Tab Hidden
// ===============================
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        document.body.style.filter = "blur(10px)";
    } else {
        document.body.style.filter = "blur(0)";
    }
});
</script>
</body>
</html>
