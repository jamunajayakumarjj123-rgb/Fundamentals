<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fundamentals – Language Tutorials</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --bg2: #161616;
      --bg3: #1e1e1e;
      --bg4: #252525;
      --border: #2a2a2a;
      --border2: #333;
      --accent: #f97316;
      --accent2: #fb923c;
      --text: #e8e8e8;
      --text2: #a0a0a0;
      --text3: #666;
      --green: #22c55e;
      --blue: #3b82f6;
      --sidebar-w: 72px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 0;
      z-index: 100;
      gap: 4px;
    }

    .sidebar-logo {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 17px;
      color: #fff;
      margin-bottom: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .sidebar-logo span {
      transform: skewX(-6deg);
      display: block;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
    }

    .sidebar-btn {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      gap: 3px;
      transition: background .15s;
      color: var(--text2);
      border: none;
      background: transparent;
    }

    .sidebar-btn:hover {
      background: var(--bg3);
    }

    .sidebar-btn.active {
      background: rgba(249, 115, 22, .13);
      color: var(--accent);
    }

    .sidebar-btn svg {
      width: 20px;
      height: 20px;
    }

    .sidebar-btn .label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .3px;
    }

    .sidebar-plus {
      margin-top: auto;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg4);
      border: 1.5px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }

    .sidebar-plus::after {
      content: '';
      position: absolute;
      bottom: 3px;
      right: 3px;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      border: 2px solid var(--bg2);
    }

    .sidebar-plus svg {
      width: 22px;
      height: 22px;
      color: #888;
    }

    /* ── MAIN LAYOUT ── */
    .main {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
    }

    /* ── TOP LANGUAGE NAV ── */
    .lang-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 36px;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .lang-nav::-webkit-scrollbar {
      height: 3px;
    }

    .lang-nav::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px;
    }

    .lang-nav-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 13px 18px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      letter-spacing: .2px;
    }

    .lang-nav-btn:hover {
      color: var(--text);
    }

    .lang-nav-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .lang-nav-icon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
    }

    /* ── PAGE VIEWS ── */
    .page {
      display: none;
    }

    .page.active {
      display: block;
      animation: fadeIn .2s ease;
    }

    /* ── HOME PAGE ── */
    .home-header {
      padding: 28px 36px 0;
      border-left: 3px solid var(--accent);
    }

    .home-title {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
    }

    .home-sub {
      font-size: 13px;
      color: var(--text2);
      margin-top: 4px;
    }

    /* TOPIC TABS (categories within a language) */
    .tabs-wrap {
      padding: 16px 0 0 36px;
      overflow-x: auto;
      display: flex;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tabs-wrap::-webkit-scrollbar {
      height: 3px;
    }

    .tabs-wrap::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px;
    }

    .tab-btn {
      padding: 8px 16px;
      border-radius: 8px 8px 0 0;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: 'Sora', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: color .15s, background .15s;
      border-bottom: 2px solid transparent;
    }

    .tab-btn:hover {
      color: var(--text);
      background: var(--bg3);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
      background: rgba(249, 115, 22, .07);
    }

    /* TOPIC TABLE */
    .table-wrap {
      padding: 0 36px 40px;
    }

    .topic-table {
      width: 100%;
      border-collapse: collapse;
    }

    .topic-table thead tr {
      border-bottom: 1px solid var(--border2);
    }

    .topic-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .topic-table th:last-child {
      text-align: right;
    }

    .topic-row {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .12s;
    }

    .topic-row:hover {
      background: var(--bg3);
    }

    .topic-row td {
      padding: 16px;
      vertical-align: top;
    }

    .topic-row td:first-child {
      color: var(--text3);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      width: 60px;
    }

    .topic-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

      .home-title{
    color: var(--text);
  }

    .topic-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.55;
      max-width: 820px;
    }

    .topic-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: flex-start;
      padding-top: 2px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text3);
      transition: color .15s, border-color .15s;
    }

    .icon-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .icon-btn.saved-icon {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(249, 115, 22, .1);
    }

    .icon-btn svg {
      width: 14px;
      height: 14px;
    }

    /* CATEGORY BADGE */
    .cat-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .4px;
      text-transform: uppercase;
      background: rgba(249, 115, 22, .12);
      color: var(--accent);
      margin-bottom: 6px;
    }

    /* ── DETAIL PAGE ── */
    .detail-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      position: sticky;
      top: 52px;
      z-index: 50;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      transition: color .15s, border-color .15s;
    }

    .back-btn:hover {
      color: var(--text);
    }

    .back-btn svg {
      width: 14px;
      height: 14px;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text2);
      font-family: 'Sora', sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
    }

    .action-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(249, 115, 22, .07);
    }

    .action-btn.saved {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(249, 115, 22, .1);
    }

    .action-btn svg {
      width: 15px;
      height: 15px;
    }

    .detail-content {
      padding: 32px 44px 60px;
      max-width: 960px;
    }

    .detail-title {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 14px;
    }

    .problem-desc {
      font-size: 13.5px;
      color: var(--text2);
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .problem-desc strong {
      color: var(--text);
    }

    /* ACCORDION */
    .accordion {
      border: 1px solid var(--border2);
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--bg3);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      user-select: none;
      transition: background .15s;
    }

    .accordion-header:hover {
      background: var(--bg4);
    }

    .accordion-arrow {
      transition: transform .25s;
      color: var(--text3);
    }

    .accordion-arrow svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .accordion.open .accordion-arrow {
      transform: rotate(180deg);
    }

    .accordion-body {
      display: none;
      background: var(--bg2);
      border-top: 1px solid var(--border);
    }

    .accordion.open .accordion-body {
      display: block;
    }

    /* EXAMPLE BOX */
    .example-box {
      margin: 0;
      padding: 24px;
    }

    .code-example {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      line-height: 1.8;
      color: var(--text2);
      margin-bottom: 16px;
    }

    .code-example .kw {
      color: #a78bfa;
    }

    .code-example .val {
      color: #34d399;
    }

    .code-example .comment {
      color: var(--text3);
      font-style: italic;
    }

    /* DIAGRAM CANVAS */
    .diagram-canvas {
      background: #fff;
      border-radius: 10px;
      border: 2px solid var(--accent);
      padding: 36px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 18px;
      position: relative;
    }

    .diagram-canvas .brand {
      position: absolute;
      top: 10px;
      right: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      opacity: .7;
    }

    /* ALGORITHM */
    .algo-body {
      padding: 24px;
    }

    .algo-text {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--text2);
      margin-bottom: 20px;
    }

    .algo-text strong {
      color: var(--text);
    }

    /* STEP DIAGRAM */
    .step-diagrams {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .step-diagram-card {
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 36px 20px 18px;
      background: var(--bg3);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .step-diagram-card .brand {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      opacity: .6;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: .4px;
    }

    .step-diagram-card .step-label {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: .4px;
    }

    .algo-step {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 14px;
      border-bottom: 1px dashed var(--border2);
    }

    .algo-step:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .algo-step-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .algo-step-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      margin-top: 6px;
    }

    .algo-step-text {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.65;
    }

    /* CODE BLOCK */
    .code-section {
      padding: 0;
    }

    .lang-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      background: var(--bg3);
    }

    .lang-tab {
      padding: 10px 18px;
      border: none;
      background: transparent;
      font-family: 'Sora', sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .15s;
    }

    .lang-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .lang-tab:hover:not(.active) {
      color: var(--text);
    }

    .copy-btn {
      margin-left: auto;
      padding: 8px 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-family: 'Sora', sans-serif;
      border-radius: 6px;
      transition: color .15s;
    }

    .copy-btn:hover {
      color: var(--accent);
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
    }

    .code-panel {
      display: none;
    }

    .code-panel.active {
      display: block;
    }

    .code-block {
      padding: 24px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      line-height: 1.9;
      color: #cdd6f4;
      background: #12121a;
      white-space: pre;
    }

    .code-block .k {
      color: #cba6f7;
    }

    .code-block .t {
      color: #89dceb;
    }

    .code-block .fn {
      color: #89b4fa;
    }

    .code-block .s {
      color: #a6e3a1;
    }

    .code-block .n {
      color: #fab387;
    }

    .code-block .c {
      color: #585b70;
      font-style: italic;
    }

    /* COMPLEXITY */
    .complexity-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .complexity-row {
      font-size: 13.5px;
      color: var(--text2);
      line-height: 1.7;
    }

    .complexity-row strong {
      color: var(--text);
    }

    .complexity-badge {
      display: inline-block;
      padding: 1px 8px;
      background: rgba(249, 115, 22, .15);
      border: 1px solid rgba(249, 115, 22, .35);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      margin: 0 2px;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--bg4);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: all .25s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* COMING SOON PLACEHOLDER */
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 16px;
      color: var(--text3);
    }

    .coming-soon .cs-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .coming-soon h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text2);
    }

    .coming-soon p {
      font-size: 13px;
      color: var(--text3);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
              .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--orange);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            fill: white
        }
  </style>
  <style>
    /* Mobile Responsive Layout */
    /* ══════════════════════════════════════════
   MOBILE TOPBAR (hidden on desktop)
══════════════════════════════════════════ */
.mobile-topbar {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 200;
}
.mobile-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
.mobile-logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.mobile-logo-icon svg { width: 18px; height: 18px; fill: white; }
.mobile-logo-text {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 14px;
  color: #fff;
}
.mobile-topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.mobile-icon-btn {
  width: 36px; height: 36px;
  border: none;
  background: var(--bg3);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  transition: color .15s, background .15s;
}
.mobile-icon-btn:hover { color: var(--text); background: var(--bg4); }
.mobile-icon-btn svg { width: 20px; height: 20px; }

/* ── MOBILE DRAWER ── */
.mobile-drawer {
  display: none;
  position: fixed;
  top: 52px; left: 0; right: 0; bottom: 0;
  background: var(--bg2);
  z-index: 190;
  flex-direction: column;
  padding: 16px;
  gap: 6px;
  overflow-y: auto;
  transform: translateY(-8px);
  opacity: 0;
  transition: opacity .2s, transform .2s;
}
.mobile-drawer.open {
  display: flex;
  opacity: 1;
  transform: translateY(0);
}
.drawer-overlay {
  display: none;
  position: fixed;
  inset: 52px 0 0 0;
  background: rgba(0,0,0,.5);
  z-index: 180;
}
.drawer-overlay.open { display: block; }
.drawer-nav-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 13px 16px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: 'Sora', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  transition: background .15s, color .15s;
}
.drawer-nav-btn:hover { background: var(--bg3); color: var(--text); }
.drawer-nav-btn.active { background: rgba(249,115,22,.13); color: var(--accent); }
.drawer-nav-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
.drawer-divider {
  height: 1px;
  background: var(--border);
  margin: 6px 0;
}
.drawer-user-btn {
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1.5px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  font-family: 'Sora', sans-serif;
  cursor: pointer;
}
.drawer-user-btn svg { width: 18px; height: 18px; }

/* ══════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
══════════════════════════════════════════ */
@media (max-width: 768px) {
  /* Hide desktop sidebar, show mobile topbar */
  .sidebar { display: none; }
  .mobile-topbar { display: flex; }
  .main {
    margin-left: 0;
    padding-top: 52px;
  }

  .home-title{
    color: var(--text);
  }

  .topic-row td:nth-child(1){
    display: none;
  }

  .topic-table{
    padding-top: 15px;
  }

  .mobile-logo-text{
    color: var(--text);
  }
  /* Home header */
  .home-header {
    padding: 20px 16px 0;
  }
  .home-title { font-size: 20px; }

  /* Tabs */
  .tabs-wrap { padding: 12px 0 0 16px; }

  /* Table → card layout */
  .table-wrap,
  .main > div[style*="padding: 0 36px"],
  #page-home > div[style] {
    padding: 0 12px 40px !important;
  }
  .topic-table thead { display: none; }
  .topic-table, .topic-table tbody,
  .topic-row, .topic-row td { display: block; width: 100%; }
  .topic-row {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    padding: 14px;
  }
  .topic-row td { padding: 0; border: none; }
  .topic-row td:first-child {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 4px;
    width: auto;
  }
  .topic-actions {
    justify-content: flex-start;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  /* Detail topbar */
  .detail-topbar {
    padding: 10px 14px;
    top: 52px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .topbar-actions { gap: 6px; }
  .action-btn { padding: 6px 10px; font-size: 11.5px; }
  .action-btn span { display: none; } /* icon-only on mobile */

  /* Detail content */
  .detail-content {
    padding: 20px 16px 48px;
    max-width: 100%;
  }
  .detail-title { font-size: 19px; }

  /* Code block */
  .code-block { font-size: 11.5px; padding: 16px; }
  .lang-tabs { padding: 0 10px; overflow-x: auto; }
  .lang-tab { padding: 10px 12px; font-size: 11.5px; }

  /* Accordion */
  .accordion-header { padding: 12px 14px; font-size: 13px; }
  .algo-body { padding: 16px; }
  .example-box { padding: 16px; }

  /* Diagram canvas scroll on small screens */
  .diagram-canvas { overflow-x: auto; }
  .step-diagram-card { overflow-x: auto; }
}

@media (max-width: 768px) {

    // ══════════════════════════════════════════════════════════════════

    // ══════════════════════════════════════════════════════════════════
    // TOPICS DATA — C Language (full content)
    // ══════════════════════════════════════════════════════════════════
    const topics = {

      // ════════════════════ INTRODUCTION ════════════════════
      c_intro: [
        {

          algorithm: 'A pointer is a variable that stores a memory address. & gives the address of a variable. * dereferences a pointer to get or set the value at that address. Pointers allow functions to modify caller\'s variables, and are the foundation of dynamic memory.',
          algoSteps: [
            { text: '& operator: returns the memory address of a variable.', diagramHtml: codeSnip(`<span style="color:#cba6f7;">int</span> x = <span style="color:#fab387;">10</span>;\n<span style="color:#89b4fa;">printf</span>(<span style="color:#a6e3a1;">"%p\\n"</span>, &amp;x);  <span style="color:#585b70;">// prints address like 0x7fff5cd4</span>`) },

            { text: 'Pass by pointer lets a function modify the caller\'s variable.', diagramHtml: codeSnip(`<span style="color:#cba6f7;">void</span> <span style="color:#89b4fa;">increment</span>(<span style="color:#cba6f7;">int</span> *n) { (*n)++; }\n\n<span style="color:#cba6f7;">int</span> val = <span style="color:#fab387;">5</span>;\n<span style="color:#89b4fa;">increment</span>(&amp;val);           <span style="color:#585b70;">// val is now 6</span>`) },

          complexity: { time: 'O(1)', space: 'O(1)', timeNote: 'Pointer operations (dereference, address-of) are constant time.', spaceNote: 'A pointer itself takes 4 bytes (32-bit) or 8 bytes (64-bit) of memory.' },
          codes: { c: `<span class="k">#include</span> &lt;<span class="s">stdio.h</span>&gt;\n\n<span class="k">void</span> <span class="fn">increment</span>(<span class="t">int</span> *n) {\n    (*n)++;  <span class="c">// dereference then increment</span>\n}\n\n<span class="k">int</span> <span class="fn">main</span>() {\n    <span class="t">int</span> x = <span class="n">10</span>;\n    <span class="t">int</span> *p = &x;  <span class="c">// p points to x</span>\n\n    <span class="fn">printf</span>(<span class="s">"x = %d\\n"</span>, x);    <span class="c">// 10</span>\n    <span class="fn">printf</span>(<span class="s">"*p = %d\\n"</span>, *p);  <span class="c">// 10</span>\n    <span class="fn">printf</span>(<span class="s">"&x = %p\\n"</span>, &x);  <span class="c">// address</span>\n\n    *p = <span class="n">20</span>;  <span class="c">// changes x!</span>\n    <span class="fn">printf</span>(<span class="s">"x after *p=20: %d\\n"</span>, x);  <span class="c">// 20</span>\n\n    <span class="fn">increment</span>(&x);\n    <span class="fn">printf</span>(<span class="s">"x after increment: %d\\n"</span>, x);  <span class="c">// 21</span>\n\n    <span class="k">return</span> <span class="n">0</span>;\n}` }

          ${[['#include', 'Paste another file\'s content here', '#3b82f6', '#eff6ff'], ['#define', 'Text substitution / macro', '#f97316', '#fff7ed'], ['#ifdef / #ifndef', 'Conditional compilation', '#22c55e', '#f0fdf4'], ['#pragma', 'Compiler-specific instructions', '#7c3aed', '#f5f3ff'], ['#undef', 'Undefine a macro', '#ef4444', '#fef2f2']].map(([dir, desc, col, bg]) => `
          <div style="display:flex;align-items:center;gap:12px;padding:8px 12px;border:1.5px solid ${col};border-radius:8px;background:${bg};">
            <div style="font-size:12px;font-weight:700;color:${col};min-width:120px;">${dir}</div>
            <div style="font-size:11px;color:#555;">${desc}</div>
          </div>`).join('')}
        </div>`,
          algorithm: 'The preprocessor runs BEFORE the compiler. It does text substitution — no type checking, no scoping. #define macros are fast but can cause subtle bugs if not written carefully (always wrap in parentheses). Modern C prefers const and inline functions over macros for safety.',
          algoSteps: [
            { text: '#define constant: replaces every occurrence of the name with the value.', diagramHtml: codeSnip(`<span style="color:#89b4fa;">#define</span> MAX_SIZE <span style="color:#fab387;">100</span>\n<span style="color:#89b4fa;">#define</span> PI       <span style="color:#fab387;">3.14159</span>\n\n<span style="color:#cba6f7;">int</span> arr[MAX_SIZE];  <span style="color:#585b70;">// → int arr[100];</span>`) },
            { text: '#define macro with arguments — always parenthesize to avoid bugs.', diagramHtml: codeSnip(`<span style="color:#89b4fa;">#define</span> <span style="color:#89b4fa;">SQUARE</span>(x)  ((x)*(x))\n<span style="color:#89b4fa;">#define</span> <span style="color:#89b4fa;">MAX</span>(a,b)   ((a)>(b)?(a):(b))\n\n<span style="color:#89b4fa;">printf</span>(<span style="color:#a6e3a1;">"%d\\n"</span>, SQUARE(<span style="color:#fab387;">5</span>));     <span style="color:#585b70;">// 25</span>\n<span style="color:#89b4fa;">printf</span>(<span style="color:#a6e3a1;">"%d\\n"</span>, MAX(<span style="color:#fab387;">3</span>,<span style="color:#fab387;">7</span>));     <span style="color:#585b70;">// 7</span>`) },
            { text: 'Conditional compilation with #ifdef to include/exclude code blocks.', diagramHtml: codeSnip(`<span style="color:#89b4fa;">#define</span> DEBUG\n\n<span style="color:#89b4fa;">#ifdef</span> DEBUG\n    <span style="color:#89b4fa;">printf</span>(<span style="color:#a6e3a1;">"Debug mode ON\\n"</span>);\n<span style="color:#89b4fa;">#endif</span>\n\n<span style="color:#585b70;">/* Remove #define DEBUG for release build */</span>`) },
          ],
          complexity: { time: 'O(1)', space: 'O(1)', timeNote: 'Macros are compile-time substitutions — zero runtime overhead.', spaceNote: 'No runtime memory used by #define macros.' },
          codes: { c: `<span class="k">#include</span> &lt;<span class="s">stdio.h</span>&gt;\n\n<span class="k">#define</span> PI       3.14159\n<span class="k">#define</span> SQUARE(x) ((x)*(x))\n<span class="k">#define</span> MAX(a,b)  ((a)>(b)?(a):(b))\n\n<span class="c">/* Comment out to disable debug output */</span>\n<span class="k">#define</span> DEBUG\n\n<span class="k">int</span> <span class="fn">main</span>() {\n    <span class="t">double</span> r = <span class="n">5.0</span>;\n    <span class="fn">printf</span>(<span class="s">"Area = %.2f\\n"</span>, PI * SQUARE(r));\n    <span class="fn">printf</span>(<span class="s">"Max = %d\\n"</span>, MAX(<span class="n">10</span>, <span class="n">25</span>));\n\n<span class="k">#ifdef</span> DEBUG\n    <span class="fn">printf</span>(<span class="s">"[DEBUG] r = %.1f\\n"</span>, r);\n<span class="k">#endif</span>\n\n    <span class="k">return</span> <span class="n">0</span>;\n}` }
        }
      ],

      // ── placeholder for non-C languages ──
      cpp_coming: [{ id: 'cpp_cs', name: 'Content Coming Soon', badge: 'C++', desc: 'C++ tutorials are being prepared.', problem: '', examples: [], diagramHtml: '', algorithm: '', algoSteps: [], complexity: { time: 'N/A', space: 'N/A', timeNote: '', spaceNote: '' }, codes: { cpp: '' } }],
      py_coming: [{ id: 'py_cs', name: 'Content Coming Soon', badge: 'Python', desc: '', problem: '', examples: [], diagramHtml: '', algorithm: '', algoSteps: [], complexity: { time: 'N/A', space: 'N/A', timeNote: '', spaceNote: '' }, codes: { python: '' } }],
      js_coming: [{ id: 'js_cs', name: 'Content Coming Soon', badge: 'JavaScript', desc: '', problem: '', examples: [], diagramHtml: '', algorithm: '', algoSteps: [], complexity: { time: 'N/A', space: 'N/A', timeNote: '', spaceNote: '' }, codes: { javascript: '' } }],
      go_coming: [{ id: 'go_cs', name: 'Content Coming Soon', badge: 'Go', desc: '', problem: '', examples: [], diagramHtml: '', algorithm: '', algoSteps: [], complexity: { time: 'N/A', space: 'N/A', timeNote: '', spaceNote: '' }, codes: { go: '' } }],
      sql_coming: [{ id: 'sql_cs', name: 'Content Coming Soon', badge: 'SQL', desc: '', problem: '', examples: [], diagramHtml: '', algorithm: '', algoSteps: [], complexity: { time: 'N/A', space: 'N/A', timeNote: '', spaceNote: '' }, codes: { sql: '' } }],
      mdb_coming: [{ id: 'mdb_cs', name: 'Content Coming Soon', badge: 'MongoDB', desc: '', problem: '', examples: [], diagramHtml: '', algorithm: '', algoSteps: [], complexity: { time: 'N/A', space: 'N/A', timeNote: '', spaceNote: '' }, codes: { mongodb: '' } }],
    };

    // ══════════════════════════════════════════════════════════════════
    // APPLICATION STATE
    // ══════════════════════════════════════════════════════════════════
    let currentLang = 'c';
    let currentCategory = 'c_intro';
    let currentTopic = null;
    let currentCodeLang = 'c';
    let savedTopics = [];
    try { savedTopics = JSON.parse(localStorage.getItem('cf_lang_saved') || '[]'); } catch (e) { }

    // ══════════════════════════════════════════════════════════════════
    // LANGUAGE CODE LABELS
    // ══════════════════════════════════════════════════════════════════
    const codeLangLabels = { c: 'C', cpp: 'C++', python: 'Python', javascript: 'JavaScript', go: 'Go', sql: 'SQL', mongodb: 'MongoDB' };

    // ══════════════════════════════════════════════════════════════════
    // RENDER LANGUAGE NAV
    // ══════════════════════════════════════════════════════════════════
    function renderLangNav() {
      document.getElementById('lang-nav').innerHTML = languages.map(l => `
    <button class="lang-nav-btn ${l.id === currentLang ? 'active' : ''}" onclick="switchLanguage('${l.id}')">
      <span class="lang-nav-icon" style="background:${l.color}22;color:${l.color};">${l.icon}</span>
      ${l.label}
    </button>
  `).join('');
    }

    // ══════════════════════════════════════════════════════════════════
    // SWITCH LANGUAGE
    // ══════════════════════════════════════════════════════════════════
    function switchLanguage(langId) {
      currentLang = langId;
      const cats = categories[langId] || [];
      currentCategory = cats.length > 0 ? cats[0].id : '';
      goHome();
      renderLangNav();
    }

    // ══════════════════════════════════════════════════════════════════
    // RENDER HOME PAGE
    // ══════════════════════════════════════════════════════════════════
    function renderHome() {
      const lang = languages.find(l => l.id === currentLang);
      const cats = categories[currentLang] || [];
      const cat = cats.find(c => c.id === currentCategory) || cats[0];

      // Header
      document.getElementById('home-category-title').textContent = lang ? `${lang.label} — ${cat ? cat.label : ''}` : '';
      document.getElementById('home-category-sub').textContent = cat ? cat.description : '';

      // Category tabs
      document.getElementById('category-tabs').innerHTML = cats.map(c => `
    <button class="tab-btn ${c.id === currentCategory ? 'active' : ''}" onclick="switchCategory('${c.id}')">
      ${c.label}
    </button>
  `).join('');

      // Topic rows
      const list = topics[currentCategory] || [];
      document.getElementById('topic-tbody').innerHTML = list.length === 0
        ? `<tr><td colspan="3"><div class="coming-soon"><div class="cs-icon">🚧</div><h2>Coming Soon</h2><p>Content for this section is being prepared.</p></div></td></tr>`
        : list.map((t, i) => `
    <tr class="topic-row" onclick="openTopic('${t.id}')">
      <td>${i + 1}</td>
      <td>
        <div class="topic-name">${t.name}</div>
        <div class="topic-desc">${t.desc}</div>
      </td>
      <td>
        <div class="topic-actions">
          <div class="icon-btn ${savedTopics.includes(t.id) ? 'saved-icon' : ''}" id="home-save-${t.id}"
               onclick="event.stopPropagation(); toggleSaveFromHome('${t.id}')" title="Save">
            <svg fill="${savedTopics.includes(t.id) ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
            </svg>
          </div>
          <div class="icon-btn" onclick="event.stopPropagation(); shareTopicById('${t.id}')" title="Share">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
            </svg>
          </div>
        </div>
      </td>
    </tr>
  `).join('');
    }

    function switchCategory(id) {
      currentCategory = id;
      renderHome();
    }

    // ══════════════════════════════════════════════════════════════════
    // OPEN TOPIC — DETAIL PAGE
    // ══════════════════════════════════════════════════════════════════
    function openTopic(id) {
      for (const list of Object.values(topics)) {
        const found = list.find(x => x.id === id);
        if (found) { currentTopic = found; break; }
      }
      if (!currentTopic) return;
      currentCodeLang = Object.keys(currentTopic.codes)[0];
      renderDetailPage();
      document.getElementById('page-home').classList.remove('active');
      document.getElementById('page-detail').classList.add('active');
      window.scrollTo(0, 0);
      setTimeout(updateSaveBtn, 10);
    }

    // ══════════════════════════════════════════════════════════════════
    // RENDER DETAIL PAGE — fully generic
    // ══════════════════════════════════════════════════════════════════
    function renderDetailPage() {
      const t = currentTopic;

      // Algo steps HTML
      const stepsHtml = (t.algoSteps || []).map((step, i) => `
    <div class="algo-step">
      <div class="algo-step-header">
        <div class="algo-step-dot"></div>
        <div class="algo-step-text">${step.text}</div>
      </div>
      ${step.diagramHtml ? `
        <div class="step-diagram-card">
          <span class="brand">Fundamentals</span>
          <span class="step-label">Step ${i + 1}</span>
          ${step.diagramHtml}
        </div>` : ''}
    </div>
  `).join('');

      // Code panels
      const langKeys = Object.keys(t.codes);
      const langTabsHtml = langKeys.map(lang => `
    <button class="lang-tab ${lang === currentCodeLang ? 'active' : ''}" id="ltab-${lang}" onclick="switchCodeLang('${lang}')">
      ${codeLangLabels[lang] || lang}
    </button>
  `).join('');
      const codePanelsHtml = langKeys.map(lang => `
    <div class="code-panel ${lang === currentCodeLang ? 'active' : ''}" id="cpanel-${lang}">
      <pre class="code-block"><code>${t.codes[lang]}</code></pre>
    </div>
  `).join('');

      // Examples HTML
      const examplesHtml = (t.examples || []).map(ex => `
    <div class="code-example">
      <span class="kw">Input:</span>  ${ex.input}<br>
      <span class="val">Output:</span> ${ex.output}<br>
      <span class="comment">// ${ex.explanation}</span>
    </div>
  `).join('');

      document.getElementById('detail-content').innerHTML = `
    <div class="cat-badge">${t.badge}</div>
    <h1 class="detail-title">${t.name}</h1>
    <p class="problem-desc"><strong>Overview:</strong> ${t.problem}</p>

    <!-- EXAMPLES ACCORDION -->
    ${t.examples && t.examples.length > 0 ? `
    <div class="accordion open" id="acc-examples">
      <div class="accordion-header" onclick="toggleAccordion('acc-examples')">
        Examples
        <span class="accordion-arrow"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></span>
      </div>
      <div class="accordion-body">
        <div class="example-box">
          ${examplesHtml}
          <div class="diagram-canvas">
            <span class="brand">Fundamentals</span>
            ${t.diagramHtml}
          </div>
        </div>
      </div>
    </div>` : ''}

    <!-- APPROACH ACCORDION -->
    <div class="accordion open" id="acc-approach">
      <div class="accordion-header" onclick="toggleAccordion('acc-approach')">
        Explanation & Approach
        <span class="accordion-arrow"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></span>
      </div>
      <div class="accordion-body">

        <!-- ALGORITHM SUB-ACCORDION -->
        <div class="accordion open" id="acc-algo" style="margin:16px;border-radius:8px;">
          <div class="accordion-header" onclick="toggleAccordion('acc-algo')" style="border-radius:8px 8px 0 0;">
            Concept & Steps
            <span class="accordion-arrow"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></span>
          </div>
          <div class="accordion-body">
            <div class="algo-body">
              <p class="algo-text">${t.algorithm}</p>
              <div class="step-diagrams">${stepsHtml}</div>
            </div>
          </div>
        </div>

        <!-- CODE SUB-ACCORDION -->
        <div class="accordion open" id="acc-code" style="margin:0 16px 16px;border-radius:8px;">
          <div class="accordion-header" onclick="toggleAccordion('acc-code')" style="border-radius:8px 8px 0 0;">
            Code
            <span class="accordion-arrow"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></span>
          </div>
          <div class="accordion-body code-section">
            <div class="lang-tabs">
              ${langTabsHtml}
              <button class="copy-btn" onclick="copyCode()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                Copy
              </button>
            </div>
            ${codePanelsHtml}
          </div>
        </div>

      </div>
    </div>

    <!-- COMPLEXITY ACCORDION -->
    <div class="accordion open" id="acc-complexity">
      <div class="accordion-header" onclick="toggleAccordion('acc-complexity')">
        Complexity Analysis
        <span class="accordion-arrow"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></span>
      </div>
      <div class="accordion-body">
        <div class="complexity-body">
          <div class="complexity-row">
            <strong>Time Complexity: <span class="complexity-badge">${t.complexity.time}</span></strong> — ${t.complexity.timeNote}
          </div>
          <div class="complexity-row">
            <strong>Space Complexity: <span class="complexity-badge">${t.complexity.space}</span></strong> — ${t.complexity.spaceNote}
          </div>
        </div>
      </div>
    </div>
  `;
    }

    // ══════════════════════════════════════════════════════════════════
    // UTILITIES
    // ══════════════════════════════════════════════════════════════════
    function goHome() {
      document.getElementById('page-detail').classList.remove('active');
      document.getElementById('page-home').classList.add('active');
      renderHome();
    }

    function toggleAccordion(id) {
      document.getElementById(id).classList.toggle('open');
    }

    function switchCodeLang(lang) {
      currentCodeLang = lang;
      const langKeys = currentTopic ? Object.keys(currentTopic.codes) : [];
      langKeys.forEach(l => {
        document.getElementById('ltab-' + l)?.classList.toggle('active', l === lang);
        document.getElementById('cpanel-' + l)?.classList.toggle('active', l === lang);
      });
    }

    function copyCode() {
      const panel = document.getElementById('cpanel-' + currentCodeLang);
      if (!panel) return;
      const text = panel.querySelector('pre').innerText;
      navigator.clipboard.writeText(text)
        .then(() => showToast('✓ Code copied to clipboard!'))
        .catch(() => {
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          showToast('✓ Code copied!');
        });
    }

    function toggleSave() {
      if (!currentTopic) return;
      const id = currentTopic.id;
      const idx = savedTopics.indexOf(id);
      if (idx === -1) { savedTopics.push(id); showToast('✓ Topic saved!'); }
      else { savedTopics.splice(idx, 1); showToast('Removed from saved.'); }
      try { localStorage.setItem('cf_lang_saved', JSON.stringify(savedTopics)); } catch (e) { }
      updateSaveBtn();
    }

    function updateSaveBtn() {
      const btn = document.getElementById('save-btn');
      const label = document.getElementById('save-label');
      if (!btn || !currentTopic) return;
      const saved = savedTopics.includes(currentTopic.id);
      btn.classList.toggle('saved', saved);
      label.textContent = saved ? 'Saved' : 'Save';
      btn.querySelector('svg').setAttribute('fill', saved ? 'currentColor' : 'none');
    }

    function shareTopic() {
      if (!currentTopic) return;
      const text = `Check out "${currentTopic.name}" on Fundamentals`;
      if (navigator.share) {
        navigator.share({ title: currentTopic.name, text, url: window.location.href }).catch(() => fallbackShare(text));
      } else { fallbackShare(text); }
    }

    function fallbackShare(text) {
      navigator.clipboard.writeText(window.location.href + ' — ' + text)
        .then(() => showToast('✓ Link copied!'))
        .catch(() => showToast('Share: ' + window.location.href));
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2400);
    }

    function toggleSaveFromHome(id) {
      const idx = savedTopics.indexOf(id);
      if (idx === -1) { savedTopics.push(id); showToast('✓ Topic saved!'); }
      else { savedTopics.splice(idx, 1); showToast('Removed from saved.'); }
      try { localStorage.setItem('cf_lang_saved', JSON.stringify(savedTopics)); } catch (e) { }
      const btn = document.getElementById('home-save-' + id);
      if (btn) {
        const isSaved = savedTopics.includes(id);
        btn.classList.toggle('saved-icon', isSaved);
        btn.querySelector('svg').setAttribute('fill', isSaved ? 'currentColor' : 'none');
      }
    }

    function shareTopicById(id) {
      let topicName = id;
      for (const list of Object.values(topics)) {
        const found = list.find(x => x.id === id);
        if (found) { topicName = found.name; break; }
      }
      const text = `Check out "${topicName}" on Fundamentals`;
      if (navigator.share) {
        navigator.share({ title: topicName, text, url: window.location.href }).catch(() => fallbackShare(text));
      } else { fallbackShare(text); }
    }


    // ── MOBILE DRAWER ──
function toggleDrawer() {
  const drawer = document.getElementById('mobile-drawer');
  const overlay = document.getElementById('drawer-overlay');
  const isOpen = drawer.classList.contains('open');
  if (isOpen) {
    closeDrawer();
  } else {
    drawer.classList.add('open');
    overlay.classList.add('open');
  }
}
function closeDrawer() {
  document.getElementById('mobile-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ── THEME TOGGLE ──
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-icon-moon').style.display = isLight ? 'none' : '';
  document.getElementById('theme-icon-sun').style.display  = isLight ? '' : 'none';
  try { localStorage.setItem('cf_theme', isLight ? 'light' : 'dark'); } catch(e) {}
}

// ── INIT THEME ──
(function() {
  try {
    if (localStorage.getItem('cf_theme') === 'light') {
      document.body.classList.add('light');
      document.getElementById('theme-icon-moon').style.display = 'none';
      document.getElementById('theme-icon-sun').style.display  = '';
    }
  } catch(e) {}
})();

    // ── INIT ──
    renderLangNav();
    renderHome();
  </script>
  <script>
// ===============================
// Disable Right Click
// ===============================
document.addEventListener('contextmenu', e => e.preventDefault());

// ===============================
// Disable Text Selection
// ===============================
document.addEventListener('selectstart', e => e.preventDefault());

// ===============================
// Disable Copy / Cut / Paste
// ===============================
['copy', 'cut', 'paste'].forEach(evt => {
    document.addEventListener(evt, e => {
        e.preventDefault();
        alert('Action blocked');
    });
});

// ===============================
// Disable Dragging Images
// ===============================
document.addEventListener('dragstart', e => e.preventDefault());

// ===============================
// Disable Common DevTools Keys
// ===============================
document.addEventListener('keydown', function(e) {

    // F12
    if (e.key === 'F12') {
        e.preventDefault();
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key === 'I') {
        e.preventDefault();
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key === 'J') {
        e.preventDefault();
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key === 'C') {
        e.preventDefault();
    }

    // Ctrl+U (View Source)
    if (e.ctrlKey && e.key === 'u') {
        e.preventDefault();
    }

    // Ctrl+S (Save Page)
    if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
    }

    // Ctrl+P (Print)
    if (e.ctrlKey && e.key === 'p') {
        e.preventDefault();
    }
});

// ===============================
// Disable Image Saving
// ===============================
document.querySelectorAll('img').forEach(img => {
    img.setAttribute('draggable', 'false');
});

// ===============================
// Blur Page When Tab Hidden
// ===============================
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        document.body.style.filter = "blur(10px)";
    } else {
        document.body.style.filter = "blur(0)";
    }
});
</script>
</body>

</html>
